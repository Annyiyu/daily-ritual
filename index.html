(cb);\n\n    row.appendChild(buildNameWrap('tier2', game, checked));\n\n    // Completion status pill\n    const completion = game.completion || '';\n    const pill = document.createElement('div');\n    pill.className = 'status-pill' + (completion === '' ? ' empty' : '');\n    if (completion) pill.dataset.status = completion;\n    pill.textContent = TIER2_COMPLETION_LABELS[completion] || '';\n    pill.title = 'Click to set status';\n    pill.onclick = (e) => { e.stopPropagation(); openTier2CompletionPicker(pill, game.id); };\n    row.appendChild(pill);\n\n    const streakEl = document.createElement('div');\n    streakEl.className = 'streak' + (streak > 0 ? ' active' : '');\n    streakEl.textContent = streak > 0 ? streak + 'd' : '·';\n    row.appendChild(streakEl);\n\n    row.appendChild(buildNoteToggleButton('tier2', game));\n    row.appendChild(buildHideButton('tier2', game));\n\n    item.appendChild(row);\n    container.appendChild(item);\n  });\n\n  renderAddRow('tier2');\n  renderHiddenSection('tier2');\n}\n\nfunction renderTier3() {\n  const day = getDay(viewDate);\n  const container = document.getElementById('tier3-list');\n  container.innerHTML = '';\n\n  const visible = state.config.tier3.filter(g => !g.hidden);\n  visible.forEach(game => {\n    const playedToday = day.tier3[game.id] === true;\n\n    const item = document.createElement('div');\n    item.className = 'roster-item';\n    item.dataset.gameId = game.id;\n\n    item.appendChild(makeDragHandle('game', 'tier3', game.id, game.name));\n\n    const check = document.createElement('div');\n    check.className = 'roster-check' + (playedToday ? ' checked' : '');\n    check.onclick = () => toggleTier3(game.id);\n    item.appendChild(check);\n\n    item.appendChild(buildNameWrap('tier3', game, playedToday));\n\n    // Status pill\n    const status = game.status || 'considering';\n    const pill = document.createElement('div');\n    pill.className = 'status-pill';\n    pill.dataset.status = status;\n    pill.textContent = TIER3_STATUS_LABELS[status] || '';\n    pill.title = 'Click to set status';\n    pill.onclick = (e) => { e.stopPropagation(); openTier3StatusPicker(pill, game.id); };\n    item.appendChild(pill);\n\n    item.appendChild(buildNoteToggleButton('tier3', game));\n    item.appendChild(buildHideButton('tier3', game));\n\n    container.appendChild(item);\n  });\n\n  renderAddRow('tier3');\n  renderHiddenSection('tier3');\n}\n\nfunction renderAddRow(tier) {\n  const container = document.getElementById('add-' + tier + '-container');\n  container.innerHTML = '';\n  if (addMode === tier) {\n    const input = document.createElement('input');\n    input.className = 'add-game-input';\n    input.type = 'text';\n    input.placeholder = 'Game name';\n    let committed = false;\n    const commit = () => {\n      if (committed) return; committed = true;\n      const v = input.value.trim();\n      if (v) addGame(tier, v);\n      addMode = null; render();\n    };\n    input.onkeydown = (e) => {\n      if (e.key === 'Enter') commit();\n      else if (e.key === 'Escape') { committed = true; addMode = null; render(); }\n    };\n    input.onblur = commit;\n    container.appendChild(input);\n    setTimeout(() => input.focus(), 0);\n  } else {\n    const btn = document.createElement('button');\n    btn.className = 'add-game';\n    btn.textContent = '+ Add game';\n    btn.onclick = () => { addMode = tier; render(); };\n    container.appendChild(btn);\n  }\n}\n\nfunction renderHiddenSection(tier) {\n  const container = document.getElementById('hidden-' + tier);\n  container.innerHTML = '';\n  const hidden = state.config[tier].filter(g => g.hidden);\n  if (hidden.length === 0) return;\n\n  const isOpen = hiddenSectionOpen[tier];\n\n  const toggle = document.createElement('button');\n  toggle.className = 'hidden-toggle' + (isOpen ? ' open' : '');\n  toggle.innerHTML = `<span class=\"caret\">›<\u002Fspan> Hidden (${hidden.length})`;\n  toggle.onclick = () => {\n    hiddenSectionOpen[tier] = !isOpen;\n    smoothRender();\n  };\n  container.appendChild(toggle);\n\n  if (!isOpen) return;\n\n  const list = document.createElement('div');\n  list.className = 'hidden-list';\n\n  hidden.forEach(game => {\n    const item = document.createElement('div');\n    item.className = 'hidden-list-item';\n\n    const name = document.createElement('div');\n    name.className = 'hidden-list-name';\n    name.textContent = game.name;\n    item.appendChild(name);\n\n    const restore = document.createElement('div');\n    restore.className = 'hidden-action';\n    restore.textContent = '↑ Restore';\n    restore.onclick = () => restoreGame(tier, game.id);\n    item.appendChild(restore);\n\n    const del = document.createElement('div');\n    del.className = 'hidden-action danger';\n    del.textContent = '× Delete forever';\n    del.onclick = () => deleteGameForever(tier, game.id);\n    item.appendChild(del);\n\n    list.appendChild(item);\n  });\n\n  container.appendChild(list);\n}\n\nfunction renderManageModal() {\n  // Remove any existing\n  document.querySelectorAll('.manage-popup, .manage-overlay').forEach(el => el.remove());\n\n  const gameId = manageSubtasksFor;\n  const game = state.config.tier1.find(g => g.id === gameId);\n  if (!game) { manageSubtasksFor = null; return; }\n\n  const overlay = document.createElement('div');\n  overlay.className = 'manage-overlay';\n  overlay.onclick = () => { manageSubtasksFor = null; render(); };\n  document.body.appendChild(overlay);\n\n  const popup = document.createElement('div');\n  popup.className = 'manage-popup';\n\n  const title = document.createElement('div');\n  title.className = 'manage-title';\n  title.textContent = `Manage sub-tasks · ${game.name}`;\n  popup.appendChild(title);\n\n  const visibleSubs = game.subtasks.filter(st => !st.hidden);\n  const hiddenSubs = game.subtasks.filter(st => st.hidden);\n\n  // Visible section\n  const vSec = document.createElement('div');\n  vSec.className = 'manage-section';\n  const vLabel = document.createElement('div');\n  vLabel.className = 'manage-section-label';\n  vLabel.textContent = 'Visible';\n  vSec.appendChild(vLabel);\n  const vPills = document.createElement('div');\n  vPills.className = 'manage-pills';\n  if (visibleSubs.length === 0) {\n    const empty = document.createElement('div');\n    empty.className = 'manage-empty';\n    empty.textContent = '（无）';\n    vPills.appendChild(empty);\n  }\n  visibleSubs.forEach(st => {\n    const pill = document.createElement('div');\n    pill.className = 'manage-pill';\n    pill.innerHTML = `<span>${escapeHtml(st.name)}<\u002Fspan>`;\n    const hideBtn = document.createElement('span');\n    hideBtn.className = 'manage-pill-delete';\n    hideBtn.innerHTML = '⊘';\n    hideBtn.title = 'Hide';\n    hideBtn.onclick = () => hideSubtask(gameId, st.id);\n    pill.appendChild(hideBtn);\n    vPills.appendChild(pill);\n  });\n  vSec.appendChild(vPills);\n  popup.appendChild(vSec);\n\n  // Hidden section\n  const hSec = document.createElement('div');\n  hSec.className = 'manage-section';\n  const hLabel = document.createElement('div');\n  hLabel.className = 'manage-section-label';\n  hLabel.textContent = `Hidden (${hiddenSubs.length})`;\n  hSec.appendChild(hLabel);\n  const hPills = document.createElement('div');\n  hPills.className = 'manage-pills';\n  if (hiddenSubs.length === 0) {\n    const empty = document.createElement('div');\n    empty.className = 'manage-empty';\n    empty.textContent = '（无）';\n    hPills.appendChild(empty);\n  }\n  hiddenSubs.forEach(st => {\n    const pill = document.createElement('div');\n    pill.className = 'manage-pill hidden-pill';\n    pill.innerHTML = `<span>${escapeHtml(st.name)}<\u002Fspan>`;\n    const restoreBtn = document.createElement('span');\n    restoreBtn.className = 'manage-pill-restore';\n    restoreBtn.innerHTML = '↑';\n    restoreBtn.title = 'Restore';\n    restoreBtn.onclick = () => restoreSubtask(gameId, st.id);\n    pill.appendChild(restoreBtn);\n    const delBtn = document.createElement('span');\n    delBtn.className = 'manage-pill-delete';\n    delBtn.innerHTML = '×';\n    delBtn.title = 'Delete forever';\n    delBtn.onclick = () => deleteSubtaskForever(gameId, st.id);\n    pill.appendChild(delBtn);\n    hPills.appendChild(pill);\n  });\n  hSec.appendChild(hPills);\n  popup.appendChild(hSec);\n\n  const close = document.createElement('button');\n  close.className = 'manage-close';\n  close.textContent = '× Close';\n  close.onclick = () => { manageSubtasksFor = null; render(); };\n  popup.appendChild(close);\n\n  document.body.appendChild(popup);\n}\n\nfunction escapeHtml(s) {\n  return String(s).replace(/&/g, '&amp;').replace(/<\u002Fg, '&lt;').replace(/>/g, '&gt;').replace(/\"/g, '&quot;');\n}\n\nfunction renderHeatmap() {\n  const container = document.getElementById('heatmap');\n  container.innerHTML = '';\n  const today = new Date(); today.setHours(0, 0, 0, 0);\n  const numWeeks = 12;\n  const dayOfWeek = (today.getDay() + 6) % 7;\n  const startDate = new Date(today); startDate.setDate(today.getDate() - dayOfWeek - (numWeeks - 1) * 7);\n  const showLabel = [true, false, true, false, true, false, false];\n  const dayLetters = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];\n\n  for (let row = 0; row < 7; row++) {\n    const label = document.createElement('div');\n    label.className = 'heatmap-row-label';\n    label.textContent = showLabel[row] ? dayLetters[row] : '';\n    container.appendChild(label);\n    for (let col = 0; col < numWeeks; col++) {\n      const cellDate = new Date(startDate);\n      cellDate.setDate(startDate.getDate() + col * 7 + row);\n      const key = dateKey(cellDate);\n      const isToday = key === todayKey();\n      const isViewing = key === viewDate;\n      const isFuture = cellDate > today;\n      const cell = document.createElement('div');\n      let cls = 'heatmap-cell';\n      if (isFuture) cls += ' future';\n      if (isToday && !isViewing) cls += ' today';\n      if (isViewing) cls += ' viewing';\n      cell.className = cls;\n      cell.dataset.dateKey = key;\n      if (!isFuture) {\n        cell.dataset.intensity = getDayIntensity(key);\n        cell.onclick = () => { viewDate = key; refreshDayView(); };\n        cell.addEventListener('mouseenter', () => {\n          const tt = document.getElementById('tooltip');\n          const dd = state.history[key];\n          let label = key;\n          const relevant = gamesInTierOnDate('tier1', key);\n          if (dd) {\n            let c = 0;\n            relevant.forEach(g => { if (dd.tier1 && dd.tier1[g.id] && dd.tier1[g.id].checkedIn) c++; });\n            label += ' · ' + c + '/' + relevant.length;\n          } else label += ' · —';\n          tt.textContent = label;\n          tt.classList.add('visible');\n        });\n        cell.addEventListener('mousemove', (e) => {\n          const tt = document.getElementById('tooltip');\n          tt.style.left = (e.clientX + 14) + 'px';\n          tt.style.top = (e.clientY - 32) + 'px';\n        });\n        cell.addEventListener('mouseleave', () => {\n          document.getElementById('tooltip').classList.remove('visible');\n        });\n      }\n      container.appendChild(cell);\n    }\n  }\n}\n\n// ============================================================\n// Auth\n// ============================================================\nasync function signIn() {\n  const { error } = await supabaseClient.auth.signInWithOAuth({\n    provider: 'google',\n    options: { redirectTo: window.location.href.split('#')[0].split('?')[0] }\n  });\n  if (error) { console.error(error); alert('Sign-in failed: ' + error.message); }\n}\n\nasync function signOut() {\n  await supabaseClient.auth.signOut();\n  session = null; state = null; viewDate = todayKey(); render();\n}\n\n// ============================================================\n// Data load\n// ============================================================\nasync function loadStateFromCloud() {\n  try {\n    const { data, error } = await supabaseClient\n      .from('tracker_data')\n      .select('data').eq('user_id', session.user.id).maybeSingle();\n    if (error) throw error;\n    if (data && data.data) {\n      state = migrate(data.data);\n      // Save back if migration changed shape\n      scheduleSave();\n    } else {\n      state = makeDefault();\n      scheduleSave();\n    }\n    render();\n  } catch (e) {\n    console.error('Load failed:', e);\n    alert('加载数据失败: ' + e.message);\n  }\n}\n\n// ============================================================\n// Export / Import\n// ============================================================\nfunction exportData() {\n  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });\n  const url = URL.createObjectURL(blob);\n  const a = document.createElement('a');\n  a.href = url; a.download = 'daily-ritual-' + todayKey() + '.json'; a.click();\n  URL.revokeObjectURL(url);\n}\n\nfunction importData() {\n  const input = document.createElement('input');\n  input.type = 'file'; input.accept = '.json,application/json';\n  input.onchange = (e) => {\n    const file = e.target.files[0]; if (!file) return;\n    const reader = new FileReader();\n    reader.onload = (ev) => {\n      try {\n        const imported = JSON.parse(ev.target.result);\n        if (!imported.config || !imported.history) { alert('Import失败: JSON结构不对'); return; }\n        showDialog({\n          title: 'Replace all data?',\n          message: 'Import 将<strong>覆盖<\u002Fstrong>当前所有云端数据。如果想恢复，可以重新 import 现在的 export 文件。',\n          confirmLabel: 'Replace',\n          danger: true\n        }).then(ok => {\n          if (!ok) return;\n          state = migrate(imported);\n          scheduleSave(); smoothRender();\n        });\n      } catch (err) { alert('Import失败: ' + err.message); }\n    };\n    reader.readAsText(file);\n  };\n  input.click();\n}\n\n// ============================================================\n// Init\n// ============================================================\nasync function init() {\n  const { data: { session: currentSession } } = await supabaseClient.auth.getSession();\n  session = currentSession;\n  supabaseClient.auth.onAuthStateChange((event, newSession) => {\n    session = newSession;\n    if (session && !state) loadStateFromCloud();\n    else if (!session) { state = null; render(); }\n  });\n  if (session) await loadStateFromCloud();\n  else render();\n}\n\ninit();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
