function makePickField(labelText, current, placeholder, list, listKey, onPick, isOutcome) {
  const wrap = document.createElement('div');
  wrap.className = 'ms-field';
  const lab = document.createElement('label'); lab.textContent = labelText; wrap.appendChild(lab);
  const pick = document.createElement('div');
  pick.className = 'mf-pick' + (current ? '' : ' empty');
  pick.innerHTML = `<span>${escapeHtml(current || placeholder)}</span><span style="color:var(--text-faint)">▾</span>`;
  pick.onclick = () => {
    const items = list.map(v => ({ value: v, label: v }));
    if (listKey) items.push({ value: '__add__', label: '＋ 新增…' });
    showPicker(pick, items, current, v => {
      if (v === '__add__') { promptNewValue(pick, listKey, nv => { onPick(nv); pick.querySelector('span').textContent = nv; pick.classList.remove('empty'); }); return; }
      onPick(v);
      pick.querySelector('span').textContent = v;
      pick.classList.toggle('empty', !v);
      pick.dispatchEvent(new Event('input', { bubbles: true }));
    });
  };
  wrap.appendChild(pick);
  return wrap;
}

function makeInputField(labelText, value, placeholder, onInput) {
  const wrap = document.createElement('div');
  wrap.className = 'ms-field';
  const lab = document.createElement('label'); lab.textContent = labelText; wrap.appendChild(lab);
  const input = document.createElement('input');
  input.type = 'text'; input.value = value || ''; input.placeholder = placeholder || '';
  input.oninput = () => onInput(input.value);
  wrap.appendChild(input);
  return wrap;
}

// ============================================================
// Journey view (历程) — four surfaces over the same milestone set
//   列表 list · 陈列 shelf · 长河 river · 星图 star
// ============================================================
let journeyOpen = false;
let _journeyFilter = { type: '', outcome: '', tag: '' };

function journeyView() {
  const v = state.config.journeyView;
  return (v === 'shelf' || v === 'river' || v === 'star') ? v : 'list';
}
function setJourneyView(v) { state.config.journeyView = v; scheduleSave(); render(); }

function openJourney() { journeyOpen = true; reviewOpen = false; _journeyFilter = { type: '', outcome: '', tag: '' }; render(); }
function closeJourney() { journeyOpen = false; render(); }

// Stable warm color per game (cross-refresh consistent) — drives river/star/shelf accents.
const GAME_PALETTE = ['#d2856b', '#c79a5b', '#b8763e', '#cf9f6f', '#bb8a6a', '#c98a7d', '#a98c5a', '#d0a07a', '#b5705a', '#c2a06b'];
function gameColor(id) {
  let h = 0; const s = id || '';
  for (let k = 0; k < s.length; k++) h = (h * 31 + s.charCodeAt(k)) >>> 0;
  return GAME_PALETTE[h % GAME_PALETTE.length];
}

// TIME colour — shares the review page's macaron ring. The unifying language for
// anything that marks a moment in time (month capsules, shelf accents).
function timeColorRGB(y, m, d, factor) {
  const mc = (typeof rvMacaron === 'function') ? rvMacaron(rvWeekT(new Date(y, m - 1, d))) : [184, 118, 62];
  const f = (factor == null) ? 1 : factor;
  return `rgb(${Math.round(mc[0] * f)},${Math.round(mc[1] * f)},${Math.round(mc[2] * f)})`;
}
// A month marker: time-coloured capsule (月) + year underneath/beside. Shared by
// list / river / star so every view speaks the same month language.
function makeMonthCapsule(ym, vertical) {
  const p = (ym || '').split('-').map(Number);
  const wrap = document.createElement('div');
  wrap.className = 'month-cap-wrap' + (vertical ? ' vert' : '');
  const cap = document.createElement('div');
  cap.className = 'month-cap';
  cap.style.background = timeColorRGB(p[0], p[1], 15, 0.66);
  cap.textContent = p[1] + '月';
  wrap.appendChild(cap);
  const yr = document.createElement('div');
  yr.className = 'month-cap-year'; yr.textContent = p[0];
  wrap.appendChild(yr);
  return wrap;
}
// Outcome fill for the star calendar (saturated forms of the pill palette).
const OUTCOME_FILL = {
  beaten: 'rgba(228,193,105,0.92)',
  completed: 'rgba(196,178,224,0.95)',
  sated: 'rgba(168,190,220,0.9)',
  abandoned: 'rgba(168,160,148,0.7)'
};

function collectMilestones() {
  const out = [];
  ['tier1', 'tier2', 'tier3'].forEach(tier => {
    state.config[tier].forEach(g => {
      if (g.hidden) return;
      (g.milestones || []).forEach(m => {
        out.push({ gameId: g.id, gameName: parsePlatform(g.name).base, platform: parsePlatform(g.name).platform, tags: Array.isArray(g.tags) ? g.tags : [], type: m.type || '', inst: m.inst || '', outcome: m.outcome || '', date: m.date || '', ending: m.ending || '', rating: m.rating, note: m.note || '', overall: (g.milestones || []).some(z => FINISHING_TYPES.indexOf(z.type) !== -1) });
      });
    });
  });
  return out;
}

function renderJourney() {
  const root = document.getElementById('root');
  root.innerHTML = '';

  // ---- Header ----
  const head = document.createElement('div');
  head.className = 'journey-head narrow';
  const back = document.createElement('span');
  back.className = 'journey-back'; back.textContent = '‹ 返回';
  back.onclick = closeJourney;
  head.appendChild(back);
  const title = document.createElement('div');
  title.className = 'journey-title'; title.textContent = '历程';
  head.appendChild(title);
  root.appendChild(head);

  const all = collectMilestones();
  const view = journeyView();

  // ---- View switcher ----
  const switcher = document.createElement('div');
  switcher.className = 'journey-switcher narrow';
  [['list', '列表'], ['shelf', '陈列'], ['river', '长河'], ['star', '星图']].forEach(([v, label]) => {
    const seg = document.createElement('span');
    seg.className = 'jv-seg' + (view === v ? ' active' : '');
    seg.textContent = label;
    seg.onclick = () => { if (view !== v) setJourneyView(v); };
    switcher.appendChild(seg);
  });
  root.appendChild(switcher);

  // ---- Filters (shared) ----
  const distinct = (key) => [...new Set(all.map(x => x[key]).filter(Boolean))];
  const distinctTags = [...new Set(all.flatMap(x => x.tags || []))];
  const filtersWrap = document.createElement('div');
  filtersWrap.className = 'narrow';
  const addFilterRow = (labelText, key, values, labelFn) => {
    if (values.length < 2) return;
    const rowEl = document.createElement('div');
    rowEl.className = 'journey-filters';
    const gl = document.createElement('span'); gl.className = 'jf-group-label'; gl.textContent = labelText; rowEl.appendChild(gl);
    const mk = (val, text) => {
      const chip = document.createElement('span');
      chip.className = 'jf-chip' + (_journeyFilter[key] === val ? ' active' : '');
      chip.textContent = text;
      chip.onclick = () => { _journeyFilter[key] = (_journeyFilter[key] === val ? '' : val); render(); };
      return chip;
    };
    rowEl.appendChild(mk('', '全部'));
    values.forEach(v => rowEl.appendChild(mk(v, labelFn ? labelFn(v) : v)));
    filtersWrap.appendChild(rowEl);
  };
  addFilterRow('类型', 'type', distinct('type'));
  addFilterRow('了结', 'outcome', distinct('outcome'), o => TIER2_COMPLETION_LABELS[o] || o);
  addFilterRow('标签', 'tag', distinctTags);
  root.appendChild(filtersWrap);

  const match = x =>
    (!_journeyFilter.type || x.type === _journeyFilter.type) &&
    (!_journeyFilter.outcome || x.outcome === _journeyFilter.outcome) &&
    (!_journeyFilter.tag || (x.tags || []).indexOf(_journeyFilter.tag) !== -1);

  // ---- Body (per view) ----
  const body = document.createElement('div');
  body.className = 'narrow journey-body';
  root.appendChild(body);

  if (all.length === 0) { journeyEmpty(body, '还没有里程碑'); return; }

  if (view === 'list') renderJList(body, all.filter(match).sort(byDateDesc));
  else if (view === 'shelf') renderJShelf(body, all, match);
  else if (view === 'river') renderJRiver(body, all.filter(match).sort(byDateDesc));
  else if (view === 'star') renderJStar(body, all.filter(match));
}

function byDateDesc(a, b) { return (a.date || '') < (b.date || '') ? 1 : -1; }
function journeyEmpty(container, msg) {
  const e = document.createElement('div'); e.className = 'jr-empty'; e.textContent = msg;
  container.appendChild(e);
}
function outcomePill(outcome) {
  const pill = document.createElement('span');
  pill.className = 'status-pill'; pill.dataset.status = outcome;
  pill.textContent = TIER2_COMPLETION_LABELS[outcome] || outcome;
  return pill;
}

// ---- 列表 ----
function renderJList(container, rows) {
  if (rows.length === 0) { journeyEmpty(container, '这个筛选下没有里程碑'); return; }
  let curMonth = null;
  rows.forEach(x => {
    const month = (x.date || '????-??').slice(0, 7);
    if (month !== curMonth) {
      curMonth = month;
      const mh = makeMonthCapsule(month, false); mh.classList.add('jlist-month');
      container.appendChild(mh);
    }
    const row = document.createElement('div');
    row.className = 'journey-row';
    row.onclick = () => openDetail(x.gameId);
    const date = document.createElement('div'); date.className = 'jr-date'; date.textContent = (x.date || '').slice(5);
    row.appendChild(date);
    const mid = document.createElement('div'); mid.className = 'jr-mid';
    const gn = document.createElement('div'); gn.className = 'jr-game'; gn.textContent = x.gameName; mid.appendChild(gn);
    const node = document.createElement('div'); node.className = 'jr-node';
    let txt = x.type || ''; if (x.inst) txt += ' · ' + x.inst;
    const ts = document.createElement('span'); ts.textContent = txt; node.appendChild(ts);
    if (x.ending) { const e = document.createElement('span'); e.textContent = x.ending; node.appendChild(e); }
    if (x.rating !== '' && x.rating != null) { const r = document.createElement('span'); r.className = 'ms-rating'; r.textContent = '★ ' + x.rating; node.appendChild(r); }
    mid.appendChild(node); row.appendChild(mid);
    if (x.outcome) row.appendChild(outcomePill(x.outcome));
    container.appendChild(row);
  });
}

// ---- 陈列 (奖杯墙) — game-level; whole card qualifies if any node matches ----
function renderJShelf(container, all, match) {
  const byGame = {};
  all.forEach(x => {
    if (!byGame[x.gameId]) byGame[x.gameId] = { id: x.gameId, name: x.gameName, platform: x.platform, tags: x.tags || [], overall: x.overall, nodes: [] };
    byGame[x.gameId].nodes.push(x);
  });
  let games = Object.values(byGame).filter(g => g.nodes.some(match));
  if (games.length === 0) { journeyEmpty(container, '这个筛选下没有里程碑'); return; }
  games.forEach(g => g.nodes.sort(byDateDesc));
  games.sort((a, b) => (a.nodes[0].date || '') < (b.nodes[0].date || '') ? 1 : -1);

  const grid = document.createElement('div'); grid.className = 'shelf-grid';
  games.forEach(g => {
    const card = document.createElement('div');
    card.className = 'shelf-card';
    const rd = (g.nodes[0] && g.nodes[0].date ? g.nodes[0].date : '').split('-').map(Number);
    card.style.setProperty('--gc', rd.length === 3 ? timeColorRGB(rd[0], rd[1], rd[2], 0.9) : 'var(--accent)');
    card.onclick = () => openDetail(g.id);

    const top = document.createElement('div'); top.className = 'shelf-top';
    const nm = document.createElement('div'); nm.className = 'shelf-name'; nm.textContent = g.name; top.appendChild(nm);
    const years = [...new Set(g.nodes.map(n => (n.date || '').slice(0, 4)).filter(Boolean))].sort();
    if (years.length) { const yr = document.createElement('span'); yr.className = 'shelf-year'; yr.textContent = years.length === 1 ? years[0] : years[0] + '–' + years[years.length - 1]; top.appendChild(yr); }
    if (g.overall) { const seal = document.createElement('span'); seal.className = 'shelf-seal'; seal.textContent = '✦'; seal.title = '已通关'; top.appendChild(seal); }
    card.appendChild(top);

    if (g.platform || (g.tags && g.tags.length)) {
      const tags = document.createElement('div'); tags.className = 'shelf-tags';
      [...(g.tags || []), g.platform].filter(Boolean).forEach(t => { const s = document.createElement('span'); s.className = 'shelf-tag'; s.textContent = t; tags.appendChild(s); });
      card.appendChild(tags);
    }

    const badges = document.createElement('div'); badges.className = 'shelf-badges';
    g.nodes.forEach(n => {
      const b = document.createElement('div'); b.className = 'shelf-badge'; b.dataset.status = n.outcome;
      let label = n.type || ''; if (n.inst) label += ' · ' + n.inst; if (n.ending) label += ' · ' + n.ending;
      const t = document.createElement('span'); t.className = 'sb-label'; t.textContent = label; b.appendChild(t);
      const d = document.createElement('span'); d.className = 'sb-date'; d.textContent = (n.date || '').slice(5); b.appendChild(d);
      badges.appendChild(b);
    });
    card.appendChild(badges);
    grid.appendChild(card);
  });
  container.appendChild(grid);
}

// ---- 长河 (时间线) — fixed-height rows + SVG rail, same-game dots strung in color ----
function renderJRiver(container, rows) {
  if (rows.length === 0) { journeyEmpty(container, '这个筛选下没有里程碑'); return; }
  // Layout columns: [month gutter][rail][content]
  const RH = 66, GUTTER = 58, RAIL = 20, DOTX = 10, CONTENT_LEFT = GUTTER + RAIL;
  const wrap = document.createElement('div'); wrap.className = 'river-wrap'; wrap.style.height = (rows.length * RH) + 'px';

  // SVG rail sits right of the month gutter
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('class', 'river-svg');
  svg.setAttribute('width', RAIL); svg.setAttribute('height', rows.length * RH);
  svg.style.left = GUTTER + 'px';

  const byGame = {};
  rows.forEach((x, i) => { (byGame[x.gameId] = byGame[x.gameId] || []).push(i); });
  Object.keys(byGame).forEach(gid => {
    const idxs = byGame[gid]; if (idxs.length < 2) return;
    let d = '';
    idxs.forEach((i, k) => { d += (k === 0 ? 'M' : 'L') + DOTX + ' ' + (i * RH + RH / 2) + ' '; });
    const path = document.createElementNS(svgNS, 'path');
    path.setAttribute('d', d); path.setAttribute('stroke', gameColor(gid));
    path.setAttribute('stroke-width', '1.6'); path.setAttribute('fill', 'none');
    path.setAttribute('opacity', '0.4'); path.setAttribute('stroke-linecap', 'round');
    svg.appendChild(path);
  });
  rows.forEach((x, i) => {
    const c = document.createElementNS(svgNS, 'circle');
    c.setAttribute('cx', DOTX); c.setAttribute('cy', i * RH + RH / 2); c.setAttribute('r', '4.5');
    c.setAttribute('fill', gameColor(x.gameId)); c.setAttribute('stroke', 'var(--bg)'); c.setAttribute('stroke-width', '2');
    svg.appendChild(c);
  });
  wrap.appendChild(svg);

  // Month markers: own left column — a TIME-coloured capsule (shares the review
  // page's macaron ring, so month = a colour) + the year underneath, faint.
  let curMonth = null;
  rows.forEach((x, i) => {
    const month = (x.date || '').slice(0, 7);
    if (month !== curMonth) {
      curMonth = month;
      const ml = document.createElement('div'); ml.className = 'river-month';
      ml.style.top = (i * RH) + 'px'; ml.style.height = RH + 'px'; ml.style.width = GUTTER + 'px';
      ml.appendChild(makeMonthCapsule(month, true));
      wrap.appendChild(ml);
    }
  });

  // Content rows, right of the rail
  rows.forEach((x, i) => {
    const row = document.createElement('div');
    row.className = 'river-row'; row.style.top = (i * RH) + 'px'; row.style.height = RH + 'px'; row.style.left = CONTENT_LEFT + 'px';
    row.onclick = () => openDetail(x.gameId);
    const date = document.createElement('div'); date.className = 'river-date'; date.textContent = (x.date || '').slice(5); row.appendChild(date);
    const gn = document.createElement('div'); gn.className = 'river-game'; gn.textContent = x.gameName; row.appendChild(gn);
    const node = document.createElement('div'); node.className = 'river-node';
    let txt = x.type || ''; if (x.inst) txt += ' · ' + x.inst; if (x.ending) txt += ' · ' + x.ending;
    const ts = document.createElement('span'); ts.textContent = txt; node.appendChild(ts);
    if (x.outcome) node.appendChild(outcomePill(x.outcome));
    row.appendChild(node);
    wrap.appendChild(row);
  });
  container.appendChild(wrap);
}

// ---- 星图 (到达热力) — calendar echo of the heartbeat heatmap; lit days = reaches ----
function renderJStar(container, nodes) {
  if (nodes.length === 0) { journeyEmpty(container, '这个筛选下没有里程碑'); return; }
  const byDate = {};
  nodes.forEach(x => { if (x.date) (byDate[x.date] = byDate[x.date] || []).push(x); });
  const months = [...new Set(nodes.map(x => (x.date || '').slice(0, 7)).filter(Boolean))].sort();
  const grid = document.createElement('div'); grid.className = 'star-months';
  months.forEach(ym => grid.appendChild(buildStarMonth(ym, byDate)));
  container.appendChild(grid);

  // legend
  const legend = document.createElement('div'); legend.className = 'star-legend';
  ['beaten', 'completed', 'sated', 'abandoned'].forEach(o => {
    const item = document.createElement('span'); item.className = 'star-legend-item';
    const dot = document.createElement('span'); dot.className = 'star-legend-dot'; dot.style.background = OUTCOME_FILL[o];
    item.appendChild(dot);
    const t = document.createElement('span'); t.textContent = TIER2_COMPLETION_LABELS[o]; item.appendChild(t);
    legend.appendChild(item);
  });
  container.appendChild(legend);
}

function buildStarMonth(ym, byDate) {
  const [y, m] = ym.split('-').map(Number);
  const wrap = document.createElement('div'); wrap.className = 'star-month';
  const label = makeMonthCapsule(ym, false); label.classList.add('star-month-cap'); wrap.appendChild(label);

  const grid = document.createElement('div'); grid.className = 'star-grid';
  ['一', '二', '三', '四', '五', '六', '日'].forEach(w => { const h = document.createElement('div'); h.className = 'star-wd'; h.textContent = w; grid.appendChild(h); });

  const firstWd = new Date(y, m - 1, 1).getDay();      // 0=Sun
  const lead = (firstWd + 6) % 7;                        // Monday-first
  const days = new Date(y, m, 0).getDate();
  for (let i = 0; i < lead; i++) { const c = document.createElement('div'); c.className = 'star-cell empty'; grid.appendChild(c); }
  for (let d = 1; d <= days; d++) {
    const key = ym + '-' + String(d).padStart(2, '0');
    const cell = document.createElement('div'); cell.className = 'star-cell';
    const hits = byDate[key];
    if (hits && hits.length) {
      const top = hits.slice().sort((a, b) => (OUTCOME_RANK[b.outcome] || 0) - (OUTCOME_RANK[a.outcome] || 0))[0];
      cell.classList.add('lit');
      cell.style.background = OUTCOME_FILL[top.outcome] || 'var(--accent)';
      cell.title = hits.map(h => h.gameName + ' · ' + h.type + (h.inst ? '·' + h.inst : '')).join('\n');
      if (hits.length > 1) { const n = document.createElement('span'); n.className = 'star-n'; n.textContent = hits.length; cell.appendChild(n); }
      cell.onclick = () => openDetail(top.gameId);
    }
    const num = document.createElement('span'); num.className = 'star-num'; num.textContent = d; cell.appendChild(num);
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);
  return wrap;
}

// ============================================================
// SORT ENGINE — per-group sort chains, presets, range-apply.
// Reusable-ish: chain/comparator logic is decoupled from the DR-specific
// group definitions so it could be lifted into other apps later.
// ============================================================

// The six sortable dimensions (real wording, Chinese to match the UI).
const SORT_KEYS = [
  { key: 'pinyin',    label: '拼音' },
  { key: 'lastCheck', label: '上次打卡' },
  { key: 'platform',  label: '平台' },
  { key: 'added',     label: '加入时间' },
  { key: 'lastMs',    label: '最近里程碑' },
  { key: 'msCount',   label: '里程碑数' },
  { key: 'extra',     label: '深入', only: 'tier1' },
];
function sortKeyLabel(k) { const f = SORT_KEYS.find(x => x.key === k); return f ? f.label : k; }

// The five sortable groups. label uses the app's REAL wording.
const GROUP_DEFS = [
  { key: 'tier1',              tier: 'tier1', status: null,          label: 'Company' },
  { key: 'tier2',              tier: 'tier2', status: null,          label: 'Playing' },
  { key: 'tier3:up_next',     tier: 'tier3', status: 'up_next',     label: 'Up next' },
  { key: 'tier3:considering', tier: 'tier3', status: 'considering', label: 'Considering' },
  { key: 'tier3:backlog',     tier: 'tier3', status: 'backlog',     label: 'Backlog' },
];
function parseGroupKey(k) { const i = k.indexOf(':'); return i === -1 ? { tier: k, status: null } : { tier: k.slice(0, i), status: k.slice(i + 1) }; }
function groupKeyOf(tier, game) { return tier === 'tier3' ? 'tier3:' + (game.status || 'considering') : tier; }

// Each group's accent colour (CSS var) — used to tint its sort bar to match the region.
const GROUP_NAME_VAR = {
  'tier1': 'var(--day-name)',
  'tier2': 'var(--play-name)',
  'tier3:up_next': 'var(--up-name)',
  'tier3:considering': 'var(--con-name)',
  'tier3:backlog': 'var(--back-name)',
};
// Light summary of a chain for the collapsed state (labels only, e.g. "上次打卡 · 拼音").
function chainSummary(chain) { return (chain || []).map(s => sortKeyLabel(s.key)).join(' · '); }

// Per-group state lives in config (so it syncs and survives refresh). Idempotent.
function ensureGroupSort(st) {
  st = st || state;
  if (!st || !st.config) return;
  if (!st.config.groupSort) st.config.groupSort = {};
  GROUP_DEFS.forEach(d => {
    const g = st.config.groupSort[d.key];
    if (!g) st.config.groupSort[d.key] = { chain: [], dirty: false, presets: [], barOpen: false };
    else { if (!Array.isArray(g.chain)) g.chain = []; if (!Array.isArray(g.presets)) g.presets = []; if (typeof g.dirty !== 'boolean') g.dirty = false; if (typeof g.barOpen !== 'boolean') g.barOpen = false; }
  });
}
function groupSortState(key) { ensureGroupSort(); return state.config.groupSort[key]; }

// Which visible games belong to a group (hidden games are never sorted/moved).
function memberPredicate(tier, status) {
  if (tier === 'tier1') return g => !g.hidden;
  if (tier === 'tier2') return g => !g.hidden && !g.completion;       // Playing = active tier2
  return g => !g.hidden && (g.status || 'considering') === status;     // a roster status group
}
function groupMembers(tier, status) { return (state.config[tier] || []).filter(memberPredicate(tier, status)); }

// Last day this game was checked in under ANY tier (it may have moved tiers).
function lastCheckInDate(id) {
  const dates = Object.keys(state.history || {}).sort().reverse();
  for (const d of dates) {
    const day = state.history[d]; if (!day) continue;
    if ((day.tier1 && day.tier1[id] && day.tier1[id].checkedIn === true)
      || (day.tier2 && day.tier2[id] === true)
      || (day.tier3 && day.tier3[id] === true)) return d;
  }
  return '';
}

function gameSortValue(g, key) {
  switch (key) {
    case 'pinyin':    return parsePlatform(g.name).base || '';
    case 'platform':  return parsePlatform(g.name).platform || '';
    case 'added':     return g.createdAt || '';
    case 'lastCheck': return lastCheckInDate(g.id) || '';
    case 'lastMs':    return g.lastMilestone || '';
    case 'msCount':   return (g.milestones || []).length;
    case 'extra': {
      const d = state.history[viewDate];
      return (d && d.tier1 && d.tier1[g.id] && d.tier1[g.id].extra) ? 1 : 0;
    }
    default:          return '';
  }
}

// Name collation: latin/numbers before CJK; within each, locale-aware. Same base
// name → compares EQUAL, so identical titles never get split apart (they fall to
// the next chain key, e.g. platform, and stay adjacent).
function _firstChar(s) { const t = String(s).trim(); return t ? t[0] : ''; }
function isLatinFirst(s) { return /[A-Za-z0-9]/.test(_firstChar(s)); }
function collateName(a, b) {
  const la = isLatinFirst(a), lb = isLatinFirst(b);
  if (la !== lb) return la ? -1 : 1;
  try { return String(a).localeCompare(String(b), la ? undefined : 'zh', { numeric: true, sensitivity: 'base' }); }
  catch (e) { return a < b ? -1 : a > b ? 1 : 0; }
}

// Stable multi-level comparator. Empties (no platform / never checked / no
// milestone) always sink to the bottom regardless of direction.
function compareChain(a, b, chain) {
  for (const step of (chain || [])) {
    const key = step.key, dir = step.dir || 'asc';
    const va = gameSortValue(a, key), vb = gameSortValue(b, key);
    const numeric = (key === 'msCount' || key === 'extra');
    const ea = !numeric && (va === '' || va == null);
    const eb = !numeric && (vb === '' || vb == null);
    if (ea && eb) continue;
    if (ea) return 1;
    if (eb) return -1;
    let cmp;
    if (key === 'pinyin' || key === 'platform') cmp = collateName(String(va), String(vb));
    else if (numeric) cmp = va - vb;
    else cmp = va < vb ? -1 : va > vb ? 1 : 0;
    if (cmp !== 0) return dir === 'desc' ? -cmp : cmp;
  }
  return 0;
}

// Write a desired id order back into config[tier], replacing only this group's
// slots (hidden games / other statuses / finished stay put). Never throws: ids
// not present are skipped; short/extra lists fall back to the original game.
function reorderGroup(tier, status, sortedIds) {
  const arr = state.config[tier] || [];
  const inGroup = memberPredicate(tier, status);
  const byId = new Map(arr.map(g => [g.id, g]));
  const queue = sortedIds.filter(id => byId.has(id));
  let qi = 0;
  state.config[tier] = arr.map(g => inGroup(g) ? (byId.get(queue[qi++]) || g) : g);
}

// Apply a group's current chain → freeze the result into the array order.
function applySortChain(groupKey) {
  const gs = groupSortState(groupKey); const { tier, status } = parseGroupKey(groupKey);
  const members = groupMembers(tier, status);
  const sorted = members.slice().sort((a, b) => compareChain(a, b, gs.chain));
  reorderGroup(tier, status, sorted.map(g => g.id));
  gs.dirty = false; scheduleSave(); smoothRender();
}

// Chain edits apply immediately (a human action → a fixed state).
function chainAddKey(groupKey, key) { const gs = groupSortState(groupKey); if (gs.chain.some(s => s.key === key)) return; gs.chain.push({ key, dir: key === 'extra' ? 'desc' : 'asc' }); applySortChain(groupKey); }
function chainToggleDir(groupKey, key) { const gs = groupSortState(groupKey); const s = gs.chain.find(x => x.key === key); if (s) { s.dir = s.dir === 'asc' ? 'desc' : 'asc'; applySortChain(groupKey); } }
function chainRemoveKey(groupKey, key) { const gs = groupSortState(groupKey); gs.chain = gs.chain.filter(s => s.key !== key); applySortChain(groupKey); }
function chainClear(groupKey) { const gs = groupSortState(groupKey); gs.chain = []; gs.dirty = false; scheduleSave(); smoothRender(); }

// A manual drag breaks the chain → keep it but flag dirty (only if a chain exists).
function markGroupDirtyByGame(tier, game) {
  const key = groupKeyOf(tier, game);
  const gs = state.config.groupSort && state.config.groupSort[key];
  if (gs && Array.isArray(gs.chain) && gs.chain.length) gs.dirty = true;
}

// Copy ONE chain into many groups (independent copies) and apply to each.
function applyChainToGroups(chain, groupKeys) {
  groupKeys.forEach(k => {
    const gs = groupSortState(k);
    gs.chain = JSON.parse(JSON.stringify(chain || []));
    const { tier, status } = parseGroupKey(k);
    const sorted = groupMembers(tier, status).slice().sort((a, b) => compareChain(a, b, gs.chain));
    reorderGroup(tier, status, sorted.map(g => g.id));
    gs.dirty = false;
  });
  scheduleSave(); smoothRender();
}

// Presets: named order snapshots (id-order + the chain at save time), per group.
function savePreset(groupKey, name) {
  const gs = groupSortState(groupKey); const { tier, status } = parseGroupKey(groupKey);
  const order = groupMembers(tier, status).map(g => g.id);
  const id = 'ps_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  gs.presets.push({ id, name: (name || ('预设 ' + (gs.presets.length + 1))).trim(), order, chain: JSON.parse(JSON.stringify(gs.chain || [])) });
  scheduleSave();
  return id;
}
function deletePreset(groupKey, presetId) { const gs = groupSortState(groupKey); gs.presets = gs.presets.filter(p => p.id !== presetId); scheduleSave(); smoothRender(); }
// Restore a (possibly stale) preset. Existing games → preset order; NEW games not
// in the preset → placed via the preset's chain (else appended); deleted ids
// ignored. Any uncertainty falls through to "append at end" — never errors.
function applyPreset(groupKey, presetId) {
  const gs = groupSortState(groupKey); const p = gs.presets.find(x => x.id === presetId); if (!p) return;
  const { tier, status } = parseGroupKey(groupKey);
  const members = groupMembers(tier, status);
  const memberIds = new Set(members.map(g => g.id));
  const inPreset = new Set(p.order);
  const ordered = p.order.filter(id => memberIds.has(id));
  const missing = members.filter(g => !inPreset.has(g.id));
  let tail;
  if (p.chain && p.chain.length) tail = missing.slice().sort((a, b) => compareChain(a, b, p.chain)).map(g => g.id);
  else tail = missing.map(g => g.id);
  reorderGroup(tier, status, ordered.concat(tail));
  gs.chain = JSON.parse(JSON.stringify(p.chain || []));
  gs.dirty = false; scheduleSave(); smoothRender();
}

// ============================================================
// SORT UI — the per-group sort bar (chips + presets + range apply).
// ============================================================

// Generic text-input popover (mirrors promptNewValue but not config-coupled).
function promptText(anchor, placeholder, onDone) {
  const input = document.createElement('input');
  input.type = 'text'; input.className = 'mf-inline-add'; input.placeholder = placeholder || '';
  input.style.cssText = 'position:absolute;z-index:700;border:1px solid var(--accent);background:var(--bg);border-radius:9px;padding:7px 9px;font-family:var(--body-font);font-size:13px;color:var(--text);min-width:160px;';
  const r = anchor.getBoundingClientRect();
  input.style.left = Math.min(r.left, window.innerWidth - 180) + 'px';
  input.style.top = (r.bottom + 6) + 'px';
  let done = false;
  const commit = (save) => { if (done) return; done = true; const v = input.value.trim(); input.remove(); if (save && v) onDone(v); };
  input.onkeydown = (e) => { if (e.key === 'Enter') commit(true); else if (e.key === 'Escape') commit(false); };
  input.onblur = () => commit(true);
  document.body.appendChild(input);
  setTimeout(() => input.focus(), 0);
}

// A custom popover that reuses the picker host + dismiss behaviour.
function customPopover(anchor, build) {
  closePicker();
  const host = document.getElementById('picker-host');
  const menu = document.createElement('div'); menu.className = 'picker-menu';
  build(menu, () => closePicker());
  host.appendChild(menu);
  const rect = anchor.getBoundingClientRect();
  const mw = menu.offsetWidth, mh = menu.offsetHeight;
  let top = rect.bottom + 6, left = rect.left;
  if (left + mw > window.innerWidth - 12) left = window.innerWidth - mw - 12;
  if (left < 12) left = 12;
  if (top + mh > window.innerHeight - 12) top = rect.top - mh - 6;
  menu.style.top = top + 'px'; menu.style.left = left + 'px';
  const onDoc = (e) => { if (!menu.contains(e.target)) closePicker(); };
  const onKey = (e) => { if (e.key === 'Escape') closePicker(); };
  setTimeout(() => { document.addEventListener('mousedown', onDoc); document.addEventListener('keydown', onKey); }, 0);
  menu._cleanup = () => { document.removeEventListener('mousedown', onDoc); document.removeEventListener('keydown', onKey); };
}

// Routes a group's sort controls: collapsed → entry in the title row (headerEl),
// expanded → full bar in the body container (bodyEl). Used by Daily / Playing.
function renderSortControls(groupKey, headerEl, bodyEl, hasVisible) {
  if (bodyEl) bodyEl.innerHTML = '';
  if (headerEl) { const old = headerEl.querySelector('.sort-headentry'); if (old) old.remove(); }
  if (!hasVisible) return;
  const gs = groupSortState(groupKey);
  if (gs.barOpen) { if (bodyEl) bodyEl.appendChild(buildSortBar(groupKey)); }
  else { if (headerEl) headerEl.appendChild(buildSortHeadEntry(groupKey)); }
}

// Collapsed entry — a low-profile pill that lives at the RIGHT END of the group's
// title row (section-header / roster-group-head). Muted by default; reveals the
// region colour on hover. Click → expand the full bar below.
function buildSortHeadEntry(groupKey) {
  const gs = groupSortState(groupKey);
  const btn = document.createElement('button');
  btn.className = 'sort-headentry';
  const tone = GROUP_NAME_VAR[groupKey];
  if (tone) btn.style.setProperty('--g-name', tone);
  const sum = chainSummary(gs.chain);
  btn.innerHTML = `<span class="she-icon">⇅</span><span class="she-sum">${escapeHtml(sum || 'SORT')}</span>` + (gs.dirty ? `<span class="she-dirty"> ·已改</span>` : '');
  btn.title = '展开排序';
  btn.onclick = (e) => { e.stopPropagation(); gs.barOpen = true; scheduleSave(); smoothRender(); };
  return btn;
}

// Expanded bar — chips + controls, dropped into a row below the title. Leading ⇅
// collapses it back into the title row. Only rendered when the group is open.
function buildSortBar(groupKey) {
  ensureGroupSort();
  const gs = groupSortState(groupKey);
  const bar = document.createElement('div'); bar.className = 'sortbar open';
  const tone = GROUP_NAME_VAR[groupKey];
  if (tone) bar.style.setProperty('--g-name', tone);

  const toggle = document.createElement('button'); toggle.className = 'sort-toggle';
  toggle.innerHTML = `<span class="sort-tg-icon">⇅</span>`;
  toggle.title = '收起排序';
  toggle.onclick = () => { gs.barOpen = false; scheduleSave(); smoothRender(); };
  bar.appendChild(toggle);

  gs.chain.forEach((step, idx) => {
    if (idx > 0) { const sep = document.createElement('span'); sep.className = 'sort-sep'; sep.textContent = '›'; bar.appendChild(sep); }
    const chip = document.createElement('span'); chip.className = 'sort-chip';
    const lab = document.createElement('button'); lab.className = 'sort-chip-lab';
    lab.innerHTML = `${escapeHtml(sortKeyLabel(step.key))} <span class="sort-arrow">${step.dir === 'desc' ? '↓' : '↑'}</span>`;
    lab.title = '点击切换升 / 降序';
    lab.onclick = () => chainToggleDir(groupKey, step.key);
    const x = document.createElement('button'); x.className = 'sort-chip-x'; x.textContent = '✕'; x.title = '移除这一层';
    x.onclick = (e) => { e.stopPropagation(); chainRemoveKey(groupKey, step.key); };
    chip.appendChild(lab); chip.appendChild(x); bar.appendChild(chip);
  });

  const add = document.createElement('button'); add.className = 'sort-add';
  add.textContent = gs.chain.length ? '＋' : '＋ SORT';
  add.title = '加一层排序';
  add.onclick = () => openAddKeyMenu(add, groupKey);
  bar.appendChild(add);

  if (gs.chain.length) {
    const resort = document.createElement('button'); resort.className = 'sort-resort';
    resort.innerHTML = '↻';
    resort.title = '按当前排序重新整理';
    resort.onclick = () => applySortChain(groupKey);
    bar.appendChild(resort);
  }

  if (gs.dirty) {
    const d = document.createElement('span'); d.className = 'sort-dirty'; d.textContent = '自定 ·已改';
    d.title = '排序后手动调整过 — 点任一排序项可重新套用';
    bar.appendChild(d);
  }

  const sp = document.createElement('span'); sp.className = 'sort-spacer'; bar.appendChild(sp);

  const pre = document.createElement('button'); pre.className = 'sort-ctrl';
  pre.innerHTML = `PRESET <span class="ctrl-caret">▾</span>`; pre.title = '保存 / 切换顺序快照';
  pre.onclick = () => openPresetMenu(pre, groupKey);
  bar.appendChild(pre);

  const rng = document.createElement('button'); rng.className = 'sort-ctrl';
  rng.innerHTML = `APPLY TO <span class="ctrl-caret">▾</span>`; rng.title = '把这条排序套用到其他组';
  if (!gs.chain.length) rng.classList.add('disabled');
  rng.onclick = () => { if (gs.chain.length) openRangeMenu(rng, groupKey); };
  bar.appendChild(rng);

  return bar;
}

function openAddKeyMenu(anchor, groupKey) {
  const gs = groupSortState(groupKey);
  const used = new Set(gs.chain.map(s => s.key));
  const items = SORT_KEYS
    .filter(k => !used.has(k.key) && (!k.only || k.only === parseGroupKey(groupKey).tier))
    .map(k => ({ value: k.key, label: k.label }));
  if (!items.length) return;
  showPicker(anchor, items, null, v => chainAddKey(groupKey, v));
}

function openPresetMenu(anchor, groupKey) {
  const gs = groupSortState(groupKey);
  const items = gs.presets.map(p => ({ value: 'apply:' + p.id, label: p.name }));
  items.push({ value: 'save', label: '＋ 存为快照…', clear: true });
  if (gs.presets.length) items.push({ value: 'del', label: '删除快照…' });
  showPicker(anchor, items, null, v => {
    if (v === 'save') { promptText(anchor, '快照名称', name => savePreset(groupKey, name)); }
    else if (v === 'del') {
      const dels = gs.presets.map(p => ({ value: p.id, label: p.name }));
      if (dels.length) showPicker(anchor, dels, null, id => {
        const removed = gs.presets.find(p => p.id === id);
        deletePreset(groupKey, id);
        if (removed) showToast({ message: `已删除快照「${removed.name}」`, actionLabel: '撤销', onAction: () => { gs.presets.push(removed); scheduleSave(); smoothRender(); } });
      });
    }
    else if (v.indexOf('apply:') === 0) { applyPreset(groupKey, v.slice(6)); }
  });
}

function openRangeMenu(anchor, groupKey) {
  const gs = groupSortState(groupKey);
  const chain = JSON.parse(JSON.stringify(gs.chain || []));
  customPopover(anchor, (menu, close) => {
    const title = document.createElement('div'); title.className = 'rng-title'; title.textContent = '把这条排序套用到：'; menu.appendChild(title);
    const selected = new Set([groupKey]);
    const wrap = document.createElement('div'); wrap.className = 'rng-pills';
    const refs = [];
    GROUP_DEFS.forEach(d => {
      const pill = document.createElement('button'); pill.className = 'rng-pill' + (selected.has(d.key) ? ' on' : '');
      pill.style.setProperty('--pill-c', GROUP_NAME_VAR[d.key] || 'var(--accent)');
      pill.textContent = d.label;
      pill.onclick = () => { if (selected.has(d.key)) selected.delete(d.key); else selected.add(d.key); pill.classList.toggle('on'); syncAll(); };
      refs.push({ d, pill }); wrap.appendChild(pill);
    });
    menu.appendChild(wrap);
    const actions = document.createElement('div'); actions.className = 'rng-actions';
    const allBtn = document.createElement('button'); allBtn.className = 'rng-act';
    const isAll = () => GROUP_DEFS.every(d => selected.has(d.key));
    const syncAll = () => { allBtn.textContent = isAll() ? '全不选' : '全选'; };
    allBtn.onclick = () => {
      if (isAll()) { selected.clear(); selected.add(groupKey); } else { GROUP_DEFS.forEach(d => selected.add(d.key)); }
      refs.forEach(({ d, pill }) => pill.classList.toggle('on', selected.has(d.key))); syncAll();
    };
    syncAll();
    const apply = document.createElement('button'); apply.className = 'rng-act primary'; apply.textContent = '套用';
    apply.style.setProperty('--pill-c', GROUP_NAME_VAR[groupKey] || 'var(--accent)');
    apply.onclick = () => { applyChainToGroups(chain, Array.from(selected)); close(); };
    actions.appendChild(allBtn); actions.appendChild(apply); menu.appendChild(actions);
  });
}
