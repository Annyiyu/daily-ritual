// ============================================================
// Migration: old data shape → new
// ============================================================
function migrate(state) {
  if (!state.config) state.config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  if (!state.history) state.history = {};

  // Tier 3 status mapping: old → new
  const oldToNewStatus = {
    'playing': 'considering',
    'paused': 'backlog',
    'done': 'backlog'
  };
  state.config.tier3 = (state.config.tier3 || []).map(g => {
    const newStatus = oldToNewStatus[g.status] || g.status || 'considering';
    return { ...g, status: newStatus };
  });

  // "Genesis date" — used for existing games that pre-date the createdAt field.
  // Setting to 1970-01-01 means "treat as existing for all history".
  const GENESIS = '1970-01-01';

  // Ensure tier1/2/3 have defaults, and backfill tierResidence based on current tier membership.
  ['tier1', 'tier2', 'tier3'].forEach(tier => {
    state.config[tier] = (state.config[tier] || []).map(g => {
      const base = { ...g };
      if (tier === 'tier1' && !Array.isArray(base.subtasks)) base.subtasks = [];
      if (typeof base.hidden !== 'boolean') base.hidden = false;
      if (typeof base.note !== 'string') base.note = '';
      if (typeof base.createdAt !== 'string') base.createdAt = GENESIS;
      if (!base.hidden) base.hiddenAt = null;
      else if (typeof base.hiddenAt !== 'string') base.hiddenAt = todayKey();
      // Tier 2: optional completion status (preserved across tier moves)
      if (typeof base.completion !== 'string') base.completion = '';
      // Last meaningful milestone date — DERIVED from milestones (write-through)
      if (typeof base.lastMilestone !== 'string') base.lastMilestone = '';
      // Journey: media/sub tags + milestones[] (reaches). completion/lastMilestone derived from these.
      // Tags: flatten legacy single media/sub into a flat multi-tag array (idempotent)
      if (!Array.isArray(base.tags)) base.tags = [...new Set([base.media, base.sub].filter(Boolean))];
      delete base.media; delete base.sub;
      if (!Array.isArray(base.milestones)) base.milestones = [];
      // Tier 3: roster status (preserved but only displayed when currently in Tier 3)
      if (typeof base.status !== 'string') base.status = 'considering';
      // Tier 1 subtasks: ensure hidden field
      if (tier === 'tier1') {
        base.subtasks = base.subtasks.map(st => ({
          ...st,
          hidden: typeof st.hidden === 'boolean' ? st.hidden : false
        }));
      }
      // Backfill tierResidence: a single open-ended residence in current tier from GENESIS
      if (!Array.isArray(base.tierResidence) || base.tierResidence.length === 0) {
        base.tierResidence = [{ tier, from: base.createdAt || GENESIS, to: null }];
      }
      recomputeGame(base);
      return base;
    });
  });

  // Roster (tier3) UI preferences — backward-compatible defaults
  if (typeof state.config.rosterGrouped !== 'boolean') state.config.rosterGrouped = true;
  if (!state.config.rosterGroupFold || typeof state.config.rosterGroupFold !== 'object') {
    state.config.rosterGroupFold = { up_next: false, considering: false, backlog: true };
  } else {
    const foldDefaults = { up_next: false, considering: false, backlog: true };
    ['up_next', 'considering', 'backlog'].forEach(k => {
      if (typeof state.config.rosterGroupFold[k] !== 'boolean') state.config.rosterGroupFold[k] = foldDefaults[k];
    });
  }

  // Finished shelf fold state (Beaten / Completed / Abandoned)
  if (!state.config.finishedFold || typeof state.config.finishedFold !== 'object') {
    state.config.finishedFold = { beaten: true, completed: true, sated: true, abandoned: true };
  } else {
    const ffDefaults = { beaten: true, completed: true, sated: true, abandoned: true };
    ['beaten', 'completed', 'sated', 'abandoned'].forEach(k => {
      if (typeof state.config.finishedFold[k] !== 'boolean') state.config.finishedFold[k] = ffDefaults[k];
    });
  }

  // Journey source lists — editable, expandable. Seed once if absent.
  if (!Array.isArray(state.config.nodeTypes) || !state.config.nodeTypes.length)
    state.config.nodeTypes = ['整体', '路线', '主线', '支线', 'DLC', '全收集', '白金', '全成就', '多周目', '重温'];
  if (!Array.isArray(state.config.mediaList) || !state.config.mediaList.length)
    state.config.mediaList = ['视觉小说', '角色扮演', '动作冒险', '平台动作', '模拟经营', '策略', '解谜', '竞速', '互动电影', '工具'];
  if (!Array.isArray(state.config.subList) || !state.config.subList.length)
    state.config.subList = ['乙女', '开放世界', '箱庭', '线性', 'JRPG', 'Roguelike', '银河城', '多结局', '抽卡养成', '割草', '推理', '沙盒'];

  // Flat tag pool — merge the legacy media/sub pools into one. Seeded ONCE: once
  // tagList exists (even empty) it's never re-seeded, so a user who clears tags
  // doesn't get the defaults back. The legacy lists remain only as this seed.
  if (!Array.isArray(state.config.tagList)) {
    const seed = [...(state.config.mediaList || []), ...(state.config.subList || [])];
    state.config.tagList = [...new Set(seed.filter(Boolean))];
  }

  // Company (tier1) column-view preference: 1 / 2 / 4
  if ([1, 2, 4].indexOf(state.config.companyColumns) === -1) state.config.companyColumns = 1;

  ensureGroupSort(state);

  return state;
}
function pad(n) { return String(n).padStart(2, '0'); }
function dateKey(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
function todayKey() { return dateKey(new Date()); }
function parseDateKey(s) { const p = s.split('-').map(Number); return new Date(p[0], p[1] - 1, p[2]); }

// ============================================================
// App state
// ============================================================
let state = null;
let session = null;
let viewDate = todayKey();
let addMode = null;
let addSubtaskGameId = null;
let editingGameId = null;
let editingSubtaskInfo = null;
let editingNoteFor = null;       // { tier, id }
let hiddenSectionOpen = { tier1: false, tier2: false, tier3: false };
let manageSubtasksFor = null;    // gameId
let addingNoteFor = null;        // { tier, id }

// ============================================================
// Save
// ============================================================
let saveTimeout = null;
let pendingSave = false;
let saving = false;
let consecutiveFailures = 0;
let savedFlashTimeout = null;

function scheduleSave() {
  pendingSave = true;
  setSaveState('saving');
  if (saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(performSave, 500);
}

async function performSave() {
  if (saving || !pendingSave || !session) return;
  saving = true; pendingSave = false;
  const stateToSave = JSON.parse(JSON.stringify(state));
  try {
    const { error } = await supabaseClient.from('tracker_data').upsert({
      user_id: session.user.id,
      data: stateToSave,
      updated_at: new Date().toISOString()
    });
    if (error) throw error;
    consecutiveFailures = 0;
    saving = false;
    if (pendingSave) scheduleSave();
    else setSaveState('saved');
  } catch (e) {
    console.error('Save failed:', e);
    consecutiveFailures++;
    saving = false;
    pendingSave = true;
    setSaveState('error');
    const delay = Math.min(1000 * Math.pow(2, consecutiveFailures - 1), 30000);
    setTimeout(performSave, delay);
  }
}

function setSaveState(mode) {
  const dot = document.getElementById('save-dot-mini');
  const errPill = document.getElementById('save-indicator');
  if (!dot || !errPill) return;
  if (savedFlashTimeout) { clearTimeout(savedFlashTimeout); savedFlashTimeout = null; }
  dot.classList.remove('saving', 'saved');
  errPill.classList.remove('visible');
  if (mode === 'saving') {
    dot.classList.add('saving');
  } else if (mode === 'saved') {
    dot.classList.add('saved');
    savedFlashTimeout = setTimeout(() => dot.classList.remove('saved'), 700);
  } else if (mode === 'error') {
    errPill.classList.add('visible');
  }
}

// ============================================================
// Undo (snapshot-based) — used for hide, cross-tier moves with subtask loss, etc.
// ============================================================
function snapshotState() {
  return JSON.parse(JSON.stringify(state));
}
function restoreState(snap) {
  state = snap;
  scheduleSave();
  smoothRender();
}
function showUndoToast(msg, snapshotBefore) {
  showToast({
    message: msg,
    actionLabel: 'Undo',
    onAction: () => restoreState(snapshotBefore)
  });
}

// ============================================================
// FLIP animation wrapper — smooth structural changes
// ============================================================
function withFlip(mutateFn) {
  if (!document.body || !state) { mutateFn(); return; }
  const before = new Map();
  document.querySelectorAll('[data-game-id], [data-subtask-id]').forEach(el => {
    const key = (el.dataset.gameId ? 'g:' : 's:') + (el.dataset.gameId || el.dataset.subtaskId);
    before.set(key, el.getBoundingClientRect());
  });
  mutateFn();
  document.querySelectorAll('[data-game-id], [data-subtask-id]').forEach(el => {
    const key = (el.dataset.gameId ? 'g:' : 's:') + (el.dataset.gameId || el.dataset.subtaskId);
    const oldRect = before.get(key);
    const newRect = el.getBoundingClientRect();
    if (oldRect) {
      const dx = oldRect.left - newRect.left;
      const dy = oldRect.top - newRect.top;
      if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
        el.animate(
          [{ transform: `translate(${dx}px, ${dy}px)` }, { transform: 'translate(0,0)' }],
          { duration: 260, easing: 'cubic-bezier(0.4, 0, 0.2, 1)' }
        );
      }
    } else {
      el.animate(
        [{ opacity: 0, transform: 'translateY(-4px)' }, { opacity: 1, transform: 'translateY(0)' }],
        { duration: 240, easing: 'cubic-bezier(0.16, 1, 0.3, 1)' }
      );
    }
  });
}
function smoothRender() { withFlip(() => render()); }

// ============================================================
// UI primitives: dialog, toast, picker (replacing native confirm)
// ============================================================
function showDialog({ title, message, confirmLabel = 'Confirm', cancelLabel = 'Cancel', danger = false, onConfirm }) {
  return new Promise(resolve => {
    const host = document.getElementById('dialog-host');
    host.innerHTML = '';
    const overlay = document.createElement('div');
    overlay.className = 'dialog-overlay';
    const dialog = document.createElement('div');
    dialog.className = 'dialog';
    dialog.setAttribute('role', 'dialog');
    dialog.setAttribute('aria-modal', 'true');
    dialog.innerHTML = `
      <div class="dialog-title">${escapeHtml(title)}</div>
      <div class="dialog-message">${message || ''}</div>
      <div class="dialog-actions">
        <button type="button" class="dialog-btn cancel">${escapeHtml(cancelLabel)}</button>
        <button type="button" class="dialog-btn confirm${danger ? ' danger' : ''}">${escapeHtml(confirmLabel)}</button>
      </div>
    `;
    overlay.appendChild(dialog);
    host.appendChild(overlay);

    const close = (result) => {
      overlay.style.animation = 'none';
      overlay.style.opacity = '0';
      overlay.style.transition = 'opacity 0.15s';
      setTimeout(() => { host.innerHTML = ''; resolve(result); }, 150);
      document.removeEventListener('keydown', onKey);
    };
    const onKey = (e) => {
      if (e.key === 'Escape') close(false);
      else if (e.key === 'Enter') { close(true); if (onConfirm) onConfirm(); }
    };
    document.addEventListener('keydown', onKey);

    dialog.querySelector('.cancel').onclick = () => close(false);
    dialog.querySelector('.confirm').onclick = () => { close(true); if (onConfirm) onConfirm(); };
    overlay.onclick = (e) => { if (e.target === overlay) close(false); };
    setTimeout(() => dialog.querySelector('.confirm').focus(), 50);
  });
}

// ---- Toast (undo) ----
let activeToast = null;
let toastTimeout = null;

function showToast({ message, actionLabel = 'Undo', onAction, duration = 5000 }) {
  dismissToast();
  const host = document.getElementById('toast-host');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `
    <span class="toast-msg">${escapeHtml(message)}</span>
    ${onAction ? `<span class="toast-action">${escapeHtml(actionLabel)}</span>` : ''}
    <span class="toast-close">×</span>
  `;
  host.appendChild(toast);
  activeToast = toast;

  if (onAction) {
    toast.querySelector('.toast-action').onclick = () => {
      onAction();
      dismissToast();
    };
  }
  toast.querySelector('.toast-close').onclick = dismissToast;
  toastTimeout = setTimeout(dismissToast, duration);
}

function dismissToast() {
  if (toastTimeout) { clearTimeout(toastTimeout); toastTimeout = null; }
  if (!activeToast) return;
  const t = activeToast;
  activeToast = null;
  t.classList.add('leaving');
  setTimeout(() => t.remove(), 220);
}

// ---- Picker popover ----
function showPicker(anchorEl, items, currentValue, onPick) {
  closePicker();
  const host = document.getElementById('picker-host');
  const menu = document.createElement('div');
  menu.className = 'picker-menu';
  items.forEach(item => {
    const row = document.createElement('div');
    row.className = 'picker-item' + (item.value === currentValue ? ' active' : '') + (item.clear ? ' clear' : '');
    row.innerHTML = `<span>${escapeHtml(item.label)}</span><span class="picker-check">✓</span>`;
    row.onclick = (e) => { e.stopPropagation(); onPick(item.value); closePicker(); };
    menu.appendChild(row);
  });
  host.appendChild(menu);

  // Position
  const rect = anchorEl.getBoundingClientRect();
  const mw = menu.offsetWidth;
  const mh = menu.offsetHeight;
  let top = rect.bottom + 6;
  let left = rect.left;
  if (left + mw > window.innerWidth - 12) left = window.innerWidth - mw - 12;
  if (left < 12) left = 12;
  if (top + mh > window.innerHeight - 12) top = rect.top - mh - 6;
  menu.style.top = top + 'px';
  menu.style.left = left + 'px';

  // Dismiss
  const onDocClick = (e) => { if (!menu.contains(e.target)) closePicker(); };
  const onKey = (e) => { if (e.key === 'Escape') closePicker(); };
  setTimeout(() => {
    document.addEventListener('mousedown', onDocClick);
    document.addEventListener('keydown', onKey);
  }, 0);
  menu._cleanup = () => {
    document.removeEventListener('mousedown', onDocClick);
    document.removeEventListener('keydown', onKey);
  };
}

function closePicker() {
  const host = document.getElementById('picker-host');
  if (!host) return;
  Array.from(host.children).forEach(m => { if (m._cleanup) m._cleanup(); });
  host.innerHTML = '';
}

// ============================================================
// Data accessors
// ============================================================
function getDay(date) {
  if (!state.history[date]) state.history[date] = { tier1: {}, tier2: {}, tier3: {} };
  return state.history[date];
}
function getTier1Game(date, gameId) {
  const day = getDay(date);
  if (!day.tier1[gameId]) day.tier1[gameId] = { checkedIn: false, subtasks: {}, extra: false };
  return day.tier1[gameId];
}

// ============================================================
// Toggles — targeted DOM updates, no full re-render
// ============================================================
function toggleTier1(gameId) {
  const g = getTier1Game(viewDate, gameId);
  g.checkedIn = !g.checkedIn;
  scheduleSave(); updateTier1Row(gameId);
}
function toggleSubtask(gameId, subtaskId) {
  const g = getTier1Game(viewDate, gameId);
  g.subtasks[subtaskId] = !g.subtasks[subtaskId];
  const cfg = state.config.tier1.find(x => x.id === gameId);
  if (cfg && cfg.subtasks.length > 0) {
    const visible = cfg.subtasks.filter(t => !t.hidden);
    if (visible.length > 0) {
      const allDone = visible.every(t => g.subtasks[t.id]);
      if (allDone && !g.checkedIn) g.checkedIn = true;
    }
  }
  scheduleSave(); updateTier1Row(gameId);
}
function toggleExtra(gameId) {
  const g = getTier1Game(viewDate, gameId);
  g.extra = !g.extra;
  scheduleSave();
  const item = document.querySelector(`#tier1-list [data-game-id="${gameId}"]`);
  if (item) {
    const ex = item.querySelector('.extra-toggle');
    ex.classList.toggle('active', !!g.extra);
    ex.innerHTML = g.extra ? '✦' : '✧';
  }
  updateHeatmapCell(viewDate);
}
function toggleTier2(gameId) {
  const day = getDay(viewDate);
  day.tier2[gameId] = !day.tier2[gameId];
  scheduleSave(); updateTier2Row(gameId);
}
function toggleTier3(gameId) {
  const day = getDay(viewDate);
  day.tier3[gameId] = !day.tier3[gameId];
  scheduleSave(); updateTier3Row(gameId);
}

// --- Targeted update helpers ---
function updateTier1Row(gameId) {
  const day = getDay(viewDate);
  const gd = day.tier1[gameId] || { checkedIn: false, subtasks: {}, extra: false };
  const item = document.querySelector(`#tier1-list [data-game-id="${gameId}"]`);
  if (!item) return;
  item.querySelector('.checkbox').classList.toggle('checked', !!gd.checkedIn);
  const checkin = item.querySelector('.pc-checkin');
  if (checkin) {
    checkin.classList.toggle('on', !!gd.checkedIn);
    const lbl = checkin.querySelector('.pc-checkin-label');
    if (lbl) lbl.textContent = gd.checkedIn ? '今日已玩' : '打卡';
  }
  const name = item.querySelector('.pc-name');
  if (name) name.classList.toggle('checked', !!gd.checkedIn);
  item.querySelectorAll('.subtask').forEach(sub => {
    const sid = sub.dataset.subtaskId;
    if (sid) sub.classList.toggle('checked', !!gd.subtasks[sid]);
  });
  updateStreak(item, gameId);
  updateProgress();

const TIER2_COMPLETION_SEQ = ['', 'beaten', 'completed', 'sated', 'abandoned'];
const TIER3_STATUS_SEQ = ['considering', 'up_next', 'backlog'];

function setTier2Completion(gameId, value) {
  const g = state.config.tier2.find(x => x.id === gameId);
  if (!g) return;
  g.completion = value || '';
  scheduleSave();
  // Completion now decides Playing-vs-Finished placement, so re-render (FLIP animates the move).
  smoothRender();
}
function setTier3Status(gameId, value) {
  const arr = state.config.tier3;
  const idx = arr.findIndex(x => x.id === gameId);
  if (idx === -1) return;
  const g = arr[idx];
  const newStatus = value || 'considering';
  g.status = newStatus;
  // Surface a freshly (re)classified game at the TOP of its new group: pull it out
  // and re-insert just before the first existing member of that status. (Manual sort
  // only — 'added'/'name' sorts re-order anyway, so the splice is harmless there.)
  arr.splice(idx, 1);
  const insertAt = arr.findIndex(x => (x.status || 'considering') === newStatus);
  if (insertAt === -1) arr.unshift(g); else arr.splice(insertAt, 0, g);
  scheduleSave();
  // Status is the grouping key — re-render so the card animates into its new group.
  smoothRender();
}

function openTier2CompletionPicker(anchor, gameId) {
  const g = state.config.tier2.find(x => x.id === gameId);
  if (!g) return;
  const items = [
    { value: 'beaten', label: 'Beaten' },
    { value: 'completed', label: 'Completed' },

    { value: 'abandoned', label: 'Abandoned' },

  ];
  showPicker(anchor, items, g.completion || '', v => setTier2Completion(gameId, v));
}
function openTier3StatusPicker(anchor, gameId) {
  const g = state.config.tier3.find(x => x.id === gameId);
  if (!g) return;
  const items = [

}

// ============================================================
// Drag & Drop
// ============================================================
const drag = {
  active: false, type: null, sourceTier: null, sourceId: null,
  ghost: null, threshold: 5, pending: null, currentDropTarget: null
};

// Edge auto-scroll while dragging (fixes "can't reach drop spot in long lists")
let autoScrollRAF = null;
let lastPointerX = 0;
let lastPointerY = 0;
function autoScrollTick() {
  if (!drag.active) { autoScrollRAF = null; return; }
  const margin = 90, maxSpeed = 20;
  const h = window.innerHeight;
  let dy = 0;
  if (lastPointerY < margin) dy = -maxSpeed * (1 - lastPointerY / margin);
  else if (lastPointerY > h - margin) dy = maxSpeed * (1 - (h - lastPointerY) / margin);
  if (dy !== 0) {
    window.scrollBy(0, dy);
    if (drag.ghost) {
      drag.ghost.style.left = (lastPointerX + 12) + 'px';
      drag.ghost.style.top = (lastPointerY + 12) + 'px';
    }
    updateDropIndicator(lastPointerX, lastPointerY);
  }
  autoScrollRAF = requestAnimationFrame(autoScrollTick);
}

function startDragPotential(type, sourceTier, sourceId, displayName, e) {
  const pt = e.touches ? e.touches[0] : e;
  drag.pending = { type, sourceTier, sourceId, displayName, startX: pt.clientX, startY: pt.clientY };
  e.preventDefault();
  const moveHandler = (ev) => handleDragMove(ev);
  const endHandler = (ev) => handleDragEnd(ev, moveHandler, endHandler);
  document.addEventListener('mousemove', moveHandler, { passive: false });
  document.addEventListener('mouseup', endHandler);
  document.addEventListener('touchmove', moveHandler, { passive: false });
  document.addEventListener('touchend', endHandler);
  document.addEventListener('touchcancel', endHandler);
}

function handleDragMove(e) {
  if (!drag.pending && !drag.active) return;
  const pt = e.touches ? e.touches[0] : e;
  if (drag.pending && !drag.active) {
    const dx = pt.clientX - drag.pending.startX;
    const dy = pt.clientY - drag.pending.startY;
    if (Math.sqrt(dx*dx + dy*dy) < drag.threshold) return;
    drag.active = true;
    drag.type = drag.pending.type;
    drag.sourceTier = drag.pending.sourceTier;
    drag.sourceId = drag.pending.sourceId;
    drag.pending = null;
    document.body.classList.add('dragging');
    drag.ghost = document.createElement('div');
    drag.ghost.className = 'drag-ghost';
    drag.ghost.textContent = drag.type === 'game'
      ? (state.config[drag.sourceTier].find(g => g.id === drag.sourceId)?.name || '')
      : (state.config.tier1.find(g => g.id === drag.sourceTier)?.subtasks.find(s => s.id === drag.sourceId)?.name || '');
    document.body.appendChild(drag.ghost);
    markSourceAsDragging(true);
  }
  if (!drag.active) return;
  e.preventDefault();
  lastPointerX = pt.clientX;
  lastPointerY = pt.clientY;
  if (drag.ghost) {
    drag.ghost.style.left = (pt.clientX + 12) + 'px';
    drag.ghost.style.top = (pt.clientY + 12) + 'px';
  }
  updateDropIndicator(pt.clientX, pt.clientY);
  if (!autoScrollRAF) autoScrollRAF = requestAnimationFrame(autoScrollTick);
}

function markSourceAsDragging(on) {
  if (drag.type === 'game') {
    const el = document.querySelector(`[data-game-id="${drag.sourceId}"]`);
    if (el) el.classList.toggle('dragging', on);
  } else if (drag.type === 'subtask') {
    const el = document.querySelector(`[data-subtask-id="${drag.sourceId}"]`);
    if (el) el.classList.toggle('dragging', on);
  }
}

function clearDropIndicators() {
  document.querySelectorAll('.drop-line, .subtask-drop-marker').forEach(el => el.remove());
  document.querySelectorAll('.section.drop-target').forEach(el => el.classList.remove('drop-target'));
  document.querySelectorAll('.drop-before, .drop-after').forEach(el => el.classList.remove('drop-before', 'drop-after'));
  drag.currentDropTarget = null;
}

function updateDropIndicator(clientX, clientY) {
  clearDropIndicators();
  if (drag.type === 'subtask') updateSubtaskDropIndicator(clientX, clientY);
  else if (drag.sourceTier === 'tier3') updateRosterDropIndicator(clientX, clientY);
  else updateGameDropIndicator(clientX, clientY);
}

// Roster grid: within-group 2D reorder. Finds the insertion point in reading
// (row-major) order using both X and Y, and marks the target card.
function updateRosterDropIndicator(clientX, clientY) {
  const game = state.config.tier3.find(g => g.id === drag.sourceId);
  if (!game) return;
  const grouped = state.config.rosterGrouped !== false;
  const status = game.status || 'considering';

  let scope;
  if (grouped) {
    scope = document.querySelector(`#tier3-list .roster-group[data-group="${status}"] .roster-grid`);
  } else {
    scope = document.querySelector('#tier3-list .roster-grid.ungrouped');
  }
  if (!scope) return;

  const cards = Array.from(scope.querySelectorAll('.roster-card')).filter(el => !el.classList.contains('dragging'));

  let insertBeforeId = null;
  let targetCard = null;
  for (let i = 0; i < cards.length; i++) {
    const r = cards[i].getBoundingClientRect();
    const inRow = clientY >= r.top - 6 && clientY <= r.bottom + 6;
    if (inRow && clientX < r.left + r.width / 2) { targetCard = cards[i]; insertBeforeId = cards[i].dataset.gameId; break; }
    if (clientY < r.top - 6) { targetCard = cards[i]; insertBeforeId = cards[i].dataset.gameId; break; }
  }

  if (targetCard) {
    targetCard.classList.add('drop-before');
  } else if (cards.length > 0) {
    cards[cards.length - 1].classList.add('drop-after'); // append at group end
  }
  drag.currentDropTarget = { roster: true, insertBeforeId, grouped };
}

function updateGameDropIndicator(clientX, clientY) {
  const sections = ['tier1', 'tier2', 'tier3'];
  let targetTier = null, targetSection = null;
  for (const tier of sections) {
    const sec = document.getElementById(`section-${tier}`);
    if (!sec) continue;
    const rect = sec.getBoundingClientRect();
    if (clientY >= rect.top && clientY <= rect.bottom) {
      targetTier = tier; targetSection = sec; break;
    }
  }
  if (!targetTier) return;
  if (targetTier !== drag.sourceTier) targetSection.classList.add('drop-target');
  const list = document.getElementById(`${targetTier}-list`);
  if (!list) return;
  const items = Array.from(list.querySelectorAll(`[data-game-id]`)).filter(el => !el.classList.contains('dragging'));

  // Multi-column Company: 2D reading-order hit-test with a card-edge marker,
  // mirroring Roster (a full-width drop-line reads wrong inside a grid). Single
  // column keeps the original horizontal drop-line. dropIndex semantics are
  // identical either way, so commitGameMove is unchanged.
  if (targetTier === 'tier1' && companyColumns() > 1) {
    let dropIndex = items.length, targetCard = null;
    for (let i = 0; i < items.length; i++) {
      const r = items[i].getBoundingClientRect();
      const inRow = clientY >= r.top - 6 && clientY <= r.bottom + 6;
      if ((inRow && clientX < r.left + r.width / 2) || clientY < r.top - 6) {
        targetCard = items[i]; dropIndex = i; break;
      }
    }
    if (targetCard) targetCard.classList.add('drop-before');
    else if (items.length > 0) items[items.length - 1].classList.add('drop-after');
    drag.currentDropTarget = { tier: targetTier, index: dropIndex };
    return;
  }

  let dropIndex = items.length;
  for (let i = 0; i < items.length; i++) {
    const rect = items[i].getBoundingClientRect();
    if (clientY < rect.top + rect.height / 2) { dropIndex = i; break; }
  }
  const line = document.createElement('div');
  line.className = 'drop-line';
  if (dropIndex === items.length) {
    if (items.length > 0) items[items.length - 1].after(line);
    else list.appendChild(line);
  } else items[dropIndex].before(line);
  drag.currentDropTarget = { tier: targetTier, index: dropIndex };
}

function updateSubtaskDropIndicator(clientX, clientY) {
  const gameEl = document.querySelector(`[data-game-id="${drag.sourceTier}"]`);
  if (!gameEl) return;
  const subRow = gameEl.querySelector('.subtasks-row');
  if (!subRow) return;
  const pills = Array.from(subRow.querySelectorAll('[data-subtask-id]')).filter(el => !el.classList.contains('dragging'));
  let dropIndex = pills.length;
  for (let i = 0; i < pills.length; i++) {
    const rect = pills[i].getBoundingClientRect();
    if (clientX < rect.left + rect.width / 2 && clientY < rect.bottom && clientY > rect.top - 12) {
      dropIndex = i; break;
    }
  }
  const marker = document.createElement('div');
  marker.className = 'subtask-drop-marker';
  if (dropIndex === pills.length) {
    if (pills.length > 0) pills[pills.length - 1].after(marker);
    else subRow.insertBefore(marker, subRow.firstChild);
  } else pills[dropIndex].before(marker);
  drag.currentDropTarget = { gameId: drag.sourceTier, index: dropIndex };
}

function handleDragEnd(e, moveHandler, endHandler) {
  document.removeEventListener('mousemove', moveHandler);
  document.removeEventListener('mouseup', endHandler);
  document.removeEventListener('touchmove', moveHandler);
  document.removeEventListener('touchend', endHandler);
  document.removeEventListener('touchcancel', endHandler);
  if (!drag.active) { drag.pending = null; return; }
  if (drag.currentDropTarget) {
    if (drag.currentDropTarget.roster) {
      commitRosterReorder(drag.sourceId, drag.currentDropTarget.insertBeforeId, drag.currentDropTarget.grouped);
    } else if (drag.type === 'game') {
      commitGameMove(drag.sourceTier, drag.sourceId, drag.currentDropTarget.tier, drag.currentDropTarget.index);
    } else {
      commitSubtaskMove(drag.sourceTier, drag.sourceId, drag.currentDropTarget.index);
    }
  }
  markSourceAsDragging(false);
  clearDropIndicators();
  if (drag.ghost) { drag.ghost.remove(); drag.ghost = null; }
  document.body.classList.remove('dragging');
  drag.active = false; drag.type = null; drag.sourceTier = null;
  drag.sourceId = null; drag.pending = null; drag.currentDropTarget = null;
  smoothRender();
}

function commitGameMove(fromTier, gameId, toTier, toIndex) {
  const fromList = state.config[fromTier];
  const fromIndex = fromList.findIndex(g => g.id === gameId);
  if (fromIndex === -1) return;
  const game = fromList[fromIndex];

  // === Same-tier reorder: no residence change ===
  // toIndex is computed over the list with the dragged card filtered OUT — i.e.
  // it already indexes the array as it will look after removal — so it is the
  // correct insertion point directly. (An earlier version subtracted 1 on
  // downward moves, which double-corrected and dropped the card one slot short
  // of the indicator. Removed so single-column and grid both land on the line.)
  if (fromTier === toTier) {
    fromList.splice(fromIndex, 1);
    state.config[toTier].splice(toIndex, 0, game);
    markGroupDirtyByGame(toTier, game);
    scheduleSave();
    return;
  }

  // === Cross-tier move ===
  const snap = snapshotState();
  // Sub-tasks are PRESERVED across tier moves — they stay dormant on the game while
  // it lives in Playing / Roster, and reappear intact when it returns to Daily.
  const lostSubtasks = 0;

  // Update tierResidence: close current residence today, open new one tomorrow
  const today = todayKey();
  if (!Array.isArray(game.tierResidence)) game.tierResidence = [];
  // Find current open residence
  const current = game.tierResidence.find(r => r.to === null);
  if (current) {
    // Edge case: if current residence started today, just rewrite it instead of creating a one-day stub
    if (current.from === today) {
      // Replace with new tier residence starting today
      current.tier = toTier;
    } else {
      // Close current at yesterday, open new from today
      const d = parseDateKey(today); d.setDate(d.getDate() - 1);
      current.to = dateKey(d);
      game.tierResidence.push({ tier: toTier, from: today, to: null });
    }
  } else {
    // No open residence (shouldn't happen with proper migration), just open one
    game.tierResidence.push({ tier: toTier, from: today, to: null });
  }

  // Move in config arrays (for UI rendering convenience — current tier residence lives in current tier array)
  fromList.splice(fromIndex, 1);

  // Ensure game has fields needed for new tier
  if (toTier === 'tier1' && !Array.isArray(game.subtasks)) game.subtasks = [];
  if (toTier === 'tier2' && typeof game.completion !== 'string') game.completion = '';
  if (toTier === 'tier3' && typeof game.status !== 'string') game.status = 'considering';

  state.config[toTier].splice(toIndex, 0, game);
  scheduleSave();

  // Tell user what happened, give them undo
  const tierLabels = { tier1: 'Company', tier2: 'Playing', tier3: 'Roster' };
  const baseMsg = `Moved "${game.name}" → ${tierLabels[toTier]}`;
  const msg = lostSubtasks > 0 ? `${baseMsg} · removed ${lostSubtasks} sub-task${lostSubtasks > 1 ? 's' : ''}` : baseMsg;
  showUndoToast(msg, snap);
}

function commitSubtaskMove(gameId, subtaskId, toIndex) {
  const game = state.config.tier1.find(g => g.id === gameId);
  if (!game) return;
  const fromIndex = game.subtasks.findIndex(s => s.id === subtaskId);
  if (fromIndex === -1) return;
  const [moved] = game.subtasks.splice(fromIndex, 1);
  let adjustedIndex = toIndex;
  if (fromIndex < toIndex) adjustedIndex = toIndex - 1;
  game.subtasks.splice(adjustedIndex, 0, moved);
  scheduleSave();
}

// Roster within-group reorder — never changes status. Insert relative to a
// concrete sibling id so interleaved group order in the array stays correct.
function commitRosterReorder(gameId, insertBeforeId, grouped) {
  const arr = state.config.tier3;
  const fromIndex = arr.findIndex(g => g.id === gameId);
  if (fromIndex === -1) return;
  const [moved] = arr.splice(fromIndex, 1);

  let insertIndex;
  if (insertBeforeId) {
    insertIndex = arr.findIndex(g => g.id === insertBeforeId);
    if (insertIndex === -1) insertIndex = arr.length;
  } else if (grouped) {
    // Append at end of this card's status group (after its last sibling).
    const status = moved.status || 'considering';
    let lastIdx = -1;
    arr.forEach((g, i) => { if ((g.status || 'considering') === status) lastIdx = i; });
    insertIndex = lastIdx + 1;
  } else {
    insertIndex = arr.length; // ungrouped: append to flat list
  }
  arr.splice(insertIndex, 0, moved);
  markGroupDirtyByGame('tier3', moved);
  scheduleSave();
}

// ============================================================
// Computed
// ============================================================
function getStreak(gameId, currentTierKey) {
  // Find the game across all tier arrays
  let game = null;
  ['tier1', 'tier2', 'tier3'].forEach(t => {
    if (!game) {
      const found = state.config[t].find(g => g.id === gameId);
      if (found) game = found;
    }
  });
  if (!game) return 0;

  const today = new Date(); today.setHours(0, 0, 0, 0);
  let streak = 0;
  for (let i = 0; i < 365; i++) {
    const d = new Date(today); d.setDate(today.getDate() - i);
    const key = dateKey(d);
    // 一天是否计入连续天数，看的是「这天在任意档碰过这个游戏」——Daily 主勾 / Playing 打卡 /
    // Roster played 随手标记 三者任一即算，而非这天历史上在哪一档。原因：卡片永远按游戏【当前】
    // 所在档渲染，所以无论你今天打卡还是回填过去某天，勾选都写进【当前档】的桶里。三档全收，
    // 跨档来回挪 / 回填过去日期都不会断（用户想法常变，移到待玩区随手摸一下也算连续）。
    const day = state.history[key];
    let checked = false;
    if (day) {
      checked = (day.tier1 && day.tier1[gameId] && day.tier1[gameId].checkedIn === true)
             || (day.tier2 && day.tier2[gameId] === true)
             || (day.tier3 && day.tier3[gameId] === true);
    }
    if (checked) streak++;
    else if (i === 0) continue;
    else break;
  }
  return streak;
}

function existsOnDate(game, dateStr) {
  // A game "exists" on a given date if:
  //   - its createdAt is on or before that date
  //   - AND (it's not hidden, OR it was hidden after that date)
  const createdAt = game.createdAt || '1970-01-01';
  if (createdAt > dateStr) return false;
  if (game.hidden && game.hiddenAt && game.hiddenAt <= dateStr) return false;
  return true;
}

// Which tier did this game belong to on a given date? null if not in any tier yet.
function tierOnDate(game, dateStr) {
  if (!Array.isArray(game.tierResidence)) return null;
  for (const r of game.tierResidence) {
    if (r.from <= dateStr && (r.to === null || dateStr <= r.to)) return r.tier;
  }
  return null;
}

// All games that, on the given date, belonged to the given tier.
// Looks across all tier arrays in config since residence history may differ from current tier.
function gamesInTierOnDate(tier, dateStr) {
  const results = [];
  ['tier1', 'tier2', 'tier3'].forEach(t => {
    (state.config[t] || []).forEach(g => {
      if (!existsOnDate(g, dateStr)) return;
      if (tierOnDate(g, dateStr) === tier) results.push(g);
    });
  });
  return results;
}

// Which tier is the game currently in (today's tier)?
function currentTier(game) {
  return tierOnDate(game, todayKey());
}

function getDayCompanions(dateStr) {
  const day = state.history[dateStr];
  if (!day) return 0;
  const relevant = gamesInTierOnDate('tier1', dateStr);
  let checked = 0;
  relevant.forEach(g => {
    if (day.tier1 && day.tier1[g.id] && day.tier1[g.id].checkedIn) checked++;
  });
  return checked;
}

// Retained for possible future use: completion % (checked / total Company games on
// a day). Not currently surfaced — the header uses an ambient colour band instead —
// but kept so a percentage view can be re-introduced without rebuilding the logic.
function getDayProgress(dateStr) {
  const day = state.history[dateStr];
  if (!day) return 0;
  const relevant = gamesInTierOnDate('tier1', dateStr);
  const total = relevant.length;
  if (total === 0) return 0;
  let checked = 0;
  relevant.forEach(g => { if (day.tier1 && day.tier1[g.id] && day.tier1[g.id].checkedIn) checked++; });
  return Math.round((checked / total) * 100);
}

function getDayIntensity(dateStr) {
  const day = state.history[dateStr];
  if (!day) return 0;
  const tier1Games = gamesInTierOnDate('tier1', dateStr);
  const tier2Games = gamesInTierOnDate('tier2', dateStr);
  const tier3Games = gamesInTierOnDate('tier3', dateStr);
  // Daily ritual: 主勾 + 子任务深度 + ✦多玩
  const dailyCount = tier1Games.length;
  let dailyChecked = 0, extra = 0, subDone = 0, subTotal = 0;
  tier1Games.forEach(g => {
    const gd = day.tier1 && day.tier1[g.id];
    if (gd) {
      if (gd.checkedIn) dailyChecked++;
      if (gd.extra) extra++;
    }
    (g.subtasks || []).forEach(st => {
      if (st.hidden) return;
      subTotal++;
      if (gd && gd.subtasks && gd.subtasks[st.id]) subDone++;
    });
  });
  // 额外广度:Playing 在玩 + Roster 摸了 + Daily ✦多玩
  let touches = extra;
  tier2Games.forEach(g => { if (day.tier2 && day.tier2[g.id]) touches++; });
  tier3Games.forEach(g => { if (day.tier3 && day.tier3[g.id]) touches++; });

  if (dailyChecked === 0 && subDone === 0 && touches === 0) return 0;

  // Intensity = 整体活动量。Daily 主勾是最重的单项(0.40,你的"权重高"),
  // 但满勾≠顶格 —— 真正拉开梯度的是「额外活动量 touches」(0→很多,占 0.40,
  // 8 次才封顶)和「子任务深度」(0.20)。这样一天玩得多/少能直接看出来。
  const dailyRatio = dailyCount > 0 ? dailyChecked / dailyCount : 0;
  const subRatio   = subTotal  > 0 ? subDone / subTotal       : 0;
  const score = dailyRatio * 0.40 + subRatio * 0.20 + Math.min(touches / 8, 1) * 0.40;

  if (score < 0.30) return 1;
  if (score < 0.52) return 2;
  if (score < 0.74) return 3;
  return 4;
}

// Refresh check-states / streaks / progress / heatmap viewing — no structural rebuild
function refreshDayView() {
  if (!state) return;
  applyWeekTheme();
  renderHeader();
  const day = getDay(viewDate);
  document.querySelectorAll('#tier1-list .daily-card').forEach(item => {
    const id = item.dataset.gameId;
    const gd = day.tier1[id] || { checkedIn: false, subtasks: {}, extra: false };
    item.querySelector('.checkbox')?.classList.toggle('checked', !!gd.checkedIn);
    const name = item.querySelector('.pc-name');
    if (name) name.classList.toggle('checked', !!gd.checkedIn);
    const ex = item.querySelector('.extra-toggle');
    if (ex) {
      ex.classList.toggle('active', !!gd.extra);
      ex.innerHTML = gd.extra ? '✦' : '✧';
    }
    item.querySelectorAll('.subtask').forEach(sub => {
      const sid = sub.dataset.subtaskId;
      if (sid) sub.classList.toggle('checked', !!gd.subtasks[sid]);
    });
    updateStreak(item, id);
  });
  document.querySelectorAll('#tier2-list .playing-card').forEach(item => {
    const id = item.dataset.gameId;
    const checked = day.tier2[id] === true;
    item.querySelector('.checkbox')?.classList.toggle('checked', checked);
    const name = item.querySelector('.pc-name');
    if (name) name.classList.toggle('checked', checked);
    const checkin = item.querySelector('.pc-checkin');
    if (checkin) {
      checkin.classList.toggle('on', checked);
      const lbl = checkin.querySelector('.pc-checkin-label');
      if (lbl) lbl.textContent = checked ? '今日已玩' : '打卡';
    }
    updateStreak(item, id);
  });
  document.querySelectorAll('#tier3-list .roster-card').forEach(item => {
    const id = item.dataset.gameId;
    const checked = day.tier3[id] === true;
    const played = item.querySelector('.rc-played');
    if (played) {
      played.classList.toggle('on', checked);
      const label = played.querySelector('.rc-played-label');
      if (label) label.textContent = checked ? 'played' : 'today';
    }
    updateStreak(item, id);
  });
  // Heatmap viewing class
  document.querySelectorAll('.heatmap-cell').forEach(c => {
    c.classList.toggle('viewing', c.dataset.dateKey === viewDate);
    if (!c.classList.contains('future')) c.dataset.intensity = getDayIntensity(c.dataset.dateKey);
  });
}

  return handle;

// ── Companion band ─────────────────────────────────────────────
// An ambient, no-text bar in the header. Not a progress meter — it has no fill,
// no total, no 100%. It blends the warm signature colour of each game checked in
// today (softened toward cream) into one gentle gradient: "who I spent time with
// today", growing richer as more companions join. Empty days are a barely-there
// warm wash. Borrows the soft, handle-less feel of a pastel slider.
function hexToRgb(hex) {
  const h = (hex || '').replace('#', '');
  return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
}
function softWarm(hex, amt) {
  const cream = [245, 238, 226];
  const c = hexToRgb(hex);
  const m = c.map((v, i) => Math.round(v * (1 - amt) + cream[i] * amt));
  return `rgb(${m[0]},${m[1]},${m[2]})`;
}
function companionBandBg(dateStr) {
  const day = state.history[dateStr];
  const games = gamesInTierOnDate('tier1', dateStr);
  const checked = games.filter(g => day && day.tier1 && day.tier1[g.id] && day.tier1[g.id].checkedIn);
  if (checked.length === 0) {
    return 'linear-gradient(90deg, rgba(196,180,160,0.10), rgba(196,180,160,0.05))';
  }
  if (checked.length === 1) {
    const mid = softWarm(gameColor(checked[0].id), 0.36);
    const edge = softWarm(gameColor(checked[0].id), 0.60);
    return `linear-gradient(90deg, ${edge} 0%, ${mid} 50%, ${edge} 100%)`;
  }
  const cols = checked.map(g => softWarm(gameColor(g.id), 0.40));
  const stops = cols.map((c, i) => `${c} ${Math.round(i / (cols.length - 1) * 100)}%`).join(', ');
  return `linear-gradient(90deg, ${stops})`;
}
function renderCompanionBand() {
  const band = document.getElementById('companion-band');
  if (band) band.style.background = companionBandBg(viewDate);

// === Build editable name + note column ===
// === Shared editable name + note column — used by Daily & Playing cards.
// (Roster keeps its own builder: its name takes the group colour and the note
// sits at card level, so it doesn't share this structure.) ===
function buildPcBody(tier, game, isChecked) {
  const body = document.createElement('div');
  body.className = 'pc-body';
  const parsed = parsePlatform(game.name);

  // --- Name (or edit input) ---
  const editingName = editingGameId && editingGameId.tier === tier && editingGameId.id === game.id;
  if (editingName) {
    const input = document.createElement('input');
    input.className = 'pc-name-edit';
    input.type = 'text';
    input.value = game.name;
    let committed = false;
    const commit = () => {
      if (committed) return; committed = true;
      renameGame(tier, game.id, input.value);
      editingGameId = null; render();
    };
    input.onkeydown = (e) => {
      if (e.key === 'Enter') commit();
      else if (e.key === 'Escape') { committed = true; editingGameId = null; render(); }
    };
    input.onblur = commit;
    body.appendChild(input);
    setTimeout(() => { input.focus(); input.select(); }, 0);
  } else {
    const nameEl = document.createElement('div');
    // Name single-click no longer toggles check-in (the checkbox owns that) — it's
    // for reading; double-click renames. Consistent across Daily / Playing / Roster.
    nameEl.className = 'pc-name' + (isChecked ? ' checked' : '');
    nameEl.textContent = parsed.base;  // platform suffix lives in a tag; edit keeps full name
    nameEl.title = game.name + ' · double-click to rename';
    nameEl.ondblclick = (e) => { e.preventDefault(); editingGameId = { tier, id: game.id }; render(); };
    body.appendChild(nameEl);
  }

  // --- Note (or edit input) ---
  const editingNote = editingNoteFor && editingNoteFor.tier === tier && editingNoteFor.id === game.id;
  const isAdding = addingNoteFor && addingNoteFor.tier === tier && addingNoteFor.id === game.id;
  const hasNote = game.note && game.note.length > 0;
  if (editingNote || isAdding) {
    const input = document.createElement('input');
    input.className = 'pc-note-edit';
    input.type = 'text';
    input.value = game.note || '';
    input.placeholder = '备注...';
    let committed = false;
    const commit = () => {
      if (committed) return; committed = true;
      setGameNote(tier, game.id, input.value);
      editingNoteFor = null; addingNoteFor = null; render();
    };
    input.onkeydown = (e) => {
      if (e.key === 'Enter') commit();
      else if (e.key === 'Escape') { committed = true; editingNoteFor = null; addingNoteFor = null; render(); }
    };
    input.onblur = commit;
    body.appendChild(input);
    setTimeout(() => { input.focus(); input.select(); }, 0);
  } else if (hasNote) {
    const noteEl = document.createElement('div');
    noteEl.className = 'pc-note';
    noteEl.textContent = game.note;
    noteEl.title = game.note + ' · click to edit';
    noteEl.onclick = (e) => { e.stopPropagation(); editingNoteFor = { tier, id: game.id }; render(); };
    body.appendChild(noteEl);
  }

  return body;
}

// Roster (tier3) — grouped card grid
// ============================================================
const ROSTER_GROUP_ORDER = ['up_next', 'considering', 'backlog'];

// Parse a trailing platform suffix like 名字（NS） / 名字（PC·Steam）.
// Only strips the LAST parenthetical, and only when it's a known platform
// (so （国际服）/（南半球）variants stay in the name).
const KNOWN_PLATFORMS = ['NS2', 'NS', 'Switch2', 'Switch', 'Steam', 'PC·Steam', 'PS5', 'PS4', 'PC', 'Mobile', 'iOS', 'Android', 'Epic', 'GOG'];
function parsePlatform(name) {
  const m = String(name).match(/^(.*?)\s*（([^（）]+)）\s*$/);
  if (m) {
    const tag = m[2].trim();
    const hit = KNOWN_PLATFORMS.find(p => p.toLowerCase() === tag.toLowerCase());
    if (hit) {
      const label = (hit === 'PC·Steam') ? 'Steam' : hit;
      return { base: m[1].trim(), platform: label };
    }
  }
  return { base: String(name), platform: null };
}

function rosterPrefs() {
  const c = state.config;
  return {
    grouped: c.rosterGrouped !== false,
    fold: Object.assign({ up_next: false, considering: false, backlog: true }, c.rosterGroupFold || {})
  };
}

function renderTier3() {
  const container = document.getElementById('tier3-list');
  container.innerHTML = '';

  const visible = state.config.tier3.filter(g => !g.hidden);
  const prefs = rosterPrefs();

  if (visible.length > 0) {
    container.appendChild(buildRosterControls(prefs));
  }

  if (prefs.grouped) {
    ROSTER_GROUP_ORDER.forEach(status => {
      const games = visible.filter(g => (g.status || 'considering') === status);
      if (games.length === 0) return; // empty groups show no header
      container.appendChild(buildRosterGroup(status, games, prefs));
    });
  } else {
    const games = visible;
    const grid = document.createElement('div');
    grid.className = 'roster-grid ungrouped';
    games.forEach(g => grid.appendChild(buildRosterCard(g, prefs, g.status || 'considering')));
    container.appendChild(grid);
  }

  renderAddRow('tier3');
  renderHiddenSection('tier3');
}

function buildRosterControls(prefs) {
  const bar = document.createElement('div');
  bar.className = 'roster-controls';

  const groupBtn = document.createElement('button');
  groupBtn.className = 'roster-ctrl' + (prefs.grouped ? ' active' : '');
  groupBtn.textContent = prefs.grouped ? 'Grouped' : 'Ungrouped';
  groupBtn.title = 'Toggle status grouping';
  groupBtn.onclick = () => {
    state.config.rosterGrouped = !prefs.grouped;
    scheduleSave(); smoothRender();
  };
  bar.appendChild(groupBtn);

  ensureGroupSort();
  const _anyOpen = GROUP_DEFS.some(d => state.config.groupSort[d.key] && state.config.groupSort[d.key].barOpen);
  const foldAllBtn = document.createElement('button');
  foldAllBtn.className = 'roster-ctrl';
  foldAllBtn.innerHTML = `⇅ ${_anyOpen ? 'Hide' : 'Sort'}`;
  foldAllBtn.title = '展开 / 收起所有组的排序条';
  foldAllBtn.onclick = () => {
    const target = !_anyOpen;
    GROUP_DEFS.forEach(d => { state.config.groupSort[d.key].barOpen = target; });
    scheduleSave(); smoothRender();
  };
  bar.appendChild(foldAllBtn);

  return bar;
}

function buildRosterGroup(status, games, prefs) {
  const wrap = document.createElement('div');
  wrap.className = 'roster-group';
  wrap.dataset.group = status;

  const folded = !!prefs.fold[status];

  const head = document.createElement('div');
  head.className = 'roster-group-head' + (folded ? ' folded' : '');
  head.innerHTML =
    `<span class="rg-caret">›</span>` +
    `<span class="rg-dot"></span>` +
    `<span class="rg-label">${escapeHtml(TIER3_STATUS_LABELS[status])}</span>` +
    `<span class="rg-count">${games.length}</span>` +
    `<span class="rg-line"></span>`;
  head.title = folded ? 'Expand group' : 'Collapse group';
  head.onclick = () => {
    const fold = Object.assign({ up_next: false, considering: false, backlog: true }, state.config.rosterGroupFold || {});
    fold[status] = !folded;
    state.config.rosterGroupFold = fold;
    scheduleSave(); smoothRender();
  };
  wrap.appendChild(head);

  if (!folded) {
    const _gk = 'tier3:' + status;
    if (groupSortState(_gk).barOpen) wrap.appendChild(buildSortBar(_gk));
    else head.appendChild(buildSortHeadEntry(_gk));
  }

  const grid = document.createElement('div');
  grid.className = 'roster-grid';
  if (folded) grid.style.display = 'none';
  games.forEach(g => grid.appendChild(buildRosterCard(g, prefs, status)));
  wrap.appendChild(grid);

  return wrap;
}

function buildRosterCard(game, prefs, status) {

    handle.title = 'Drag to reorder';

  spacer.className = 'rc-spacer';
  head.appendChild(spacer);

  menu.className = 'rc-menu-btn';
  menu.innerHTML = '⋯';
  menu.title = 'More actions';
  menu.onclick = (e) => { e.stopPropagation(); openRosterCardMenu(menu, game); };
  head.appendChild(menu);

  card.appendChild(head);

  // --- Name (editable) ---
  const editingName = editingGameId && editingGameId.tier === 'tier3' && editingGameId.id === game.id;
  if (editingName) {
    const input = document.createElement('input');
    input.className = 'rc-name-edit';

    input.value = game.name;
    let committed = false;
    const commit = () => {
      if (committed) return; committed = true;
      renameGame('tier3', game.id, input.value);
      editingGameId = null; render();
    };
    input.onkeydown = (e) => {
      if (e.key === 'Enter') commit();
      else if (e.key === 'Escape') { committed = true; editingGameId = null; render(); }
    };
    input.onblur = commit;
    card.appendChild(input);
    setTimeout(() => { input.focus(); input.select(); }, 0);
  } else {
    const nameEl = document.createElement('div');
    nameEl.className = 'rc-name';
    nameEl.textContent = parsed.base;

    card.appendChild(nameEl);
  }

  // --- Note (single line, optional, editable) ---
  const editingNote = editingNoteFor && editingNoteFor.tier === 'tier3' && editingNoteFor.id === game.id;
  const isAddingNote = addingNoteFor && addingNoteFor.tier === 'tier3' && addingNoteFor.id === game.id;

    input.type = 'text';

  const footLeft = document.createElement('div');
  footLeft.className = 'rc-foot-left';
  footLeft.appendChild(played);

const FINISHED_GROUP_ORDER = ['beaten', 'completed', 'sated', 'abandoned'];

function finishedFold() {
  return Object.assign({ beaten: true, completed: true, sated: true, abandoned: true }, state.config.finishedFold || {});
}

function renderFinished() {
  const container = document.getElementById('finished-list');
  const section = document.getElementById('section-finished');
  if (!container || !section) return;
  container.innerHTML = '';

  const all = state.config.tier2.filter(g => !!g.completion);
  if (all.length === 0) { section.style.display = 'none'; return; }
  section.style.display = '';

  const fold = finishedFold();
  FINISHED_GROUP_ORDER.forEach(status => {
    const games = state.config.tier2.filter(g => g.completion === status);
    if (games.length === 0) return; // empty group → no header
    container.appendChild(buildFinishedGroup(status, games, fold));
  });

function buildFinishedGroup(status, games, fold) {
  const wrap = document.createElement('div');
  wrap.className = 'roster-group finished-group' + (status === 'abandoned' ? ' abandoned-group' : '');
  wrap.dataset.fgroup = status;

  const folded = !!fold[status];
  const head = document.createElement('div');
  head.className = 'roster-group-head' + (folded ? ' folded' : '');
  head.innerHTML =
    `<span class="rg-caret">›</span>` +
    `<span class="rg-dot"></span>` +
    `<span class="rg-label">${escapeHtml(TIER2_COMPLETION_LABELS[status])}</span>` +
    `<span class="rg-count">${games.length}</span>` +
    `<span class="rg-line"></span>`;
  head.onclick = () => {
    const ff = Object.assign({ beaten: true, completed: true, sated: true, abandoned: true }, state.config.finishedFold || {});
    ff[status] = !folded;
    state.config.finishedFold = ff;
    scheduleSave(); smoothRender();
  };
  wrap.appendChild(head);

  const grid = document.createElement('div');
  grid.className = 'roster-grid';
  if (folded) grid.style.display = 'none';
  const sorted = games.slice().sort((a, b) => {
    const am = a.lastMilestone || '', bm = b.lastMilestone || '';
    if (am !== bm) return am < bm ? 1 : -1; // most recent milestone first
    return 0;
  });
  sorted.forEach(g => grid.appendChild(buildFinishedCard(g, status)));
  wrap.appendChild(grid);

  return wrap;
}

// ============================================================
// Review (回顾) — history overview + day drill-down
// ============================================================
let reviewOpen = false;
let reviewSpan = 'quarter';     // 'month' | 'quarter' | 'year'
let reviewAnchor = null;        // dateKey — reference date for the visible window
let reviewSelectedDay = null;   // dateKey — currently inspected day

const RV_MONTH = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const RV_WK = ['周日','周一','周二','周三','周四','周五','周六']; // by getDay()

// Hue carries TIME (weekly), cycling once per ~quarter so the 季 view is a full
// loop — but only through a curated MACARON ring, never a raw rainbow. Adjacent
// weeks interpolate softly. Intensity carries AMOUNT (深浅).
const RV_HUE_PERIOD = 91;   // days per full loop
const RV_HUE_OFFSET = 0.33;  // rotate the ring (0..1) — 0.33 lands "now" on coral/rose
const RV_MACARON = [
  [226, 150, 128], // 珊瑚 coral
  [242, 196, 150], // 蜜桃 peach
  [240, 200, 132], // 蜂蜜金 honey (去土黄)
  [182, 212, 168], // 鼠尾草 sage (去橄榄)
  [176, 202, 224], // 粉蓝 powder blue
  [208, 192, 228], // 薰衣草 lavender
  [242, 196, 212], // 玫瑰 rose
];
function rvDoy(d) { const s = new Date(d.getFullYear(), 0, 0); return Math.floor((d - s) / 86400000); }
function rvWeekT(d) { const mon = new Date(d); mon.setDate(d.getDate() - ((d.getDay() + 6) % 7)); return (((rvDoy(mon) % RV_HUE_PERIOD) / RV_HUE_PERIOD) + RV_HUE_OFFSET) % 1; }
function rvMacaron(t) {
  const n = RV_MACARON.length, x = ((t % 1) + 1) % 1 * n, i = Math.floor(x) % n, j = (i + 1) % n, f = x - Math.floor(x);
  const a = RV_MACARON[i], b = RV_MACARON[j];
  return [0, 1, 2].map(k => a[k] + (b[k] - a[k]) * f);
}
function rvHeat(d, i) {
  let [r, g, b] = rvMacaron(rvWeekT(d));
  const deep = [1, 1, 0.95, 0.88, 0.82][i], A = [0.13, 0.45, 0.64, 0.80, 0.95][i];
  return `rgba(${Math.round(r * deep)},${Math.round(g * deep)},${Math.round(b * deep)},${A})`;
}

// Main view wears the VIEWED day's week macaron as its primary accent (tier1/2
// "ritual" chrome only). Tier3 status colours have their own vars and are
// untouched. The warm material (panels/track/bg) is hard-coded and stays warm.
function applyWeekTheme() {
  const base = (typeof viewDate === 'string' && viewDate) ? parseDateKey(viewDate) : new Date();
  const m = rvMacaron(rvWeekT(base));
  const r = Math.round(m[0]), g = Math.round(m[1]), b = Math.round(m[2]);
  const dr = Math.round(m[0] * 0.88), dg = Math.round(m[1] * 0.88), db = Math.round(m[2] * 0.88);
  const rs = document.documentElement.style;
  rs.setProperty('--accent', `rgb(${dr},${dg},${db})`);
  rs.setProperty('--accent-soft', `rgba(${r},${g},${b},0.22)`);
  rs.setProperty('--accent-faint', `rgba(${r},${g},${b},0.10)`);
  rs.setProperty('--accent-grad', `linear-gradient(90deg, rgba(${r},${g},${b},0.42), rgb(${dr},${dg},${db}))`);
}

function openReview() {
  reviewOpen = true;
  reviewSpan = 'quarter';
  reviewAnchor = todayKey();
  reviewSelectedDay = todayKey();
  render();
}
function closeReview() { reviewOpen = false; render(); }

// Visible window [start, end] (inclusive) for the current span + anchor.
function reviewWindow() {
  const a = parseDateKey(reviewAnchor); a.setHours(0, 0, 0, 0);
  if (reviewSpan === 'month') {
    return { start: new Date(a.getFullYear(), a.getMonth(), 1), end: new Date(a.getFullYear(), a.getMonth() + 1, 0) };
  }
  if (reviewSpan === 'year') {
    return { start: new Date(a.getFullYear(), 0, 1), end: new Date(a.getFullYear(), 11, 31) };
  }
  // quarter: 13 weeks ending on the Sunday of the anchor's week
  const dow = (a.getDay() + 6) % 7;            // Mon=0
  const end = new Date(a); end.setDate(a.getDate() + (6 - dow));
  const start = new Date(end); start.setDate(end.getDate() - (13 * 7 - 1));
  return { start, end };
}

function canPageNext() {
  const a = parseDateKey(reviewAnchor);
  const t = new Date(); t.setHours(0, 0, 0, 0);
  if (reviewSpan === 'month') return !(a.getFullYear() === t.getFullYear() && a.getMonth() === t.getMonth());
  if (reviewSpan === 'year') return a.getFullYear() < t.getFullYear();
  return reviewWindow().end < t; // quarter: more recent weeks exist
}

function pageReview(dir) {
  if (dir > 0 && !canPageNext()) return;
  const a = parseDateKey(reviewAnchor);
  if (reviewSpan === 'month') a.setMonth(a.getMonth() + dir);
  else if (reviewSpan === 'year') a.setFullYear(a.getFullYear() + dir);
  else a.setDate(a.getDate() + dir * 7 * 13);
  const t = new Date(); t.setHours(0, 0, 0, 0);
  if (a > t) { reviewAnchor = todayKey(); } else { reviewAnchor = dateKey(a); }
  fillReview();
}

function renderReview() {
  const root = document.getElementById('root');
  root.innerHTML = `
    <div class="review-view">
      <div class="rv-header narrow">
        <button class="rv-back" id="rv-back">↩ 返回</button>

          <span class="lg" style="background:rgba(150,130,110,0.50)"></span>
          <span class="lg" style="background:rgba(150,130,110,0.72)"></span>
          <span class="lg" style="background:rgba(150,130,110,0.92)"></span>
          <span>多</span>

        <div id="rv-detail" class="rv-detail-card"></div>
      </div>
    </div>`;
  document.getElementById('rv-back').onclick = closeReview;
  document.getElementById('rv-prev').onclick = () => pageReview(-1);
  document.getElementById('rv-next').onclick = () => pageReview(1);
  document.querySelectorAll('.rv-span-toggle button').forEach(b => {

  });
  fillReview();
}

function fillReview() {
  document.querySelectorAll('.rv-span-toggle button').forEach(b => b.classList.toggle('active', b.dataset.span === reviewSpan));
  const { start, end } = reviewWindow();

  renderReviewSummary(start, end);

}

  if (reviewSpan === 'month') { const a = parseDateKey(reviewAnchor); return a.getFullYear() + ' · ' + RV_MONTH[a.getMonth()]; }
  if (reviewSpan === 'year') return String(parseDateKey(reviewAnchor).getFullYear());
  return RV_MONTH[start.getMonth()] + start.getDate() + '日 – ' + RV_MONTH[end.getMonth()] + end.getDate() + '日';

function rvDayCell(d, today, px) {
  const key = dateKey(d);
  const cell = document.createElement('div');
  cell.className = 'rv-cell';
  cell.style.width = px + 'px'; cell.style.height = px + 'px';
  if (d > today) { cell.classList.add('future'); return cell; }
  const i = getDayIntensity(key);
  cell.dataset.i = i;
  cell.style.background = rvHeat(d, i);
  if (key === todayKey()) cell.classList.add('today');
  if (key === reviewSelectedDay) cell.classList.add('sel');
  cell.title = key;
  cell.onclick = () => { reviewSelectedDay = key; fillReview(); };
  return cell;
}

// Quarter / Year — week columns × 7 day rows (GitHub-style rhythm field)
function buildWeekField() {
  const { start, end } = reviewWindow();
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const px = reviewSpan === 'year' ? 10 : 22;
  const gap = reviewSpan === 'year' ? 2 : 4;
  const s = new Date(start); s.setDate(s.getDate() - ((s.getDay() + 6) % 7));   // back to Monday
  const e = new Date(end);   e.setDate(e.getDate() + (6 - ((e.getDay() + 6) % 7))); // fwd to Sunday
  const weeks = Math.round((e - s) / (7 * 86400000)) + 1;

  const grid = document.createElement('div');
  grid.className = 'rv-grid';
  grid.style.gridTemplateColumns = `auto repeat(${weeks}, ${px}px)`;
  grid.style.gap = gap + 'px';

  // Month-label row
  grid.appendChild(document.createElement('div'));
  for (let w = 0; w < weeks; w++) {
    const d = new Date(s); d.setDate(s.getDate() + w * 7);
    const lab = document.createElement('div'); lab.className = 'rv-collabel';
    const prev = new Date(s); prev.setDate(s.getDate() + (w - 1) * 7);
    if (w === 0 || d.getMonth() !== prev.getMonth()) {
      lab.textContent = RV_MONTH[d.getMonth()];
      const lc = rvMacaron(rvWeekT(d)).map(v => Math.round(v * 0.55));
      lab.style.color = `rgb(${lc[0]},${lc[1]},${lc[2]})`;
      lab.style.fontWeight = '600';
    }
    grid.appendChild(lab);
  }
  const showRow = [true, false, true, false, true, false, false];
  const letters = ['一', '二', '三', '四', '五', '六', '日'];
  for (let r = 0; r < 7; r++) {
    const rl = document.createElement('div'); rl.className = 'rv-rowlabel';
    rl.style.height = px + 'px';
    rl.textContent = showRow[r] ? letters[r] : '';
    grid.appendChild(rl);
    for (let w = 0; w < weeks; w++) {
      const d = new Date(s); d.setDate(s.getDate() + w * 7 + r); d.setHours(0, 0, 0, 0);
      grid.appendChild(rvDayCell(d, today, px));
    }
  }
  return grid;
}

// Month — true calendar grid with date numbers (journal feel)
function buildMonthField() {
  const a = parseDateKey(reviewAnchor);
  const y = a.getFullYear(), m = a.getMonth();
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const wrap = document.createElement('div');
  wrap.className = 'rv-month';

  const head = document.createElement('div'); head.className = 'rv-month-head';
  ['一', '二', '三', '四', '五', '六', '日'].forEach(l => { const d = document.createElement('div'); d.textContent = '周' + l; head.appendChild(d); });
  wrap.appendChild(head);

  const grid = document.createElement('div'); grid.className = 'rv-mgrid';
  const first = new Date(y, m, 1);
  const lead = (first.getDay() + 6) % 7;
  const days = new Date(y, m + 1, 0).getDate();
  for (let i = 0; i < lead; i++) { const b = document.createElement('div'); b.className = 'rv-mcell blank'; grid.appendChild(b); }
  for (let dn = 1; dn <= days; dn++) {
    const d = new Date(y, m, dn); d.setHours(0, 0, 0, 0);
    const key = dateKey(d);
    const c = document.createElement('div'); c.className = 'rv-mcell';
    const num = document.createElement('div'); num.className = 'd'; num.textContent = dn; c.appendChild(num);
    if (d > today) { c.classList.add('future'); }
    else {
      c.style.background = rvHeat(d, getDayIntensity(key));
      if (key === todayKey()) c.classList.add('today');
      if (key === reviewSelectedDay) c.classList.add('sel');
      c.onclick = () => { reviewSelectedDay = key; fillReview(); };
    }
    grid.appendChild(c);
  }
  wrap.appendChild(grid);
  return wrap;
}

// One quiet line of trend for the visible window
function renderReviewSummary(start, end) {
  const el = document.getElementById('rv-summary');
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const s = new Date(start); s.setHours(0, 0, 0, 0);
  let e = new Date(end); e.setHours(0, 0, 0, 0); if (e > today) e = new Date(today);
  let elapsed = 0, attended = 0, run = 0, best = 0;
  const counts = {};
  for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
    elapsed++;
    const key = dateKey(d);
    if (getDayIntensity(key) > 0) { attended++; run++; if (run > best) best = run; } else run = 0;
    const day = state.history[key];
    if (day && day.tier1) for (const gid in day.tier1) { if (day.tier1[gid].checkedIn) counts[gid] = (counts[gid] || 0) + 1; }
  }
  if (elapsed <= 0 || attended === 0) { el.innerHTML = '<span>这段时间还没有打卡记录</span>'; return; }
  let topId = null, topN = 0;
  for (const gid in counts) if (counts[gid] > topN) { topN = counts[gid]; topId = gid; }
  const topGame = topId ? parsePlatform((gameById(topId) || {}).name || '').base : '—';
  el.innerHTML =
    `<span>到场 <b>${attended}</b>/${elapsed} 天</span>` +
    `<span class="sum-sep">·</span><span>最长连续 <b>${best}</b> 天</span>` +
    `<span class="sum-sep">·</span><span>最常打卡 <b>${escapeHtml(topGame)}</b></span>`;
}

  const finishes = [];

    rows += `<div class="rv-dt-row">` +

      `<div class="rv-dt-main">` +

        (gd.extra ? '<span class="rv-dt-extra">✦</span>' : '') +

function renderHeatmap() {
  const container = document.getElementById('heatmap');
  container.innerHTML = '';
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const numWeeks = 12;
  const dayOfWeek = (today.getDay() + 6) % 7;
  const startDate = new Date(today); startDate.setDate(today.getDate() - dayOfWeek - (numWeeks - 1) * 7);
  const showLabel = [true, false, true, false, true, false, false];
  const dayLetters = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];

  for (let row = 0; row < 7; row++) {
    const label = document.createElement('div');
    label.className = 'heatmap-row-label';
    label.textContent = showLabel[row] ? dayLetters[row] : '';
    container.appendChild(label);
    for (let col = 0; col < numWeeks; col++) {
      const cellDate = new Date(startDate);
      cellDate.setDate(startDate.getDate() + col * 7 + row);
      const key = dateKey(cellDate);
      const isToday = key === todayKey();
      const isViewing = key === viewDate;
      const isFuture = cellDate > today;
      const cell = document.createElement('div');
      let cls = 'heatmap-cell';
      if (isFuture) cls += ' future';
      if (isToday && !isViewing) cls += ' today';
      if (isViewing) cls += ' viewing';
      cell.className = cls;
      cell.dataset.dateKey = key;
      if (!isFuture) {
        cell.dataset.intensity = getDayIntensity(key);
        cell.onclick = () => { viewDate = key; refreshDayView(); };
        cell.addEventListener('mouseenter', () => {
          const tt = document.getElementById('tooltip');
          const dd = state.history[key];
          let label = key;
          const relevant = gamesInTierOnDate('tier1', key);
          if (dd) {
            let c = 0;
            relevant.forEach(g => { if (dd.tier1 && dd.tier1[g.id] && dd.tier1[g.id].checkedIn) c++; });
            label += ' · ' + c + '/' + relevant.length;
          } else label += ' · —';
          tt.textContent = label;
          tt.classList.add('visible');
        });
        cell.addEventListener('mousemove', (e) => {
          const tt = document.getElementById('tooltip');
          tt.style.left = (e.clientX + 14) + 'px';
          tt.style.top = (e.clientY - 32) + 'px';
        });
        cell.addEventListener('mouseleave', () => {
          document.getElementById('tooltip').classList.remove('visible');
        });
      }
      container.appendChild(cell);
    }
  }
}

// ====== Journey feature (milestones + detail + 历程) ======
// ============================================================
// Journey: milestones (nodes) — data layer
// ============================================================
// A milestone (节点) = a reached point. Shape:
//   { id, type, inst, outcome, date, ending, rating, note }
// Lives on game.milestones[] for ANY tier. completion + lastMilestone
// are DERIVED from it (write-through). Heartbeat owns "playing"; this owns "reached".

const OUTCOME_RANK = { completed: 4, beaten: 3, sated: 2, abandoned: 1 };
// Only these node types "finish" a game (drive the Finished shelf / completion).
// A single route/side milestone does NOT mark the whole game done.
const FINISHING_TYPES = ['整体', '主线'];

function findGameAnywhere(gameId) {
  for (const tier of ['tier1', 'tier2', 'tier3']) {
    const game = state.config[tier].find(x => x.id === gameId);
    if (game) return { game, tier };
  }
  return null;
}

// Recompute derived completion + lastMilestone from milestones (write-through).
// No milestones → leave existing (manual/legacy) completion untouched.
function recomputeGame(game) {
  const ms = (game.milestones || []).filter(m => m && m.outcome);
  const dates = ms.map(m => m.date).filter(Boolean).sort();
  if (dates.length) game.lastMilestone = dates[dates.length - 1];

  const finishing = ms.filter(m => FINISHING_TYPES.indexOf(m.type) !== -1);
  if (finishing.length) {
    const best = finishing.slice().sort((a, b) => {
      const ra = OUTCOME_RANK[a.outcome] || 0, rb = OUTCOME_RANK[b.outcome] || 0;
      if (ra !== rb) return rb - ra;
      return (a.date || '') < (b.date || '') ? 1 : -1;
    })[0];
    game.completion = best.outcome;
  } else if (ms.length) {
    // has route/side reaches but nothing that finishes the game → not on the shelf
    game.completion = '';
  }
}

function nodeTypes() { return state.config.nodeTypes || []; }
function tagList() { return state.config.tagList || []; }

function addToConfigList(key, val) {
  val = (val || '').trim();
  if (!val) return;
  if (!Array.isArray(state.config[key])) state.config[key] = [];
  if (state.config[key].indexOf(val) === -1) { state.config[key].push(val); scheduleSave(); }
}

function addMilestone(gameId, m) {
  const found = findGameAnywhere(gameId);
  if (!found) return;
  if (!Array.isArray(found.game.milestones)) found.game.milestones = [];
  found.game.milestones.push(Object.assign({ id: 'ms_' + Date.now() }, m));
  recomputeGame(found.game);
  scheduleSave();
}

function updateMilestone(gameId, msId, patch) {
  const found = findGameAnywhere(gameId);
  if (!found) return;
  const m = (found.game.milestones || []).find(x => x.id === msId);
  if (!m) return;
  Object.assign(m, patch);
  recomputeGame(found.game);
  scheduleSave();
}

function deleteMilestone(gameId, msId) {
  const found = findGameAnywhere(gameId);
  if (!found || !Array.isArray(found.game.milestones)) return;
  const before = JSON.parse(JSON.stringify(found.game.milestones));
  const removed = found.game.milestones.find(x => x.id === msId);
  found.game.milestones = found.game.milestones.filter(x => x.id !== msId);
  recomputeGame(found.game);
  // If this removed the last milestone, clear the derived shelf state too
  // (so deleting an 整体 reach takes the game back off the Finished shelf).
  if (found.game.milestones.length === 0) { found.game.completion = ''; found.game.lastMilestone = ''; }
  scheduleSave();
  buildDetail();
  smoothRender();
  showToast({
    message: '已删除一条里程碑',
    onAction: () => {
      const f = findGameAnywhere(gameId);
      if (f) { f.game.milestones = before; recomputeGame(f.game); scheduleSave(); buildDetail(); smoothRender(); }
    }
  });
}

// ============================================================
// Journey: per-game detail modal (full info + milestone log)
// ============================================================
// _detailState: { gameId, mode: 'view'|'add'|'edit', editId, draft }
let _detailState = null;

function openDetail(gameId) {
  _detailState = { gameId, mode: 'view', editId: null, draft: null };
  buildDetail();
}

function closeDetail() {
  _detailState = null;
  const ov = document.querySelector('.detail-overlay');
  if (ov) ov.remove();
}

function emptyDraft() {
  return { type: '', inst: '', outcome: '', date: todayKey(), ending: '', rating: '', note: '' };
}

function buildDetail() {
  document.querySelectorAll('.detail-overlay').forEach(el => el.remove());
  if (!_detailState) return;
  const found = findGameAnywhere(_detailState.gameId);
  if (!found) { _detailState = null; return; }
  const game = found.game;
  const parsed = parsePlatform(game.name);

  const overlay = document.createElement('div');
  overlay.className = 'detail-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) closeDetail(); };

  const card = document.createElement('div');
  card.className = 'detail-card';
  overlay.appendChild(card);

  // ---- Head ----
  const head = document.createElement('div');
  head.className = 'detail-head';
  const title = document.createElement('div');
  title.className = 'detail-title';
  title.textContent = parsed.base;
  head.appendChild(title);
  if (parsed.platform) {
    const plat = document.createElement('div');
    plat.className = 'detail-plat';
    plat.textContent = parsed.platform;
    head.appendChild(plat);
  }
  const close = document.createElement('div');
  close.className = 'detail-close';
  close.textContent = '×';
  close.onclick = closeDetail;
  head.appendChild(close);
  card.appendChild(head);

  // ---- Meta: flat tags (multi-select) ----
  card.appendChild(buildTagEditor(game));

  // ---- Milestones ----
  const label = document.createElement('div');
  label.className = 'detail-section-label';
  label.textContent = '里程碑';
  card.appendChild(label);

  const list = document.createElement('div');
  list.className = 'ms-list';
  const ms = (game.milestones || []).slice().sort((a, b) => (a.date || '') < (b.date || '') ? 1 : -1);
  if (ms.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'ms-empty';
    empty.textContent = '还没有里程碑';
    list.appendChild(empty);
  } else {
    ms.forEach(m => list.appendChild(buildMilestoneRow(game.id, m)));
  }
  card.appendChild(list);

  // ---- Add / edit form, or add button ----
  if (_detailState.mode === 'add' || _detailState.mode === 'edit') {
    card.appendChild(buildMilestoneForm(game.id));
  } else {
    const addBtn = document.createElement('button');
    addBtn.className = 'ms-add-btn';
    addBtn.textContent = '＋ 记一条里程碑';
    addBtn.onclick = () => { _detailState.mode = 'add'; _detailState.editId = null; _detailState.draft = emptyDraft(); buildDetail(); };
    card.appendChild(addBtn);
  }

  document.body.appendChild(overlay);
}

function buildTagEditor(game) {
  const wrap = document.createElement('div');
  wrap.className = 'detail-meta';
  const tags = Array.isArray(game.tags) ? game.tags : [];
  tags.forEach(t => {
    const chip = document.createElement('div');
    chip.className = 'detail-tag tag-chip';
    const lab = document.createElement('span'); lab.textContent = t; chip.appendChild(lab);
    const x = document.createElement('span'); x.className = 'tag-x'; x.textContent = '✕';
    x.onclick = (e) => { e.stopPropagation(); removeGameTag(game.id, t); buildDetail(); };
    chip.appendChild(x);
    wrap.appendChild(chip);
  });
  const add = document.createElement('div');
  add.className = 'detail-tag empty';
  add.textContent = tags.length ? '＋' : '＋ 标签';
  add.onclick = () => {
    const avail = tagList().filter(t => tags.indexOf(t) === -1);
    const items = avail.map(v => ({ value: v, label: v }));
    items.push({ value: '__add__', label: '＋ 新增…' });
    showPicker(add, items, '', v => {
      if (v === '__add__') { promptNewValue(add, 'tagList', nv => { addGameTag(game.id, nv); buildDetail(); }); return; }
      if (v) { addGameTag(game.id, v); buildDetail(); }
    });
  };
  wrap.appendChild(add);
  return wrap;
}

function addGameTag(gameId, tag) {
  tag = (tag || '').trim(); if (!tag) return;
  const found = findGameAnywhere(gameId); if (!found) return;
  if (!Array.isArray(found.game.tags)) found.game.tags = [];
  if (found.game.tags.indexOf(tag) === -1) { found.game.tags.push(tag); scheduleSave(); }
}
function removeGameTag(gameId, tag) {
  const found = findGameAnywhere(gameId); if (!found) return;
  if (Array.isArray(found.game.tags)) found.game.tags = found.game.tags.filter(t => t !== tag);
  scheduleSave();
}

// Inline "add new option" input (custom, no native prompt)
function promptNewValue(anchor, listKey, onDone) {
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'mf-inline-add';
  input.style.cssText = 'position:absolute;z-index:700;border:1px solid var(--accent);background:var(--bg);border-radius:9px;padding:7px 9px;font-family:var(--body-font);font-size:13px;color:var(--text);min-width:140px;';
  const r = anchor.getBoundingClientRect();
  input.style.left = r.left + 'px';
  input.style.top = (r.bottom + 6) + 'px';
  let done = false;
  const commit = (save) => {
    if (done) return; done = true;
    const v = input.value.trim();
    input.remove();
    if (save && v) { addToConfigList(listKey, v); onDone(v); }
  };
  input.onkeydown = (e) => { if (e.key === 'Enter') commit(true); else if (e.key === 'Escape') commit(false); };
  input.onblur = () => commit(true);
  document.body.appendChild(input);
  setTimeout(() => input.focus(), 0);
}
