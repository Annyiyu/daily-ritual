  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r(--display-font); font-size: 11px;\n  color: var(--accent); letter-spacing: 0.05em; opacity: 0.75;\n  user-select: none;\n}\n\n.game-note {\n  font-family: var(--body-font); font-size: 12px;\n  color: var(--text-faint); font-style: italic;\n  letter-spacing: -0.005em; line-height: 1.4;\n  cursor: pointer;\n  word-break: break-word;\n}\n.game-note:hover { color: var(--text-muted); }\n\n.game-name-edit {\n  flex: 1; font-family: var(--body-font); font-size: 15px;\n  color: var(--text); letter-spacing: -0.005em;\n  background: transparent; border: none; border-bottom: 1px solid var(--accent);\n  outline: none; padding: 0; min-width: 0;\n}\n\n.note-edit {\n  font-family: var(--body-font); font-size: 12px; font-style: italic;\n  color: var(--text); background: transparent; border: none;\n  border-bottom: 1px solid var(--accent); outline: none;\n  padding: 2px 0; width: 100%;\n}\n\n.extra-toggle {\n  width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;\n  cursor: pointer; font-size: 14px; color: var(--text-faint);\n  transition: all 0.2s ease; user-select: none; flex-shrink: 0;\n}\n.extra-toggle:hover { color: var(--accent); }\n.extra-toggle.active { color: var(--accent); }\n\n.streak {\n  font-family: var(--display-font); font-size: 12px; letter-spacing: 0.05em;\n  color: var(--text-faint); font-variant-numeric: tabular-nums;\n  min-width: 32px; text-align: right; flex-shrink: 0;\n}\n.streak.active { color: var(--accent); }\n\n/* Status pills (Playing completion + Roster status) */\n.status-pill {\n  font-family: var(--label-font); font-size: 9px;\n  letter-spacing: 0.22em; text-transform: uppercase;\n  color: var(--text-muted); cursor: pointer;\n  padding: 3px 9px; border-radius: 999px;\n  transition: all 0.2s; user-select: none; flex-shrink: 0;\n  border: 1px solid transparent;\n}\n.status-pill.empty {\n  opacity: 0; padding: 3px 4px; pointer-events: none; min-width: 0;\n}\n.game-item:hover .status-pill.empty,\n.roster-item:hover .st : pointer; margin: 0 8px; }\n.app-footer a:hover { color: var(--accent); }\n\n/* Tooltip */\n.tooltip {\n  position: fixed; font-family: var(--label-font);\n  background-color: var(--text); color: var(--bg);\n  font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;\n  padding: 6px 10px; border-radius: 3px; pointer-events: none;\n  opacity: 0; transition: opacity 0.15s; z-index: 100; white-space: nowrap;\n}\n.tooltip.visible { opacity: 1; }\n\n/* Drag ghost */\n.drag-ghost {\n  position: fixed; pointer-events: none; z-index: 1000;\n  background-color: var(--bg); border: 1px solid var(--line-strong);\n  border-radius: 6px; padding: 8px 12px;\n  font-family: var(--body-font); font-size: 14px; color: var(--text);\n  box-shadow: 0 4px 20px rgba(0,0,0,0.12); opacity: 0.95;\n  white-space: nowrap; max-width: 280px; overflow: hidden; text-overflow: ellipsis;\n}\n\n/* Save indicator — minimal: a single tiny dot at top-right.\n   Idle = invisible. Saving = soft pulsing dot. Just-saved = brief ✓ flash. Error = visible pill. */\n.save-dot-mini {\n  position: fixed; top: 14px; right: 14px;\n  width: 6px; height: 6px; border-radius: 50%;\n  background-color: var(--text-faint); opacity: 0;\n  transition: opacity 0.4s, background-color 0.2s, transform 0.25s;\n  z-index: 90; pointer-events: none;\n}\n.save-dot-mini.saving { opacity: 0.55; animation: pulse 1.4s ease-in-out infinite; }\n.save-dot-mini.saved { opacity: 0.8; background-color: var(--accent); transform: scale(1.4); }\n\n.save-indicator {\n  position: fixed; bottom: 18px; right: 18px;\n  font-family: var(--label-font); font-size: 9px; letter-spacing: 0.25em;\n  text-transform: uppercase; padding: 7px 13px; border-radius: 4px;\n  z-index: 90; display: none; align-items: center; gap: 8px;\n  background-color: var(--bg); border: 1px solid var(--accent-soft);\n  color: var(--accent); animation: fadeIn 0.3s;\n}\n.save-indicator.visible { display: flex; }\n.save-dot {\n  width: 6px; height: 6px; border-radius: 50%;\n  background-color: currentColor; animation: pulse 1.2s ease-in-out infinite;\n}\n\n/* Inline dialog — replaces native confirm() */\n.dialog-overlay {\n  position: fixed; inset: 0; background: rgba(42,36,28,0.28);\n  z-index: 300; display: flex; align-items: center; justify-content: center;\n  animation: fadeIn 0.18s ease-out; padding: 24px;\n}\n.dialog {\n  background: var(--bg); border: 1px solid var(--line-strong);\n  border-radius: 10px; padding: 28px 28px 22px;\n  max-width: 380px; width: 100%;\n  box-shadow: 0 12px 40px rgba(0,0,0,0.18);\n  animation: dialogIn 0.22s cubic-bezier(0.16, 1, 0.3, 1);\n}\n@keyframes dialogIn {\n  from { opacity: 0; transform: translateY(8px) scale(0.97); }\n  to { opacity: 1; transform: translateY(0) scale(1); }\n}\n.dialog-title {\n  font-family: var(--display-font); font-size: 20px; font-weight: 400;\n  color: var(--text); letter-spacing: -0.01em; margin-bottom: 10px;\n  line-height: 1.3;\n}\n.dialog-message {\n  font-family: var(--body-font); font-size: 13.5px; line-height: 1.55;\n  color: var(--text-muted); margin-bottom: 22px;\n}\n.dialog-message strong { color: var(--text); font-weight: 500; }\n.dialog-actions {\n  display: flex; gap: 10px; justify-content: flex-end; align-items: center;\n}\n.dialog-btn {\n  font-family: var(--label-font); font-size: 10px; letter-spacing: 0.25em;\n  text-transform: uppercase; padding: 9px 18px; border-radius: 999px;\n  cursor: pointer; transition: all 0.18s; border: 1px solid transparent;\n  background: transparent;\n}\n.dialog-btn.cancel { color: var(--text-muted); border-color: var(--line-strong); }\n.dialog-btn.cancel:hover { color: var(--text); border-color: var(--text-muted); }\n.dialog-btn.confirm { background: var(--text); color: var(--bg); border-color: var(--text); }\n.dialog-btn.confirm:hover { opacity: 0.85; }\n.dialog-btn.confirm.danger { background: #a13a2a; border-color: #a13a2a; }\n.dialog-btn.confirm.danger:hover { background: #8a2f22; border-color: #8a2f22; opacity: 1; }\n\n/* Picker popover (status pills) */\n.picker-menu {\n  position: fixed; z-index: 250;\n  background: var(--bg); border: 1px solid var(--line-strong);\n  border-radius: 8px; padding: 5px;\n  box-shadow: 0 8px 24px rgba(0,0,0,0.12);\n  display: flex; flex-direction: column; gap: 1px;\n  min-width: 140px;\n  animation: pickerIn 0.16s cubic-bezier(0.16, 1, 0.3, 1);\n}\n@keyframes pickerIn {\n  from { opacity: 0; transform: translateY(-4px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n.picker-item {\n  font-family: var(--label-font); font-size: 9.5px;\n  letter-spacing: 0.22em; text-transform: uppercase;\n  padding: 8px 12px; border-radius: 5px;\n  color: var(--text-muted); cursor: pointer;\n  display: flex; align-items: center; justify-content: space-between;\n  gap: 12px; transition: background-color 0.12s, color 0.12s;\n  user-select: none;\n}\n.picker-item:hover { background: var(--accent-faint); color: var(--accent); }\n.picker-item.active { color: var(--accent); }\n.picker-item .picker-check { font-size: 11px; opacity: 0; }\n.picker-item.active .picker-check { opacity: 1; }\n.picker-item.clear { color: var(--text-faint); border-top: 1px solid var(--line); margin-top: 3px; padding-top: 11px; border-radius: 0 0 5px 5px; }\n.picker-item.clear:hover { color: var(--text); background: transparent; }\n\n/* Undo toast */\n.toast {\n  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);\n  background: var(--text); color: var(--bg);\n  font-family: var(--label-font); font-size: 11px;\n  letter-spacing: 0.15em; padding: 11px 6px 11px 18px;\n  border-radius: 999px; box-shadow: 0 8px 24px rgba(0,0,0,0.18);\n  z-index: 280; display: flex; align-items: center; gap: 4px;\n  animation: toastIn 0.28s cubic-bezier(0.16, 1, 0.3, 1);\n  max-width: calc(100vw - 32px);\n}\n.toast.leaving { animation: toastOut 0.2s ease-in forwards; }\n@keyframes toastIn { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }\n@keyframes toastOut { from { opacity: 1; transform: translate(-50%, 0); } to { opacity: 0; transform: translate(-50%, 12px); } }\n.toast-msg { font-family: var(--body-font); font-size: 13px; letter-spacing: 0; padding-right: 6px; opacity: 0.95; }\n.toast-action {\n  font-family: var(--label-font); font-size: 10px; letter-spacing: 0.22em;\n  text-transform: uppercase; color: var(--bg); cursor: pointer;\n  padding: 7px 14px; border-radius: 999px;\n  background: rgba(236, 235, 225, 0.14);\n  transition: background-color 0.18s;\n}\n.toast-action:hover { background: rgba(236, 235, 225, 0.24); }\n.toast-close {\n  width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;\n  color: var(--bg); opacity: 0.6; cursor: pointer; font-size: 14px; line-height: 1;\n  border-radius: 999px; transition: opacity 0.15s, background-color 0.15s;\n}\n.toast-close:hover { opacity: 1; background: rgba(236, 235, 225, 0.14); }\n\n/* Layout / entry animations: keyed list items for FLIP */\n.game-item, .roster-item {\n  view-transition-name: none;\n}\n.game-item.entering, .roster-item.entering {\n  animation: itemEnter 0.32s cubic-bezier(0.16, 1, 0.3, 1) backwards;\n}\n.game-item.leaving, .roster-item.leaving {\n  animation: itemLeave 0.22s ease-in forwards;\n  pointer-events: none;\n}\n@keyframes itemEnter {\n  from { opacity: 0; transform: translateY(-6px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n@keyframes itemLeave {\n  from { opacity: 1; max-height: 80px; transform: translateY(0); }\n  to { opacity: 0; max-height: 0; transform: translateY(-4px); padding-top: 0; padding-bottom: 0; border-color: transparent; }\n}\n\n/* Streak number transition */\n.streak { transition: color 0.25s ease; }\n.streak .streak-num { display: inline-block; transition: opacity 0.18s; }\n.streak .streak-num.flash { animation: streakPop 0.4s cubic-bezier(0.16, 1, 0.3, 1); }\n@keyframes streakPop {\n  0% { transform: scale(1); }\n  40% { transform: scale(1.25); color: var(--accent); }\n  100% { transform: scale(1); }\n}\n\n/* Day-switch fade */\n.day-fade { animation: dayFade 0.22s ease-out; }\n@keyframes dayFade { from { opacity: 0.4; } to { opacity: 1; } }\n\n@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }\n\n@media (max-width: 520px) {\n  body { padding: 32px 18px 60px; }\n  .section { margin-bottom: 48px; }\n  .header { margin-bottom: 48px; }\n  .subtasks-row { margin-left: 28px; }\n  .streak { min-width: 28px; }\n  .drag-handle { opacity: 0.6; width: 22px; height: 28px; }\n  .game-row { gap: 8px; }\n  .roster-item { gap: 8px; }\n  .status-pill.empty { opacity: 0.4; pointer-events: auto; }\n  .subtask-manage-link { opacity: 0.6; }\n  .save-dot-mini { top: 10px; right: 10px; }\n  .toast { font-size: 12px; padding: 10px 5px 10px 16px; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"container\" id=\"root\">\n  <div class=\"loading-screen\"><div class=\"loading-dots\">···<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"tooltip\" id=\"tooltip\"><\u002Fdiv>\n<div class=\"save-dot-mini\" id=\"save-dot-mini\"><\u002Fdiv>\n<div class=\"save-indicator\" id=\"save-indicator\">\n  <span class=\"save-dot\"><\u002Fspan>\n  <span id=\"save-text\">Save failed · retrying<\u002Fspan>\n<\u002Fdiv>\n<div id=\"toast-host\"><\u002Fdiv>\n<div id=\"dialog-host\"><\u002Fdiv>\n<div id=\"picker-host\"><\u002Fdiv>\n\n<script>\n// ============================================================\n// Supabase configuration\n// ============================================================\nconst SUPABASE_URL = 'https://qhcjddtxvktuowoaemnc.supabase.co';\nconst SUPABASE_KEY = 'sb_publishable_tRpF5o9qWkIdAjwhPatp1A_igucPgGB';\nconst supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);\n\n// ============================================================\n// Default config\n// ============================================================\nconst DEFAULT_CONFIG = {\n  tier1: [\n    { id: 'arknights', name: '明日方舟', subtasks: [] },\n    { id: 'baijing', name: '白荆回廊', subtasks: [] },\n    { id: 'pokopia', name: 'Pokémon Pokopia', subtasks: [\n      { id: 'stamp', name: '盖章' },\n      { id: 'materials', name: '买材料单' }\n    ]},\n    { id: 'tomodachi', name: 'Tomodachi Life', subtasks: [\n      { id: 'morning', name: '早市' },\n      { id: 'noon', name: '午市' },\n      { id: 'night', name: '晚市' },\n      { id: 'news', name: '新闻' },\n      { id: 'income', name: '每日收入' },\n      { id: 'food', name: '新食物' },\n      { id: 'clothes', name: '新衣服' }\n    ]}\n  ],\n  tier2: [\n    { id: 'mistonia', name: '米斯托尼亚的翅望' }\n  ],\n  tier3: [\n    { id: 'lis_double', name: '奇异人生本色', status: 'considering' },\n    { id: 'inkonbini', name: 'inKONBINI', status: 'considering' },\n    { id: 'redsand', name: '红色沙漠', status: 'considering' },\n    { id: 'cupid', name: '共生丘比特', status: 'considering' },\n    { id: 'yakuza3', name: '人中之龙极3', status: 'considering' },\n    { id: 'immortality', name: 'Immortality', status: 'considering' }\n  ]\n};\n\nfunction makeDefault() {\n  return { config: JSON.parse(JSON.stringify(DEFAULT_CONFIG)), history: {} };\n}\n\n// ============================================================\n// Migration: old data shape → new\n// ============================================================\nfunction migrate(state) {\n  if (!state.config) state.config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));\n  if (!state.history) state.history = {};\n\n  // Tier 3 status mapping: old → new\n  const oldToNewStatus = {\n    'playing': 'considering',\n    'paused': 'backlog',\n    'done': 'backlog'\n  };\n  state.config.tier3 = (state.config.tier3 || []).map(g => {\n    const newStatus = oldToNewStatus[g.status] || g.status || 'considering';\n    return { ...g, status: newStatus };\n  });\n\n  // \"Genesis date\" — used for existing games that pre-date the createdAt field.\n  // Setting to 1970-01-01 means \"treat as existing for all history\".\n  const GENESIS = '1970-01-01';\n\n  // Ensure tier1/2/3 have defaults, and backfill tierResidence based on current tier membership.\n  ['tier1', 'tier2', 'tier3'].forEach(tier => {\n    state.config[tier] = (state.config[tier] || []).map(g => {\n      const base = { ...g };\n      if (tier === 'tier1' && !Array.isArray(base.subtasks)) base.subtasks = [];\n      if (typeof base.hidden !== 'boolean') base.hidden = false;\n      if (typeof base.note !== 'string') base.note = '';\n      if (typeof base.createdAt !== 'string') base.createdAt = GENESIS;\n      if (!base.hidden) base.hiddenAt = null;\n      else if (typeof base.hiddenAt !== 'string') base.hiddenAt = todayKey();\n      // Tier 2: optional completion status (preserved across tier moves)\n      if (typeof base.completion !== 'string') base.completion = '';\n      // Tier 3: roster status (preserved but only displayed when currently in Tier 3)\n      if (typeof base.status !== 'string') base.status = 'considering';\n      // Tier 1 subtasks: ensure hidden field\n      if (tier === 'tier1') {\n        base.subtasks = base.subtasks.map(st => ({\n          ...st,\n          hidden: typeof st.hidden === 'boolean' ? st.hidden : false\n        }));\n      }\n      // Backfill tierResidence: a single open-ended residence in current tier from GENESIS\n      if (!Array.isArray(base.tierResidence) || base.tierResidence.length === 0) {\n        base.tierResidence = [{ tier, from: base.createdAt || GENESIS, to: null }];\n      }\n      return base;\n    });\n  });\n\n  return state;\n}\n\n// ============================================================\n// Helpers\n// ============================================================\nfunction pad(n) { return String(n).padStart(2, '0'); }\nfunction dateKey(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }\nfunction todayKey() { return dateKey(new Date()); }\nfunction parseDateKey(s) { const p = s.split('-').map(Number); return new Date(p[0], p[1] - 1, p[2]); }\n\n// ============================================================\n// App state\n// ============================================================\nlet state = null;\nlet session = null;\nlet viewDate = todayKey();\nlet addMode = null;\nlet addSubtaskGameId = null;\nlet editingGameId = null;\nlet editingSubtaskInfo = null;\nlet editingNoteFor = null;       // { tier, id }\nlet hiddenSectionOpen = { tier1: false, tier2: false, tier3: false };\nlet manageSubtasksFor = null;    // gameId\nlet addingNoteFor = null;        // { tier, id }\n\n// ============================================================\n// Save\n// ============================================================\nlet saveTimeout = null;\nlet pendingSave = false;\nlet saving = false;\nlet consecutiveFailures = 0;\nlet savedFlashTimeout = null;\n\nfunction scheduleSave() {\n  pendingSave = true;\n  setSaveState('saving');\n  if (saveTimeout) clearTimeout(saveTimeout);\n  saveTimeout = setTimeout(performSave, 500);\n}\n\nasync function performSave() {\n  if (saving || !pendingSave || !session) return;\n  saving = true; pendingSave = false;\n  const stateToSave = JSON.parse(JSON.stringify(state));\n  try {\n    const { error } = await supabaseClient.from('tracker_data').upsert({\n      user_id: session.user.id,\n      data: stateToSave,\n      updated_at: new Date().toISOString()\n    });\n    if (error) throw error;\n    consecutiveFailures = 0;\n    saving = false;\n    if (pendingSave) scheduleSave();\n    else setSaveState('saved');\n  } catch (e) {\n    console.error('Save failed:', e);\n    consecutiveFailures++;\n    saving = false;\n    pendingSave = true;\n    setSaveState('error');\n    const delay = Math.min(1000 * Math.pow(2, consecutiveFailures - 1), 30000);\n    setTimeout(performSave, delay);\n  }\n}\n\nfunction setSaveState(mode) {\n  const dot = document.getElementById('save-dot-mini');\n  const errPill = document.getElementById('save-indicator');\n  if (!dot || !errPill) return;\n  if (savedFlashTimeout) { clearTimeout(savedFlashTimeout); savedFlashTimeout = null; }\n  dot.classList.remove('saving', 'saved');\n  errPill.classList.remove('visible');\n  if (mode === 'saving') {\n    dot.classList.add('saving');\n  } else if (mode === 'saved') {\n    dot.classList.add('saved');\n    savedFlashTimeout = setTimeout(() => dot.classList.remove('saved'), 700);\n  } else if (mode === 'error') {\n    errPill.classList.add('visible');\n  }\n}\n\n// ============================================================\n// Undo (snapshot-based) — used for hide, cross-tier moves with subtask loss, etc.\n// ============================================================\nfunction snapshotState() {\n  return JSON.parse(JSON.stringify(state));\n}\nfunction restoreState(snap) {\n  state = snap;\n  scheduleSave();\n  smoothRender();\n}\nfunction showUndoToast(msg, snapshotBefore) {\n  showToast({\n    message: msg,\n    actionLabel: 'Undo',\n    onAction: () => restoreState(snapshotBefore)\n  });\n}\n\n// ============================================================\n// FLIP animation wrapper — smooth structural changes\n// ============================================================\nfunction withFlip(mutateFn) {\n  if (!document.body || !state) { mutateFn(); return; }\n  const before = new Map();\n  document.querySelectorAll('[data-game-id], [data-subtask-id]').forEach(el => {\n    const key = (el.dataset.gameId ? 'g:' : 's:') + (el.dataset.gameId || el.dataset.subtaskId);\n    before.set(key, el.getBoundingClientRect());\n  });\n  mutateFn();\n  document.querySelectorAll('[data-game-id], [data-subtask-id]').forEach(el => {\n    const key = (el.dataset.gameId ? 'g:' : 's:') + (el.dataset.gameId || el.dataset.subtaskId);\n    const oldRect = before.get(key);\n    const newRect = el.getBoundingClientRect();\n    if (oldRect) {\n      const dx = oldRect.left - newRect.left;\n      const dy = oldRect.top - newRect.top;\n      if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {\n        el.animate(\n          [{ transform: `translate(${dx}px, ${dy}px)` }, { transform: 'translate(0,0)' }],\n          { duration: 260, easing: 'cubic-bezier(0.4, 0, 0.2, 1)' }\n        );\n      }\n    } else {\n      el.animate(\n        [{ opacity: 0, transform: 'translateY(-4px)' }, { opacity: 1, transform: 'translateY(0)' }],\n        { duration: 240, easing: 'cubic-bezier(0.16, 1, 0.3, 1)' }\n      );\n    }\n  });\n}\nfunction smoothRender() { withFlip(() => render()); }\n\n// ============================================================\n// UI primitives: dialog, toast, picker (replacing native confirm)\n// ============================================================\nfunction showDialog({ title, message, confirmLabel = 'Confirm', cancelLabel = 'Cancel', danger = false, onConfirm }) {\n  return new Promise(resolve => {\n    const host = document.getElementById('dialog-host');\n    host.innerHTML = '';\n    const overlay = document.createElement('div');\n    overlay.className = 'dialog-overlay';\n    const dialog = document.createElement('div');\n    dialog.className = 'dialog';\n    dialog.setAttribute('role', 'dialog');\n    dialog.setAttribute('aria-modal', 'true');\n    dialog.innerHTML = `\n      <div class=\"dialog-title\">${escapeHtml(title)}<\u002Fdiv>\n      <div class=\"dialog-message\">${message || ''}<\u002Fdiv>\n      <div class=\"dialog-actions\">\n        <button type=\"button\" class=\"dialog-btn cancel\">${escapeHtml(cancelLabel)}<\u002Fbutton>\n        <button type=\"button\" class=\"dialog-btn confirm${danger ? ' danger' : ''}\">${escapeHtml(confirmLabel)}<\u002Fbutton>\n      <\u002Fdiv>\n    `;\n    overlay.appendChild(dialog);\n    host.appendChild(overlay);\n\n    const close = (result) => {\n      overlay.style.animation = 'none';\n      overlay.style.opacity = '0';\n      overlay.style.transition = 'opacity 0.15s';\n      setTimeout(() => { host.innerHTML = ''; resolve(result); }, 150);\n      document.removeEventListener('keydown', onKey);\n    };\n    const onKey = (e) => {\n      if (e.key === 'Escape') close(false);\n      else if (e.key === 'Enter') { close(true); if (onConfirm) onConfirm(); }\n    };\n    document.addEventListener('keydown', onKey);\n\n    dialog.querySelector('.cancel').onclick = () => close(false);\n    dialog.querySelector('.confirm').onclick = () => { close(true); if (onConfirm) onConfirm(); };\n    overlay.onclick = (e) => { if (e.target === overlay) close(false); };\n    setTimeout(() => dialog.querySelector('.confirm').focus(), 50);\n  });\n}\n\n// ---- Toast (undo) ----\nlet activeToast = null;\nlet toastTimeout = null;\n\nfunction showToast({ message, actionLabel = 'Undo', onAction, duration = 5000 }) {\n  dismissToast();\n  const host = document.getElementById('toast-host');\n  const toast = document.createElement('div');\n  toast.className = 'toast';\n  toast.innerHTML = `\n    <span class=\"toast-msg\">${escapeHtml(message)}<\u002Fspan>\n    ${onAction ? `<span class=\"toast-action\">${escapeHtml(actionLabel)}<\u002Fspan>` : ''}\n    <span class=\"toast-close\">×<\u002Fspan>\n  `;\n  host.appendChild(toast);\n  activeToast = toast;\n\n  if (onAction) {\n    toast.querySelector('.toast-action').onclick = () => {\n      onAction();\n      dismissToast();\n    };\n  }\n  toast.querySelector('.toast-close').onclick = dismissToast;\n  toastTimeout = setTimeout(dismissToast, duration);\n}\n\nfunction dismissToast() {\n  if (toastTimeout) { clearTimeout(toastTimeout); toastTimeout = null; }\n  if (!activeToast) return;\n  const t = activeToast;\n  activeToast = null;\n  t.classList.add('leaving');\n  setTimeout(() => t.remove(), 220);\n}\n\n// ---- Picker popover ----\nfunction showPicker(anchorEl, items, currentValue, onPick) {\n  closePicker();\n  const host = document.getElementById('picker-host');\n  const menu = document.createElement('div');\n  menu.className = 'picker-menu';\n  items.forEach(item => {\n    const row = document.createElement('div');\n    row.className = 'picker-item' + (item.value === currentValue ? ' active' : '') + (item.clear ? ' clear' : '');\n    row.innerHTML = `<span>${escapeHtml(item.label)}<\u002Fspan><span class=\"picker-check\">✓<\u002Fspan>`;\n    row.onclick = (e) => { e.stopPropagation(); onPick(item.value); closePicker(); };\n    menu.appendChild(row);\n  });\n  host.appendChild(menu);\n\n  // Position\n  const rect = anchorEl.getBoundingClientRect();\n  const mw = menu.offsetWidth;\n  const mh = menu.offsetHeight;\n  let top = rect.bottom + 6;\n  let left = rect.left;\n  if (left + mw > window.innerWidth - 12) left = window.innerWidth - mw - 12;\n  if (left < 12) left = 12;\n  if (top + mh > window.innerHeight - 12) top = rect.top - mh - 6;\n  menu.style.top = top + 'px';\n  menu.style.left = left + 'px';\n\n  // Dismiss\n  const onDocClick = (e) => { if (!menu.contains(e.target)) closePicker(); };\n  const onKey = (e) => { if (e.key === 'Escape') closePicker(); };\n  setTimeout(() => {\n    document.addEventListener('mousedown', onDocClick);\n    document.addEventListener('keydown', onKey);\n  }, 0);\n  menu._cleanup = () => {\n    document.removeEventListener('mousedown', onDocClick);\n    document.removeEventListener('keydown', onKey);\n  };\n}\n\nfunction closePicker() {\n  const host = document.getElementById('picker-host');\n  if (!host) return;\n  Array.from(host.children).forEach(m => { if (m._cleanup) m._cleanup(); });\n  host.innerHTML = '';\n}\n\n// ============================================================\n// Data accessors\n// ============================================================\nfunction getDay(date) {\n  if (!state.history[date]) state.history[date] = { tier1: {}, tier2: {}, tier3: {} };\n  return state.history[date];\n}\nfunction getTier1Game(date, gameId) {\n  const day = getDay(date);\n  if (!day.tier1[gameId]) day.tier1[gameId] = { checkedIn: false, subtasks: {}, extra: false };\n  return day.tier1[gameId];\n}\n\n// ============================================================\n// Toggles — targeted DOM updates, no full re-render\n// ============================================================\nfunction toggleTier1(gameId) {\n  const g = getTier1Game(viewDate, gameId);\n  g.checkedIn = !g.checkedIn;\n  scheduleSave(); updateTier1Row(gameId);\n}\nfunction toggleSubtask(gameId, subtaskId) {\n  const g = getTier1Game(viewDate, gameId);\n  g.subtasks[subtaskId] = !g.subtasks[subtaskId];\n  const cfg = state.config.tier1.find(x => x.id === gameId);\n  if (cfg && cfg.subtasks.length > 0) {\n    const visible = cfg.subtasks.filter(t => !t.hidden);\n    if (visible.length > 0) {\n      const allDone = visible.every(t => g.subtasks[t.id]);\n      if (allDone && !g.checkedIn) g.checkedIn = true;\n    }\n  }\n  scheduleSave(); updateTier1Row(gameId);\n}\nfunction toggleExtra(gameId) {\n  const g = getTier1Game(viewDate, gameId);\n  g.extra = !g.extra;\n  scheduleSave();\n  const item = document.querySelector(`#tier1-list [data-game-id=\"${gameId}\"]`);\n  if (item) {\n    const ex = item.querySelector('.extra-toggle');\n    ex.classList.toggle('active', !!g.extra);\n    ex.innerHTML = g.extra ? '✦' : '✧';\n  }\n  updateHeatmapCell(viewDate);\n}\nfunction toggleTier2(gameId) {\n  const day = getDay(viewDate);\n  day.tier2[gameId] = !day.tier2[gameId];\n  scheduleSave(); updateTier2Row(gameId);\n}\nfunction toggleTier3(gameId) {\n  const day = getDay(viewDate);\n  day.tier3[gameId] = !day.tier3[gameId];\n  scheduleSave(); updateTier3Row(gameId);\n}\n\n// --- Targeted update helpers ---\nfunction updateTier1Row(gameId) {\n  const day = getDay(viewDate);\n  const gd = day.tier1[gameId] || { checkedIn: false, subtasks: {}, extra: false };\n  const item = document.querySelector(`#tier1-list [data-game-id=\"${gameId}\"]`);\n  if (!item) return;\n  item.querySelector('.checkbox').classList.toggle('checked', !!gd.checkedIn);\n  const name = item.querySelector('.game-name');\n  if (name) name.classList.toggle('checked', !!gd.checkedIn);\n  item.querySelectorAll('.subtask').forEach(sub => {\n    const sid = sub.dataset.subtaskId;\n    if (sid) sub.classList.toggle('checked', !!gd.subtasks[sid]);\n  });\n  updateStreak(item, gameId);\n  updateProgress();\n  updateHeatmapCell(viewDate);\n}\nfunction updateTier2Row(gameId) {\n  const day = getDay(viewDate);\n  const checked = day.tier2[gameId] === true;\n  const item = document.querySelector(`#tier2-list [data-game-id=\"${gameId}\"]`);\n  if (!item) return;\n  item.querySelector('.checkbox').classList.toggle('checked', checked);\n  const name = item.querySelector('.game-name');\n  if (name) name.classList.toggle('checked', checked);\n  updateStreak(item, gameId);\n  updateHeatmapCell(viewDate);\n}\nfunction updateTier3Row(gameId) {\n  const day = getDay(viewDate);\n  const checked = day.tier3[gameId] === true;\n  const item = document.querySelector(`#tier3-list [data-game-id=\"${gameId}\"]`);\n  if (!item) return;\n  item.querySelector('.roster-check').classList.toggle('checked', checked);\n  updateStreak(item, gameId);\n  updateHeatmapCell(viewDate);\n}\n\nfunction updateStreak(rowEl, gameId) {\n  const el = rowEl.querySelector('.streak');\n  if (!el) return;\n  const streak = getStreak(gameId);\n  const prev = parseInt(el.dataset.value || '0', 10);\n  el.classList.toggle('active', streak > 0);\n  el.textContent = streak > 0 ? streak + 'd' : '·';\n  el.dataset.value = String(streak);\n  if (streak > prev && streak > 0) {\n    el.style.animation = 'none';\n    void el.offsetWidth;\n    el.style.animation = 'streakPop 0.45s cubic-bezier(0.16, 1, 0.3, 1)';\n  }\n}\n\nfunction updateProgress() {\n  const pct = getDayProgress(viewDate);\n  const pctEl = document.getElementById('progress-pct');\n  const fillEl = document.getElementById('progress-fill');\n  if (pctEl) pctEl.textContent = pct + '%';\n  if (fillEl) fillEl.style.width = pct + '%';\n}\n\nfunction updateHeatmapCell(dateStr) {\n  const cell = document.querySelector(`.heatmap-cell[data-date-key=\"${dateStr}\"]`);\n  if (!cell || cell.classList.contains('future')) return;\n  cell.dataset.intensity = getDayIntensity(dateStr);\n}\n\n// ============================================================\n// Status cycling / picker\n// ============================================================\nconst TIER2_COMPLETION_SEQ = ['', 'beaten', 'completed', 'sated', 'abandoned'];\nconst TIER3_STATUS_SEQ = ['considering', 'up_next', 'backlog'];\n\nfunction setTier2Completion(gameId, value) {\n  const g = state.config.tier2.find(x => x.id === gameId);\n  if (!g) return;\n  g.completion = value || '';\n  scheduleSave();\n  // Targeted: pill + name styling + completion mark\n  const item = document.querySelector(`#tier2-list [data-game-id=\"${gameId}\"]`);\n  if (!item) return;\n  const pill = item.querySelector('.status-pill');\n  if (pill) {\n    pill.classList.toggle('empty', !g.completion);\n    if (g.completion) pill.dataset.status = g.completion;\n    else delete pill.dataset.status;\n    pill.textContent = TIER2_COMPLETION_LABELS[g.completion || ''] || '';\n  }\n  const name = item.querySelector('.game-name');\n  if (name) {\n    name.classList.toggle('dimmed', g.completion === 'sated');\n    name.classList.toggle('struck', g.completion === 'abandoned');\n    // Strip and rebuild trailing completion mark\n    const existing = name.querySelector('.completion-mark');\n    if (existing) existing.remove();\n    if (g.completion === 'beaten' || g.completion === 'completed') {\n      const mark = document.createElement('span');\n      mark.className = 'completion-mark';\n      mark.textContent = g.completion === 'completed' ? '✓✓' : '✓';\n      name.appendChild(mark);\n    }\n  }\n}\nfunction setTier3Status(gameId, value) {\n  const g = state.config.tier3.find(x => x.id === gameId);\n  if (!g) return;\n  g.status = value || 'considering';\n  scheduleSave();\n  const item = document.querySelector(`#tier3-list [data-game-id=\"${gameId}\"]`);\n  if (!item) return;\n  const pill = item.querySelector('.status-pill');\n  if (pill) {\n    pill.dataset.status = g.status;\n    pill.textContent = TIER3_STATUS_LABELS[g.status] || '';\n  }\n}\n\nfunction openTier2CompletionPicker(anchor, gameId) {\n  const g = state.config.tier2.find(x => x.id === gameId);\n  if (!g) return;\n  const items = [\n    { value: 'beaten', label: 'Beaten' },\n    { value: 'completed', label: 'Completed' },\n    { value: 'sated', label: 'Sated' },\n    { value: 'abandoned', label: 'Abandoned' },\n    { value: '', label: '× Clear', clear: true }\n  ];\n  showPicker(anchor, items, g.completion || '', v => setTier2Completion(gameId, v));\n}\nfunction openTier3StatusPicker(anchor, gameId) {\n  const g = state.config.tier3.find(x => x.id === gameId);\n  if (!g) return;\n  const items = [\n    { value: 'up_next', label: 'Up next' },\n    { value: 'considering', label: 'Considering' },\n    { value: 'backlog', label: 'Backlog' }\n  ];\n  showPicker(anchor, items, g.status || 'considering', v => setTier3Status(gameId, v));\n}\n\n// ============================================================\n// Add / Rename\n// ============================================================\nfunction addGame(tier, name) {\n  const id = 'game_' + Date.now();\n  const today = todayKey();\n  const residence = [{ tier, from: today, to: null }];\n  if (tier === 'tier1') state.config.tier1.push({ id, name, subtasks: [], hidden: false, hiddenAt: null, note: '', completion: '', status: 'considering', createdAt: today, tierResidence: residence });\n  else if (tier === 'tier2') state.config.tier2.push({ id, name, hidden: false, hiddenAt: null, note: '', completion: '', status: 'considering', createdAt: today, tierResidence: residence });\n  else state.config.tier3.push({ id, name, status: 'considering', hidden: false, hiddenAt: null, note: '', completion: '', createdAt: today, tierResidence: residence });\n  scheduleSave(); smoothRender();\n}\nfunction renameGame(tier, gameId, newName) {\n  const game = state.config[tier].find(g => g.id === gameId);\n  if (game && newName.trim()) { game.name = newName.trim(); scheduleSave(); }\n}\nfunction setGameNote(tier, gameId, newNote) {\n  const game = state.config[tier].find(g => g.id === gameId);\n  if (game) { game.note = (newNote || '').trim(); scheduleSave(); }\n}\nfunction addSubtask(gameId, name) {\n  const game = state.config.tier1.find(g => g.id === gameId);\n  if (game) game.subtasks.push({ id: 'st_' + Date.now(), name, hidden: false });\n  scheduleSave(); smoothRender();\n}\nfunction renameSubtask(gameId, subtaskId, newName) {\n  const game = state.config.tier1.find(g => g.id === gameId);\n  if (game) {\n    const st = game.subtasks.find(s => s.id === subtaskId);\n    if (st && newName.trim()) { st.name = newName.trim(); scheduleSave(); }\n  }\n}\n\n// ============================================================\n// Hide / Restore / Delete\n// ============================================================\nfunction hideGame(tier, gameId) {\n  const game = state.config[tier].find(g => g.id === gameId);\n  if (!game) return;\n  const snap = snapshotState();\n  game.hidden = true; game.hiddenAt = todayKey();\n  scheduleSave(); smoothRender();\n  showUndoToast(`Hid \"${game.name}\"`, snap);\n}\nfunction restoreGame(tier, gameId) {\n  const game = state.config[tier].find(g => g.id === gameId);\n  if (game) { game.hidden = false; game.hiddenAt = null; scheduleSave(); smoothRender(); }\n}\nfunction deleteGameForever(tier, gameId) {\n  const game = state.config[tier].find(g => g.id === gameId);\n  if (!game) return;\n  showDialog({\n    title: `永久删除 \"${game.name}\"?`,\n    message: `所有历史 check-in 数据将<strong>无法恢复<\u002Fstrong>。<br>如果只是暂时不想看到，请用 <strong>Hide<\u002Fstrong>。`,\n    confirmLabel: 'Delete forever',\n    cancelLabel: 'Cancel',\n    danger: true\n  }).then(ok => {\n    if (!ok) return;\n    state.config[tier] = state.config[tier].filter(g => g.id !== gameId);\n    scheduleSave(); smoothRender();\n  });\n}\n\nfunction hideSubtask(gameId, subtaskId) {\n  const game = state.config.tier1.find(g => g.id === gameId);\n  if (!game) return;\n  const st = game.subtasks.find(s => s.id === subtaskId);\n  if (!st) return;\n  const snap = snapshotState();\n  st.hidden = true;\n  scheduleSave(); smoothRender();\n  showUndoToast(`Hid \"${st.name}\"`, snap);\n}\nfunction restoreSubtask(gameId, subtaskId) {\n  const game = state.config.tier1.find(g => g.id === gameId);\n  if (!game) return;\n  const st = game.subtasks.find(s => s.id === subtaskId);\n  if (st) { st.hidden = false; scheduleSave(); smoothRender(); }\n}\nfunction deleteSubtaskForever(gameId, subtaskId) {\n  const game = state.config.tier1.find(g => g.id === gameId);\n  if (!game) return;\n  const st = game.subtasks.find(s => s.id === subtaskId);\n  if (!st) return;\n  showDialog({\n    title: `Delete sub-task \"${st.name}\"?`,\n    message: `所有历史 check-in 数据将<strong>无法恢复<\u002Fstrong>。`,\n    confirmLabel: 'Delete forever',\n    danger: true\n  }).then(ok => {\n    if (!ok) return;\n    game.subtasks = game.subtasks.filter(s => s.id !== subtaskId);\n    scheduleSave(); smoothRender();\n  });\n}\n\n// ============================================================\n// Drag & Drop\n// ============================================================\nconst drag = {\n  active: false, type: null, sourceTier: null, sourceId: null,\n  ghost: null, threshold: 5, pending: null, currentDropTarget: null\n};\n\nfunction startDragPotential(type, sourceTier, sourceId, displayName, e) {\n  const pt = e.touches ? e.touches[0] : e;\n  drag.pending = { type, sourceTier, sourceId, displayName, startX: pt.clientX, startY: pt.clientY };\n  e.preventDefault();\n  const moveHandler = (ev) => handleDragMove(ev);\n  const endHandler = (ev) => handleDragEnd(ev, moveHandler, endHandler);\n  document.addEventListener('mousemove', moveHandler, { passive: false });\n  document.addEventListener('mouseup', endHandler);\n  document.addEventListener('touchmove', moveHandler, { passive: false });\n  document.addEventListener('touchend', endHandler);\n  document.addEventListener('touchcancel', endHandler);\n}\n\nfunction handleDragMove(e) {\n  if (!drag.pending && !drag.active) return;\n  const pt = e.touches ? e.touches[0] : e;\n  if (drag.pending && !drag.active) {\n    const dx = pt.clientX - drag.pending.startX;\n    const dy = pt.clientY - drag.pending.startY;\n    if (Math.sqrt(dx*dx + dy*dy) < drag.threshold) return;\n    drag.active = true;\n    drag.type = drag.pending.type;\n    drag.sourceTier = drag.pending.sourceTier;\n    drag.sourceId = drag.pending.sourceId;\n    drag.pending = null;\n    document.body.classList.add('dragging');\n    drag.ghost = document.createElement('div');\n    drag.ghost.className = 'drag-ghost';\n    drag.ghost.textContent = drag.type === 'game'\n      ? (state.config[drag.sourceTier].find(g => g.id === drag.sourceId)?.name || '')\n      : (state.config.tier1.find(g => g.id === drag.sourceTier)?.subtasks.find(s => s.id === drag.sourceId)?.name || '');\n    document.body.appendChild(drag.ghost);\n    markSourceAsDragging(true);\n  }\n  if (!drag.active) return;\n  e.preventDefault();\n  if (drag.ghost) {\n    drag.ghost.style.left = (pt.clientX + 12) + 'px';\n    drag.ghost.style.top = (pt.clientY + 12) + 'px';\n  }\n  updateDropIndicator(pt.clientX, pt.clientY);\n}\n\nfunction markSourceAsDragging(on) {\n  if (drag.type === 'game') {\n    const el = document.querySelector(`[data-game-id=\"${drag.sourceId}\"]`);\n    if (el) el.classList.toggle('dragging', on);\n  } else if (drag.type === 'subtask') {\n    const el = document.querySelector(`[data-subtask-id=\"${drag.sourceId}\"]`);\n    if (el) el.classList.toggle('dragging', on);\n  }\n}\n\nfunction clearDropIndicators() {\n  document.querySelectorAll('.drop-line, .subtask-drop-marker').forEach(el => el.remove());\n  document.querySelectorAll('.section.drop-target').forEach(el => el.classList.remove('drop-target'));\n  drag.currentDropTarget = null;\n}\n\nfunction updateDropIndicator(clientX, clientY) {\n  clearDropIndicators();\n  if (drag.type === 'game') updateGameDropIndicator(clientX, clientY);\n  else updateSubtaskDropIndicator(clientX, clientY);\n}\n\nfunction updateGameDropIndicator(clientX, clientY) {\n  const sections = ['tier1', 'tier2', 'tier3'];\n  let targetTier = null, targetSection = null;\n  for (const tier of sections) {\n    const sec = document.getElementById(`section-${tier}`);\n    if (!sec) continue;\n    const rect = sec.getBoundingClientRect();\n    if (clientY >= rect.top && clientY <= rect.bottom) {\n      targetTier = tier; targetSection = sec; break;\n    }\n  }\n  if (!targetTier) return;\n  if (targetTier !== drag.sourceTier) targetSection.classList.add('drop-target');\n  const list = document.getElementById(`${targetTier}-list`);\n  if (!list) return;\n  const items = Array.from(list.querySelectorAll(`[data-game-id]`)).filter(el => !el.classList.contains('dragging'));\n  let dropIndex = items.length;\n  for (let i = 0; i < items.length; i++) {\n    const rect = items[i].getBoundingClientRect();\n    if (clientY < rect.top + rect.height / 2) { dropIndex = i; break; }\n  }\n  const line = document.createElement('div');\n  line.className = 'drop-line';\n  if (dropIndex === items.length) {\n    if (items.length > 0) items[items.length - 1].after(line);\n    else list.appendChild(line);\n  } else items[dropIndex].before(line);\n  drag.currentDropTarget = { tier: targetTier, index: dropIndex };\n}\n\nfunction updateSubtaskDropIndicator(clientX, clientY) {\n  const gameEl = document.querySelector(`[data-game-id=\"${drag.sourceTier}\"]`);\n  if (!gameEl) return;\n  const subRow = gameEl.querySelector('.subtasks-row');\n  if (!subRow) return;\n  const pills = Array.from(subRow.querySelectorAll('[data-subtask-id]')).filter(el => !el.classList.contains('dragging'));\n  let dropIndex = pills.length;\n  for (let i = 0; i < pills.length; i++) {\n    const rect = pills[i].getBoundingClientRect();\n    if (clientX < rect.left + rect.width / 2 && clientY < rect.bottom && clientY > rect.top - 12) {\n      dropIndex = i; break;\n    }\n  }\n  const marker = document.createElement('div');\n  marker.className = 'subtask-drop-marker';\n  if (dropIndex === pills.length) {\n    if (pills.length > 0) pills[pills.length - 1].after(marker);\n    else subRow.insertBefore(marker, subRow.firstChild);\n  } else pills[dropIndex].before(marker);\n  drag.currentDropTarget = { gameId: drag.sourceTier, index: dropIndex };\n}\n\nfunction handleDragEnd(e, moveHandler, endHandler) {\n  document.removeEventListener('mousemove', moveHandler);\n  document.removeEventListener('mouseup', endHandler);\n  document.removeEventListener('touchmove', moveHandler);\n  document.removeEventListener('touchend', endHandler);\n  document.removeEventListener('touchcancel', endHandler);\n  if (!drag.active) { drag.pending = null; return; }\n  if (drag.currentDropTarget) {\n    if (drag.type === 'game') commitGameMove(drag.sourceTier, drag.sourceId, drag.currentDropTarget.tier, drag.currentDropTarget.index);\n    else commitSubtaskMove(drag.sourceTier, drag.sourceId, drag.currentDropTarget.index);\n  }\n  markSourceAsDragging(false);\n  clearDropIndicators();\n  if (drag.ghost) { drag.ghost.remove(); drag.ghost = null; }\n  document.body.classList.remove('dragging');\n  drag.active = false; drag.type = null; drag.sourceTier = null;\n  drag.sourceId = null; drag.pending = null; drag.currentDropTarget = null;\n  smoothRender();\n}\n\nfunction commitGameMove(fromTier, gameId, toTier, toIndex) {\n  const fromList = state.config[fromTier];\n  const fromIndex = fromList.findIndex(g => g.id === gameId);\n  if (fromIndex === -1) return;\n  const game = fromList[fromIndex];\n\n  // === Same-tier reorder: no residence change ===\n  if (fromTier === toTier) {\n    fromList.splice(fromIndex, 1);\n    let adjustedIndex = toIndex;\n    if (fromIndex < toIndex) adjustedIndex = toIndex - 1;\n    state.config[toTier].splice(adjustedIndex, 0, game);\n    scheduleSave();\n    return;\n  }\n\n  // === Cross-tier move ===\n  const snap = snapshotState();\n  let lostSubtasks = 0;\n  if (fromTier === 'tier1' && game.subtasks && game.subtasks.length > 0) {\n    lostSubtasks = game.subtasks.length;\n    game.subtasks = [];\n  }\n\n  // Update tierResidence: close current residence today, open new one tomorrow\n  const today = todayKey();\n  if (!Array.isArray(game.tierResidence)) game.tierResidence = [];\n  // Find current open residence\n  const current = game.tierResidence.find(r => r.to === null);\n  if (current) {\n    // Edge case: if current residence started today, just rewrite it instead of creating a one-day stub\n    if (current.from === today) {\n      // Replace with new tier residence starting today\n      current.tier = toTier;\n    } else {\n      // Close current at yesterday, open new from today\n      const d = parseDateKey(today); d.setDate(d.getDate() - 1);\n      current.to = dateKey(d);\n      game.tierResidence.push({ tier: toTier, from: today, to: null });\n    }\n  } else {\n    // No open residence (shouldn't happen with proper migration), just open one\n    game.tierResidence.push({ tier: toTier, from: today, to: null });\n  }\n\n  // Move in config arrays (for UI rendering convenience — current tier residence lives in current tier array)\n  fromList.splice(fromIndex, 1);\n\n  // Ensure game has fields needed for new tier\n  if (toTier === 'tier1' && !Array.isArray(game.subtasks)) game.subtasks = [];\n  if (toTier === 'tier2' && typeof game.completion !== 'string') game.completion = '';\n  if (toTier === 'tier3' && typeof game.status !== 'string') game.status = 'considering';\n\n  state.config[toTier].splice(toIndex, 0, game);\n  scheduleSave();\n\n  // Tell user what happened, give them undo\n  const tierLabels = { tier1: 'Daily', tier2: 'Playing', tier3: 'Roster' };\n  const baseMsg = `Moved \"${game.name}\" → ${tierLabels[toTier]}`;\n  const msg = lostSubtasks > 0 ? `${baseMsg} · removed ${lostSubtasks} sub-task${lostSubtasks > 1 ? 's' : ''}` : baseMsg;\n  showUndoToast(msg, snap);\n}\n\nfunction commitSubtaskMove(gameId, subtaskId, toIndex) {\n  const game = state.config.tier1.find(g => g.id === gameId);\n  if (!game) return;\n  const fromIndex = game.subtasks.findIndex(s => s.id === subtaskId);\n  if (fromIndex === -1) return;\n  const [moved] = game.subtasks.splice(fromIndex, 1);\n  let adjustedIndex = toIndex;\n  if (fromIndex < toIndex) adjustedIndex = toIndex - 1;\n  game.subtasks.splice(adjustedIndex, 0, moved);\n  scheduleSave();\n}\n\n// ============================================================\n// Computed\n// ============================================================\nfunction getStreak(gameId, currentTierKey) {\n  // Find the game across all tier arrays\n  let game = null;\n  ['tier1', 'tier2', 'tier3'].forEach(t => {\n    if (!game) {\n      const found = state.config[t].find(g => g.id === gameId);\n      if (found) game = found;\n    }\n  });\n  if (!game) return 0;\n\n  const today = new Date(); today.setHours(0, 0, 0, 0);\n  let streak = 0;\n  for (let i = 0; i < 365; i++) {\n    const d = new Date(today); d.setDate(today.getDate() - i);\n    const key = dateKey(d);\n    const tierThatDay = tierOnDate(game, key);\n    const day = state.history[key];\n    let checked = false;\n    if (day && tierThatDay) {\n      if (tierThatDay === 'tier1') checked = day.tier1 && day.tier1[gameId] && day.tier1[gameId].checkedIn === true;\n      else if (tierThatDay === 'tier2') checked = day.tier2 && day.tier2[gameId] === true;\n      else if (tierThatDay === 'tier3') checked = day.tier3 && day.tier3[gameId] === true;\n    }\n    if (checked) streak++;\n    else if (i === 0) continue;\n    else break;\n  }\n  return streak;\n}\n\nfunction existsOnDate(game, dateStr) {\n  // A game \"exists\" on a given date if:\n  //   - its createdAt is on or before that date\n  //   - AND (it's not hidden, OR it was hidden after that date)\n  const createdAt = game.createdAt || '1970-01-01';\n  if (createdAt > dateStr) return false;\n  if (game.hidden && game.hiddenAt && game.hiddenAt <= dateStr) return false;\n  return true;\n}\n\n// Which tier did this game belong to on a given date? null if not in any tier yet.\nfunction tierOnDate(game, dateStr) {\n  if (!Array.isArray(game.tierResidence)) return null;\n  for (const r of game.tierResidence) {\n    if (r.from <= dateStr && (r.to === null || dateStr <= r.to)) return r.tier;\n  }\n  return null;\n}\n\n// All games that, on the given date, belonged to the given tier.\n// Looks across all tier arrays in config since residence history may differ from current tier.\nfunction gamesInTierOnDate(tier, dateStr) {\n  const results = [];\n  ['tier1', 'tier2', 'tier3'].forEach(t => {\n    (state.config[t] || []).forEach(g => {\n      if (!existsOnDate(g, dateStr)) return;\n      if (tierOnDate(g, dateStr) === tier) results.push(g);\n    });\n  });\n  return results;\n}\n\n// Which tier is the game currently in (today's tier)?\nfunction currentTier(game) {\n  return tierOnDate(game, todayKey());\n}\n\nfunction getDayProgress(dateStr) {\n  const day = state.history[dateStr];\n  if (!day) return 0;\n  const relevant = gamesInTierOnDate('tier1', dateStr);\n  const total = relevant.length;\n  if (total === 0) return 0;\n  let checked = 0;\n  relevant.forEach(g => {\n    if (day.tier1 && day.tier1[g.id] && day.tier1[g.id].checkedIn) checked++;\n  });\n  return Math.round((checked / total) * 100);\n}\n\nfunction getDayIntensity(dateStr) {\n  const day = state.history[dateStr];\n  if (!day) return 0;\n  const tier1Games = gamesInTierOnDate('tier1', dateStr);\n  const tier2Games = gamesInTierOnDate('tier2', dateStr);\n  const tier3Games = gamesInTierOnDate('tier3', dateStr);\n  const tier1Count = tier1Games.length;\n  let checked = 0, extra = 0;\n  tier1Games.forEach(g => {\n    if (day.tier1 && day.tier1[g.id]) {\n      if (day.tier1[g.id].checkedIn) checked++;\n      if (day.tier1[g.id].extra) extra++;\n    }\n  });\n  tier2Games.forEach(g => { if (day.tier2 && day.tier2[g.id]) extra++; });\n  tier3Games.forEach(g => { if (day.tier3 && day.tier3[g.id]) extra++; });\n  if (checked === 0 && extra === 0) return 0;\n  const base = tier1Count > 0 ? checked / tier1Count : 0;\n  const score = base + extra * 0.12;\n  if (score < 0.15) return 1;\n  if (score < 0.5) return 2;\n  if (score < 0.85) return 3;\n  return 4;\n}\n\n// ============================================================\n// Date nav\n// ============================================================\nfunction isViewingToday() { return viewDate === todayKey(); }\nfunction goToPrevDay() {\n  const d = parseDateKey(viewDate); d.setDate(d.getDate() - 1);\n  viewDate = dateKey(d); refreshDayView();\n}\nfunction goToNextDay() {\n  if (isViewingToday()) return;\n  const d = parseDateKey(viewDate); d.setDate(d.getDate() + 1);\n  viewDate = dateKey(d); refreshDayView();\n}\nfunction goToToday() { viewDate = todayKey(); refreshDayView(); }\n\n// Refresh check-states / streaks / progress / heatmap viewing — no structural rebuild\nfunction refreshDayView() {\n  if (!state) return;\n  renderHeader();\n  const day = getDay(viewDate);\n  document.querySelectorAll('#tier1-list .game-item').forEach(item => {\n    const id = item.dataset.gameId;\n    const gd = day.tier1[id] || { checkedIn: false, subtasks: {}, extra: false };\n    item.querySelector('.checkbox')?.classList.toggle('checked', !!gd.checkedIn);\n    const name = item.querySelector('.game-name');\n    if (name) name.classList.toggle('checked', !!gd.checkedIn);\n    const ex = item.querySelector('.extra-toggle');\n    if (ex) {\n      ex.classList.toggle('active', !!gd.extra);\n      ex.innerHTML = gd.extra ? '✦' : '✧';\n    }\n    item.querySelectorAll('.subtask').forEach(sub => {\n      const sid = sub.dataset.subtaskId;\n      if (sid) sub.classList.toggle('checked', !!gd.subtasks[sid]);\n    });\n    updateStreak(item, id);\n  });\n  document.querySelectorAll('#tier2-list .game-item').forEach(item => {\n    const id = item.dataset.gameId;\n    const checked = day.tier2[id] === true;\n    item.querySelector('.checkbox')?.classList.toggle('checked', checked);\n    const name = item.querySelector('.game-name');\n    if (name) name.classList.toggle('checked', checked);\n    updateStreak(item, id);\n  });\n  document.querySelectorAll('#tier3-list .roster-item').forEach(item => {\n    const id = item.dataset.gameId;\n    const checked = day.tier3[id] === true;\n    item.querySelector('.roster-check')?.classList.toggle('checked', checked);\n    updateStreak(item, id);\n  });\n  // Heatmap viewing class\n  document.querySelectorAll('.heatmap-cell').forEach(c => {\n    c.classList.toggle('viewing', c.dataset.dateKey === viewDate);\n    if (!c.classList.contains('future')) c.dataset.intensity = getDayIntensity(c.dataset.dateKey);\n  });\n}\n\n// ============================================================\n// Drag handle helper\n// ============================================================\nfunction makeDragHandle(type, sourceTier, sourceId, displayName) {\n  const handle = document.createElement('div');\n  handle.className = type === 'subtask' ? 'subtask-drag-handle' : 'drag-handle';\n  handle.innerHTML = '⋮⋮';\n  handle.title = 'Drag to reorder';\n  const handler = (e) => {\n    if (e.button !== undefined && e.button !== 0) return;\n    startDragPotential(type, sourceTier, sourceId, displayName, e);\n  };\n  handle.addEventListener('mousedown', handler);\n  handle.addEventListener('touchstart', handler, { passive: false });\n  return handle;\n}\n\n// ============================================================\n// Status labels\n// ============================================================\nconst TIER2_COMPLETION_LABELS = {\n  '': '',\n  'beaten': 'Beaten',\n  'completed': 'Completed',\n  'sated': 'Sated',\n  'abandoned': 'Abandoned'\n};\nconst TIER3_STATUS_LABELS = {\n  'considering': 'Considering',\n  'up_next': 'Up next',\n  'backlog': 'Backlog'\n};\n\n// ============================================================\n// Render\n// ============================================================\nlet _firstAppRender = true;\nfunction render() {\n  // Clean any stale modals (they live in body, not root)\n  document.querySelectorAll('.manage-popup, .manage-overlay').forEach(el => el.remove());\n  closePicker();\n  if (!session) { renderSignIn(); return; }\n  if (!state) { renderLoading(); return; }\n  // First time the app proper renders → enable section entry animation\n  if (_firstAppRender) {\n    document.body.classList.add('first-load');\n    _firstAppRender = false;\n    setTimeout(() => document.body.classList.remove('first-load'), 1500);\n  }\n  renderApp();\n}\n\nfunction renderSignIn() {\n  const root = document.getElementById('root');\n  root.innerHTML = '';\n  const screen = document.createElement('div');\n  screen.className = 'signin-screen';\n  screen.innerHTML = `\n    <div class=\"signin-title\">Daily Ritual<\u002Fdiv>\n    <div class=\"signin-subtitle\">登录以同步你的进度<\u002Fdiv>\n    <button class=\"signin-btn\" id=\"signin-btn\">\n      <svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 48 48\">\n        <path fill=\"#FFC107\" d=\"M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z\"/>\n        <path fill=\"#FF3D00\" d=\"M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z\"/>\n        <path fill=\"#4CAF50\" d=\"M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z\"/>\n        <path fill=\"#1976D2\" d=\"M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z\"/>\n      <\u002Fsvg>\n      Sign in with Google\n    <\u002Fbutton>\n  `;\n  root.appendChild(screen);\n  document.getElementById('signin-btn').onclick = signIn;\n}\n\nfunction renderLoading() {\n  document.getElementById('root').innerHTML = '<div class=\"loading-screen\"><div class=\"loading-dots\">···<\u002Fdiv><\u002Fdiv>';\n}\n\nfunction renderApp() {\n  const root = document.getElementById('root');\n  root.innerHTML = `\n    <header class=\"header\">\n      <div class=\"date-nav\">\n        <div class=\"date-arrow\" id=\"prev-day\" title=\"Previous day\">‹<\u002Fdiv>\n        <div class=\"date\" id=\"date\"><\u002Fdiv>\n        <div class=\"date-arrow\" id=\"next-day\" title=\"Next day\">›<\u002Fdiv>\n        <div class=\"today-link\" id=\"today-link\" style=\"display:none\">↩ Today<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"progress-label-row\">\n        <div class=\"progress-label\">完成度<\u002Fdiv>\n        <div class=\"display-font progress-percentage\" id=\"progress-pct\">0%<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"progress-track\"><div class=\"progress-fill\" id=\"progress-fill\" style=\"width: 0%\"><\u002Fdiv><\u002Fdiv>\n    <\u002Fheader>\n\n    <section class=\"section\" id=\"section-tier1\">\n      <div class=\"section-header\"><div class=\"section-title\">Daily<\u002Fdiv><div class=\"section-line\"><\u002Fdiv><\u002Fdiv>\n      <div id=\"tier1-list\"><\u002Fdiv>\n      <div class=\"add-row\" id=\"add-tier1-container\"><\u002Fdiv>\n      <div id=\"hidden-tier1\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <section class=\"section\" id=\"section-tier2\">\n      <div class=\"section-header\"><div class=\"section-title\">Playing<\u002Fdiv><div class=\"section-line\"><\u002Fdiv><\u002Fdiv>\n      <div id=\"tier2-list\"><\u002Fdiv>\n      <div class=\"add-row\" id=\"add-tier2-container\"><\u002Fdiv>\n      <div id=\"hidden-tier2\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <section class=\"section\" id=\"section-tier3\">\n      <div class=\"section-header\"><div class=\"section-title\">Roster<\u002Fdiv><div class=\"section-line\"><\u002Fdiv><\u002Fdiv>\n      <div id=\"tier3-list\"><\u002Fdiv>\n      <div class=\"add-row\" id=\"add-tier3-container\"><\u002Fdiv>\n      <div id=\"hidden-tier3\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <section class=\"section\">\n      <div class=\"section-header\"><div class=\"section-title\">History<\u002Fdiv><div class=\"section-line\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"heatmap-container\">\n        <div class=\"heatmap\" id=\"heatmap\"><\u002Fdiv>\n        <div class=\"heatmap-footer\">\n          <div>12w · click cell to edit · dbl-click name to rename<\u002Fdiv>\n          <div class=\"heatmap-legend\">\n            <span>Less<\u002Fspan>\n            <span class=\"heatmap-cell\" data-intensity=\"0\"><\u002Fspan>\n            <span class=\"heatmap-cell\" data-intensity=\"1\"><\u002Fspan>\n            <span class=\"heatmap-cell\" data-intensity=\"2\"><\u002Fspan>\n            <span class=\"heatmap-cell\" data-intensity=\"3\"><\u002Fspan>\n            <span class=\"heatmap-cell\" data-intensity=\"4\"><\u002Fspan>\n            <span>More<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <footer class=\"app-footer\">\n      <span class=\"user-email\" id=\"user-email\"><\u002Fspan>\n      <a id=\"export-btn\">Export<\u002Fa>·<a id=\"import-btn\">Import<\u002Fa>·<a id=\"signout-btn\">Sign out<\u002Fa>\n    <\u002Ffooter>\n  `;\n\n  renderHeader();\n  renderTier1();\n  renderTier2();\n  renderTier3();\n  renderHeatmap();\n\n  if (manageSubtasksFor) renderManageModal();\n\n  document.getElementById('user-email').textContent = session.user.email;\n  document.getElementById('prev-day').onclick = goToPrevDay;\n  document.getElementById('next-day').onclick = () => { if (!isViewingToday()) goToNextDay(); };\n  document.getElementById('today-link').onclick = goToToday;\n  document.getElementById('export-btn').onclick = exportData;\n  document.getElementById('import-btn').onclick = importData;\n  document.getElementById('signout-btn').onclick = signOut;\n}\n\nfunction renderHeader() {\n  const d = parseDateKey(viewDate);\n  const wd = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];\n  const mo = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];\n  document.getElementById('date').textContent =\n    wd[d.getDay()] + ' · ' + mo[d.getMonth()] + ' ' + d.getDate() + ' · ' + d.getFullYear();\n  document.getElementById('date').className = 'date' + (isViewingToday() ? '' : ' past');\n  document.getElementById('next-day').className = 'date-arrow' + (isViewingToday() ? ' disabled' : '');\n  document.getElementById('today-link').style.display = isViewingToday() ? 'none' : '';\n  const pct = getDayProgress(viewDate);\n  document.getElementById('progress-pct').textContent = pct + '%';\n  document.getElementById('progress-fill').style.width = pct + '%';\n}\n\n// === Build editable name + note column ===\nfunction buildNameWrap(tier, game, isChecked) {\n  const wrap = document.createElement('div');\n  wrap.className = 'name-wrap';\n\n  // Name (or edit input)\n  const editingName = editingGameId && editingGameId.tier === tier && editingGameId.id === game.id;\n  if (editingName) {\n    const input = document.createElement('input');\n    input.className = 'game-name-edit';\n    input.type = 'text';\n    input.value = game.name;\n    let committed = false;\n    const commit = () => {\n      if (committed) return; committed = true;\n      renameGame(tier, game.id, input.value);\n      editingGameId = null; render();\n    };\n    input.onkeydown = (e) => {\n      if (e.key === 'Enter') commit();\n      else if (e.key === 'Escape') { committed = true; editingGameId = null; render(); }\n    };\n    input.onblur = commit;\n    wrap.appendChild(input);\n    setTimeout(() => { input.focus(); input.select(); }, 0);\n  } else {\n    const nameEl = document.createElement('div');\n    let cls = 'game-name';\n    if (tier === 'tier2') {\n      if (game.completion === 'sated') cls += ' dimmed';\n      if (game.completion === 'abandoned') cls += ' struck';\n    }\n    if (tier !== 'tier3' && isChecked) cls += ' checked';\n    nameEl.className = cls;\n\n    // Name text\n    const nameText = document.createElement('span');\n    nameText.textContent = game.name;\n    nameEl.appendChild(nameText);\n\n    // Completion mark (Beaten / Completed)\n    if (tier === 'tier2' && (game.completion === 'beaten' || game.completion === 'completed')) {\n      const mark = document.createElement('span');\n      mark.className = 'completion-mark';\n      mark.textContent = game.completion === 'completed' ? '✓✓' : '✓';\n      nameEl.appendChild(mark);\n    }\n\n    nameEl.onclick = () => {\n      if (tier === 'tier1') toggleTier1(game.id);\n      else if (tier === 'tier2') toggleTier2(game.id);\n      else toggleTier3(game.id);\n    };\n    nameEl.ondblclick = (e) => {\n      e.preventDefault();\n      editingGameId = { tier, id: game.id };\n      render();\n    };\n    wrap.appendChild(nameEl);\n  }\n\n  // Note (or edit input)\n  const editingNote = editingNoteFor && editingNoteFor.tier === tier && editingNoteFor.id === game.id;\n  const hasNote = game.note && game.note.length > 0;\n  const isAdding = addingNoteFor && addingNoteFor.tier === tier && addingNoteFor.id === game.id;\n\n  if (editingNote || isAdding) {\n    const input = document.createElement('input');\n    input.className = 'note-edit';\n    input.type = 'text';\n    input.value = game.note || '';\n    input.placeholder = '备注...';\n    let committed = false;\n    const commit = () => {\n      if (committed) return; committed = true;\n      setGameNote(tier, game.id, input.value);\n      editingNoteFor = null; addingNoteFor = null;\n      render();\n    };\n    input.onkeydown = (e) => {\n      if (e.key === 'Enter') commit();\n      else if (e.key === 'Escape') { committed = true; editingNoteFor = null; addingNoteFor = null; render(); }\n    };\n    input.onblur = commit;\n    wrap.appendChild(input);\n    setTimeout(() => { input.focus(); input.select(); }, 0);\n  } else if (hasNote) {\n    const noteEl = document.createElement('div');\n    noteEl.className = 'game-note';\n    noteEl.textContent = game.note;\n    noteEl.title = 'Click to edit · empty to remove';\n    noteEl.onclick = () => { editingNoteFor = { tier, id: game.id }; render(); };\n    wrap.appendChild(noteEl);\n  }\n\n  return wrap;\n}\n\nfunction buildNoteToggleButton(tier, game) {\n  const hasNote = game.note && game.note.length > 0;\n  const btn = document.createElement('div');\n  btn.className = 'row-action' + (hasNote ? ' active' : '');\n  btn.innerHTML = '✎';\n  btn.title = hasNote ? '编辑备注' : '添加备注';\n  btn.onclick = (e) => {\n    e.stopPropagation();\n    if (hasNote) editingNoteFor = { tier, id: game.id };\n    else addingNoteFor = { tier, id: game.id };\n    render();\n  };\n  return btn;\n}\n\nfunction buildHideButton(tier, game) {\n  const btn = document.createElement('div');\n  btn.className = 'row-action';\n  btn.innerHTML = '⊘';\n  btn.title = 'Hide';\n  btn.onclick = (e) => { e.stopPropagation(); hideGame(tier, game.id); };\n  return btn;\n}\n\nfunction renderTier1() {\n  const day = getDay(viewDate);\n  const container = document.getElementById('tier1-list');\n  container.innerHTML = '';\n\n  const visible = state.config.tier1.filter(g => !g.hidden);\n  visible.forEach(game => {\n    const gd = day.tier1[game.id] || { checkedIn: false, subtasks: {}, extra: false };\n    const streak = getStreak(game.id, 'tier1');\n    const visibleSubs = game.subtasks.filter(st => !st.hidden);\n    const hiddenSubsCount = game.subtasks.length - visibleSubs.length;\n    const hasSubtasks = visibleSubs.length > 0;\n    const isAddingSub = addSubtaskGameId === game.id;\n\n    const item = document.createElement('div');\n    item.className = 'game-item';\n    item.dataset.gameId = game.id;\n\n    const row = document.createElement('div');\n    row.className = 'game-row';\n\n    row.appendChild(makeDragHandle('game', 'tier1', game.id, game.name));\n\n    const cb = document.createElement('div');\n    cb.className = 'checkbox' + (gd.checkedIn ? ' checked' : '');\n    cb.onclick = () => toggleTier1(game.id);\n    row.appendChild(cb);\n\n    row.appendChild(buildNameWrap('tier1', game, gd.checkedIn));\n\n    const extra = document.createElement('div');\n    extra.className = 'extra-toggle' + (gd.extra ? ' active' : '');\n    extra.innerHTML = gd.extra ? '✦' : '✧';\n    extra.title = '今天多玩了一下';\n    extra.onclick = () => toggleExtra(game.id);\n    row.appendChild(extra);\n\n    const streakEl = document.createElement('div');\n    streakEl.className = 'streak' + (streak > 0 ? ' active' : '');\n    streakEl.textContent = streak > 0 ? streak + 'd' : '·';\n    row.appendChild(streakEl);\n\n    row.appendChild(buildNoteToggleButton('tier1', game));\n    row.appendChild(buildHideButton('tier1', game));\n\n    item.appendChild(row);\n\n    const subRow = document.createElement('div');\n    subRow.className = 'subtasks-row' + (hasSubtasks || isAddingSub ? '' : ' empty');\n\n    visibleSubs.forEach(st => {\n      const isEditingThis = editingSubtaskInfo && editingSubtaskInfo.gameId === game.id && editingSubtaskInfo.subtaskId === st.id;\n      const sub = document.createElement('div');\n      sub.className = 'subtask' + (gd.subtasks[st.id] ? ' checked' : '');\n      sub.dataset.subtaskId = st.id;\n\n      if (isEditingThis) {\n        const input = document.createElement('input');\n        input.className = 'subtask-edit';\n        input.type = 'text';\n        input.value = st.name;\n        let committed = false;\n        const commit = () => {\n          if (committed) return; committed = true;\n          renameSubtask(game.id, st.id, input.value);\n          editingSubtaskInfo = null; render();\n        };\n        input.onkeydown = (e) => {\n          if (e.key === 'Enter') commit();\n          else if (e.key === 'Escape') { committed = true; editingSubtaskInfo = null; render(); }\n        };\n        input.onblur = commit;\n        sub.appendChild(input);\n        setTimeout(() => { input.focus(); input.select(); }, 0);\n      } else {\n        sub.appendChild(makeDragHandle('subtask', game.id, st.id, st.name));\n        const subLabel = document.createElement('span');\n        subLabel.className = 'subtask-label';\n        subLabel.textContent = st.name;\n        subLabel.onclick = () => toggleSubtask(game.id, st.id);\n        subLabel.ondblclick = (e) => { e.preventDefault(); editingSubtaskInfo = { gameId: game.id, subtaskId: st.id }; render(); };\n        const subHide = document.createElement('span');\n        subHide.className = 'subtask-hide';\n        subHide.innerHTML = '⊘';\n        subHide.title = 'Hide sub-task';\n        subHide.onclick = (e) => { e.stopPropagation(); hideSubtask(game.id, st.id); };\n        sub.appendChild(subLabel);\n        sub.appendChild(subHide);\n      }\n      subRow.appendChild(sub);\n    });\n\n    if (isAddingSub) {\n      const input = document.createElement('input');\n      input.className = 'add-subtask-input';\n      input.type = 'text';\n      input.placeholder = 'Sub-task';\n      let committed = false;\n      const commit = () => {\n        if (committed) return; committed = true;\n        const v = input.value.trim();\n        if (v) addSubtask(game.id, v);\n        addSubtaskGameId = null; render();\n      };\n      input.onkeydown = (e) => {\n        if (e.key === 'Enter') commit();\n        else if (e.key === 'Escape') { committed = true; addSubtaskGameId = null; render(); }\n      };\n      input.onblur = commit;\n      subRow.appendChild(input);\n      setTimeout(() => input.focus(), 0);\n    } else {\n      const addBtn = document.createElement('button');\n      addBtn.className = 'add-subtask';\n      addBtn.textContent = '+ Add task';\n      addBtn.onclick = () => { addSubtaskGameId = game.id; render(); };\n      subRow.appendChild(addBtn);\n\n      // Manage hidden subtasks link, only when hidden subs exist\n      if (hiddenSubsCount > 0) {\n        const manageLink = document.createElement('button');\n        manageLink.className = 'subtask-manage-link';\n        manageLink.textContent = `manage (${hiddenSubsCount} hidden)`;\n        manageLink.onclick = () => { manageSubtasksFor = game.id; render(); };\n        subRow.appendChild(manageLink);\n      } else {\n        // Show a subtle manage link only on hover (handled via CSS opacity)\n        const manageLink = document.createElement('button');\n        manageLink.className = 'subtask-manage-link';\n        manageLink.textContent = 'manage';\n        manageLink.onclick = () => { manageSubtasksFor = game.id; render(); };\n        subRow.appendChild(manageLink);\n      }\n    }\n\n    item.appendChild(subRow);\n    container.appendChild(item);\n  });\n\n  renderAddRow('tier1');\n  renderHiddenSection('tier1');\n}\n\nfunction renderTier2() {\n  const day = getDay(viewDate);\n  const container = document.getElementById('tier2-list');\n  container.innerHTML = '';\n\n  const visible = state.config.tier2.filter(g => !g.hidden);\n  visible.forEach(game => {\n    const checked = day.tier2[game.id] === true;\n    const streak = getStreak(game.id, 'tier2');\n\n    const item = document.createElement('div');\n    item.className = 'game-item';\n    item.dataset.gameId = game.id;\n\n    const row = document.createElement('div');\n    row.className = 'game-row';\n\n    row.appendChild(makeDragHandle('game', 'tier2', game.id, game.name));\n\n    const cb = document.createElement('div');\n    cb.className = 'checkbox' + (checked ? ' checked' : '');\n    cb.onclick = () => toggleTier2(game.id);\n    row.appendChild
