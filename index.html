// ============================================================
// Drag & Drop
// ============================================================
const drag = {
  active: false, type: null, sourceTier: null, sourceId: null,
  ghost: null, threshold: 5, pending: null, currentDropTarget: null
};

// Edge auto-scroll while dragging (fixes "can't reach drop spot in long lists")
let autoScrollRAF = null;
let lastPointerX = 0;
let lastPointerY = 0;
function autoScrollTick() {
  if (!drag.active) { autoScrollRAF = null; return; }
  const margin = 90, maxSpeed = 20;
  const h = window.innerHeight;
  let dy = 0;
  if (lastPointerY < margin) dy = -maxSpeed * (1 - lastPointerY / margin);
  else if (lastPointerY > h - margin) dy = maxSpeed * (1 - (h - lastPointerY) / margin);
  if (dy !== 0) {
    window.scrollBy(0, dy);
    if (drag.ghost) {
      drag.ghost.style.left = (lastPointerX + 12) + 'px';
      drag.ghost.style.top = (lastPointerY + 12) + 'px';
    }
    updateDropIndicator(lastPointerX, lastPointerY);
  }
  autoScrollRAF = requestAnimationFrame(autoScrollTick);
}

function startDragPotential(type, sourceTier, sourceId, displayName, e) {
  const pt = e.touches ? e.touches[0] : e;
  drag.pending = { type, sourceTier, sourceId, displayName, startX: pt.clientX, startY: pt.clientY };
  e.preventDefault();
  const moveHandler = (ev) => handleDragMove(ev);
  const endHandler = (ev) => handleDragEnd(ev, moveHandler, endHandler);
  document.addEventListener('mousemove', moveHandler, { passive: false });
  document.addEventListener('mouseup', endHandler);
  document.addEventListener('touchmove', moveHandler, { passive: false });
  document.addEventListener('touchend', endHandler);
  document.addEventListener('touchcancel', endHandler);
}

function handleDragMove(e) {
  if (!drag.pending && !drag.active) return;
  const pt = e.touches ? e.touches[0] : e;
  if (drag.pending && !drag.active) {
    const dx = pt.clientX - drag.pending.startX;
    const dy = pt.clientY - drag.pending.startY;
    if (Math.sqrt(dx*dx + dy*dy) < drag.threshold) return;
    drag.active = true;
    drag.type = drag.pending.type;
    drag.sourceTier = drag.pending.sourceTier;
    drag.sourceId = drag.pending.sourceId;
    drag.pending = null;
    document.body.classList.add('dragging');
    drag.ghost = document.createElement('div');
    drag.ghost.className = 'drag-ghost';
    drag.ghost.textContent = drag.type === 'game'
      ? (state.config[drag.sourceTier].find(g => g.id === drag.sourceId)?.name || '')
      : (state.config.tier1.find(g => g.id === drag.sourceTier)?.subtasks.find(s => s.id === drag.sourceId)?.name || '');
    document.body.appendChild(drag.ghost);
    markSourceAsDragging(true);
  }
  if (!drag.active) return;
  e.preventDefault();
  lastPointerX = pt.clientX;
  lastPointerY = pt.clientY;
  if (drag.ghost) {
    drag.ghost.style.left = (pt.clientX + 12) + 'px';
    drag.ghost.style.top = (pt.clientY + 12) + 'px';
  }
  updateDropIndicator(pt.clientX, pt.clientY);
  if (!autoScrollRAF) autoScrollRAF = requestAnimationFrame(autoScrollTick);
}

function markSourceAsDragging(on) {
  if (drag.type === 'game') {
    const el = document.querySelector(`[data-game-id="${drag.sourceId}"]`);
    if (el) el.classList.toggle('dragging', on);
  } else if (drag.type === 'subtask') {
    const el = document.querySelector(`[data-subtask-id="${drag.sourceId}"]`);
    if (el) el.classList.toggle('dragging', on);
  }
}

function clearDropIndicators() {
  document.querySelectorAll('.drop-line, .subtask-drop-marker').forEach(el => el.remove());
  document.querySelectorAll('.section.drop-target').forEach(el => el.classList.remove('drop-target'));
  document.querySelectorAll('.roster-card.drop-before, .roster-card.drop-after').forEach(el => el.classList.remove('drop-before', 'drop-after'));
  drag.currentDropTarget = null;
}

function updateDropIndicator(clientX, clientY) {
  clearDropIndicators();
  if (drag.type === 'subtask') updateSubtaskDropIndicator(clientX, clientY);
  else if (drag.sourceTier === 'tier3') updateRosterDropIndicator(clientX, clientY);
  else updateGameDropIndicator(clientX, clientY);
}

// Roster grid: within-group 2D reorder. Finds the insertion point in reading
// (row-major) order using both X and Y, and marks the target card.
function updateRosterDropIndicator(clientX, clientY) {
  const game = state.config.tier3.find(g => g.id === drag.sourceId);
  if (!game) return;
  const grouped = state.config.rosterGrouped !== false;
  const status = game.status || 'considering';

  let scope;
  if (grouped) {
    scope = document.querySelector(`#tier3-list .roster-group[data-group="${status}"] .roster-grid`);
  } else {
    scope = document.querySelector('#tier3-list .roster-grid.ungrouped');
  }
  if (!scope) return;

  const cards = Array.from(scope.querySelectorAll('.roster-card')).filter(el => !el.classList.contains('dragging'));

  let insertBeforeId = null;
  let targetCard = null;
  for (let i = 0; i < cards.length; i++) {
    const r = cards[i].getBoundingClientRect();
    const inRow = clientY >= r.top - 6 && clientY <= r.bottom + 6;
    if (inRow && clientX < r.left + r.width / 2) { targetCard = cards[i]; insertBeforeId = cards[i].dataset.gameId; break; }
    if (clientY < r.top - 6) { targetCard = cards[i]; insertBeforeId = cards[i].dataset.gameId; break; }
  }

  if (targetCard) {
    targetCard.classList.add('drop-before');
  } else if (cards.length > 0) {
    cards[cards.length - 1].classList.add('drop-after'); // append at group end
  }
  drag.currentDropTarget = { roster: true, insertBeforeId, grouped };
}

function updateGameDropIndicator(clientX, clientY) {
  const sections = ['tier1', 'tier2', 'tier3'];
  let targetTier = null, targetSection = null;
  for (const tier of sections) {
    const sec = document.getElementById(`section-${tier}`);
    if (!sec) continue;
    const rect = sec.getBoundingClientRect();
    if (clientY >= rect.top && clientY <= rect.bottom) {
      targetTier = tier; targetSection = sec; break;
    }
  }
  if (!targetTier) return;
  if (targetTier !== drag.sourceTier) targetSection.classList.add('drop-target');
  const list = document.getElementById(`${targetTier}-list`);
  if (!list) return;
  const items = Array.from(list.querySelectorAll(`[data-game-id]`)).filter(el => !el.classList.contains('dragging'));
  let dropIndex = items.length;
  for (let i = 0; i < items.length; i++) {
    const rect = items[i].getBoundingClientRect();
    if (clientY < rect.top + rect.height / 2) { dropIndex = i; break; }
  }
  const line = document.createElement('div');
  line.className = 'drop-line';
  if (dropIndex === items.length) {
    if (items.length > 0) items[items.length - 1].after(line);
    else list.appendChild(line);
  } else items[dropIndex].before(line);
  drag.currentDropTarget = { tier: targetTier, index: dropIndex };
}

function updateSubtaskDropIndicator(clientX, clientY) {
  const gameEl = document.querySelector(`[data-game-id="${drag.sourceTier}"]`);
  if (!gameEl) return;
  const subRow = gameEl.querySelector('.subtasks-row');
  if (!subRow) return;
  const pills = Array.from(subRow.querySelectorAll('[data-subtask-id]')).filter(el => !el.classList.contains('dragging'));
  let dropIndex = pills.length;
  for (let i = 0; i < pills.length; i++) {
    const rect = pills[i].getBoundingClientRect();
    if (clientX < rect.left + rect.width / 2 && clientY < rect.bottom && clientY > rect.top - 12) {
      dropIndex = i; break;
    }
  }
  const marker = document.createElement('div');
  marker.className = 'subtask-drop-marker';
  if (dropIndex === pills.length) {
    if (pills.length > 0) pills[pills.length - 1].after(marker);
    else subRow.insertBefore(marker, subRow.firstChild);
  } else pills[dropIndex].before(marker);
  drag.currentDropTarget = { gameId: drag.sourceTier, index: dropIndex };
}

function handleDragEnd(e, moveHandler, endHandler) {
  document.removeEventListener('mousemove', moveHandler);
  document.removeEventListener('mouseup', endHandler);
  document.removeEventListener('touchmove', moveHandler);
  document.removeEventListener('touchend', endHandler);
  document.removeEventListener('touchcancel', endHandler);
  if (!drag.active) { drag.pending = null; return; }
  if (drag.currentDropTarget) {
    if (drag.currentDropTarget.roster) {
      commitRosterReorder(drag.sourceId, drag.currentDropTarget.insertBeforeId, drag.currentDropTarget.grouped);
    } else if (drag.type === 'game') {
      commitGameMove(drag.sourceTier, drag.sourceId, drag.currentDropTarget.tier, drag.currentDropTarget.index);
    } else {
      commitSubtaskMove(drag.sourceTier, drag.sourceId, drag.currentDropTarget.index);
    }
  }
  markSourceAsDragging(false);
  clearDropIndicators();
  if (drag.ghost) { drag.ghost.remove(); drag.ghost = null; }
  document.body.classList.remove('dragging');
  drag.active = false; drag.type = null; drag.sourceTier = null;
  drag.sourceId = null; drag.pending = null; drag.currentDropTarget = null;
  smoothRender();
}

function commitGameMove(fromTier, gameId, toTier, toIndex) {
  const fromList = state.config[fromTier];
  const fromIndex = fromList.findIndex(g => g.id === gameId);
  if (fromIndex === -1) return;
  const game = fromList[fromIndex];

  // === Same-tier reorder: no residence change ===
  if (fromTier === toTier) {
    fromList.splice(fromIndex, 1);
    let adjustedIndex = toIndex;
    if (fromIndex < toIndex) adjustedIndex = toIndex - 1;
    state.config[toTier].splice(adjustedIndex, 0, game);
    scheduleSave();
    return;
  }

  // === Cross-tier move ===
  const snap = snapshotState();
  // Sub-tasks are PRESERVED across tier moves — they stay dormant on the game while
  // it lives in Playing / Roster, and reappear intact when it returns to Daily.
  const lostSubtasks = 0;

  // Update tierResidence: close current residence today, open new one tomorrow
  const today = todayKey();
  if (!Array.isArray(game.tierResidence)) game.tierResidence = [];
  // Find current open residence
  const current = game.tierResidence.find(r => r.to === null);
  if (current) {
    // Edge case: if current residence started today, just rewrite it instead of creating a one-day stub
    if (current.from === today) {
      // Replace with new tier residence starting today
      current.tier = toTier;
    } else {
      // Close current at yesterday, open new from today
      const d = parseDateKey(today); d.setDate(d.getDate() - 1);
      current.to = dateKey(d);
      game.tierResidence.push({ tier: toTier, from: today, to: null });
    }
  } else {
    // No open residence (shouldn't happen with proper migration), just open one
    game.tierResidence.push({ tier: toTier, from: today, to: null });
  }

  // Move in config arrays (for UI rendering convenience — current tier residence lives in current tier array)
  fromList.splice(fromIndex, 1);

  // Ensure game has fields needed for new tier
  if (toTier === 'tier1' && !Array.isArray(game.subtasks)) game.subtasks = [];
  if (toTier === 'tier2' && typeof game.completion !== 'string') game.completion = '';
  if (toTier === 'tier3' && typeof game.status !== 'string') game.status = 'considering';

  state.config[toTier].splice(toIndex, 0, game);
  scheduleSave();

  // Tell user what happened, give them undo
  const tierLabels = { tier1: 'Daily', tier2: 'Playing', tier3: 'Roster' };
  const baseMsg = `Moved "${game.name}" → ${tierLabels[toTier]}`;
  const msg = lostSubtasks > 0 ? `${baseMsg} · removed ${lostSubtasks} sub-task${lostSubtasks > 1 ? 's' : ''}` : baseMsg;
  showUndoToast(msg, snap);
}

function commitSubtaskMove(gameId, subtaskId, toIndex) {
  const game = state.config.tier1.find(g => g.id === gameId);
  if (!game) return;
  const fromIndex = game.subtasks.findIndex(s => s.id === subtaskId);
  if (fromIndex === -1) return;
  const [moved] = game.subtasks.splice(fromIndex, 1);
  let adjustedIndex = toIndex;
  if (fromIndex < toIndex) adjustedIndex = toIndex - 1;
  game.subtasks.splice(adjustedIndex, 0, moved);
  scheduleSave();
}

// Roster within-group reorder — never changes status. Insert relative to a
// concrete sibling id so interleaved group order in the array stays correct.
function commitRosterReorder(gameId, insertBeforeId, grouped) {
  const arr = state.config.tier3;
  const fromIndex = arr.findIndex(g => g.id === gameId);
  if (fromIndex === -1) return;
  const [moved] = arr.splice(fromIndex, 1);

  let insertIndex;
  if (insertBeforeId) {
    insertIndex = arr.findIndex(g => g.id === insertBeforeId);
    if (insertIndex === -1) insertIndex = arr.length;
  } else if (grouped) {
    // Append at end of this card's status group (after its last sibling).
    const status = moved.status || 'considering';
    let lastIdx = -1;
    arr.forEach((g, i) => { if ((g.status || 'considering') === status) lastIdx = i; });
    insertIndex = lastIdx + 1;
  } else {
    insertIndex = arr.length; // ungrouped: append to flat list
  }
  arr.splice(insertIndex, 0, moved);
  scheduleSave();
}

// ============================================================
// Computed
// ============================================================
function getStreak(gameId, currentTierKey) {
  // Find the game across all tier arrays
  let game = null;
  ['tier1', 'tier2', 'tier3'].forEach(t => {
    if (!game) {
      const found = state.config[t].find(g => g.id === gameId);
      if (found) game = found;
    }
  });
  if (!game) return 0;

  const today = new Date(); today.setHours(0, 0, 0, 0);
  let streak = 0;
  for (let i = 0; i < 365; i++) {
    const d = new Date(today); d.setDate(today.getDate() - i);
    const key = dateKey(d);
    const tierThatDay = tierOnDate(game, key);
    const day = state.history[key];
    let checked = false;
    if (day && tierThatDay) {
      if (tierThatDay === 'tier1') checked = day.tier1 && day.tier1[gameId] && day.tier1[gameId].checkedIn === true;
      else if (tierThatDay === 'tier2') checked = day.tier2 && day.tier2[gameId] === true;
      else if (tierThatDay === 'tier3') checked = day.tier3 && day.tier3[gameId] === true;
    }
    if (checked) streak++;
    else if (i === 0) continue;
    else break;
  }
  return streak;
}

function existsOnDate(game, dateStr) {
  // A game "exists" on a given date if:
  //   - its createdAt is on or before that date
  //   - AND (it's not hidden, OR it was hidden after that date)
  const createdAt = game.createdAt || '1970-01-01';
  if (createdAt > dateStr) return false;
  if (game.hidden && game.hiddenAt && game.hiddenAt <= dateStr) return false;
  return true;
}

// Which tier did this game belong to on a given date? null if not in any tier yet.
function tierOnDate(game, dateStr) {
  if (!Array.isArray(game.tierResidence)) return null;
  for (const r of game.tierResidence) {
    if (r.from <= dateStr && (r.to === null || dateStr <= r.to)) return r.tier;
  }
  return null;
}

// All games that, on the given date, belonged to the given tier.
// Looks across all tier arrays in config since residence history may differ from current tier.
function gamesInTierOnDate(tier, dateStr) {
  const results = [];
  ['tier1', 'tier2', 'tier3'].forEach(t => {
    (state.config[t] || []).forEach(g => {
      if (!existsOnDate(g, dateStr)) return;
      if (tierOnDate(g, dateStr) === tier) results.push(g);
    });
  });
  return results;
}

// Which tier is the game currently in (today's tier)?
function currentTier(game) {
  return tierOnDate(game, todayKey());
}

function getDayProgress(dateStr) {
  const day = state.history[dateStr];
  if (!day) return 0;
  const relevant = gamesInTierOnDate('tier1', dateStr);
  const total = relevant.length;
  if (total === 0) return 0;
  let checked = 0;
  relevant.forEach(g => {
    if (day.tier1 && day.tier1[g.id] && day.tier1[g.id].checkedIn) checked++;
  });
  return Math.round((checked / total) * 100);
}

function getDayIntensity(dateStr) {
  const day = state.history[dateStr];
  if (!day) return 0;
  const tier1Games = gamesInTierOnDate('tier1', dateStr);
  const tier2Games = gamesInTierOnDate('tier2', dateStr);
  const tier3Games = gamesInTierOnDate('tier3', dateStr);
  const tier1Count = tier1Games.length;
  let checked = 0, extra = 0;
  tier1Games.forEach(g => {
    if (day.tier1 && day.tier1[g.id]) {
      if (day.tier1[g.id].checkedIn) checked++;
      if (day.tier1[g.id].extra) extra++;
    }
  });
  tier2Games.forEach(g => { if (day.tier2 && day.tier2[g.id]) extra++; });
  tier3Games.forEach(g => { if (day.tier3 && day.tier3[g.id]) extra++; });
  if (checked === 0 && extra === 0) return 0;
  const base = tier1Count > 0 ? checked / tier1Count : 0;
  const score = base + extra * 0.12;
  if (score < 0.15) return 1;
  if (score < 0.5) return 2;
  if (score < 0.85) return 3;
  return 4;
}

// ============================================================
// Date nav
// ============================================================
function isViewingToday() { return viewDate === todayKey(); }
function goToPrevDay() {
  const d = parseDateKey(viewDate); d.setDate(d.getDate() - 1);
  viewDate = dateKey(d); refreshDayView();
}
function goToNextDay() {
  if (isViewingToday()) return;
  const d = parseDateKey(viewDate); d.setDate(d.getDate() + 1);
  viewDate = dateKey(d); refreshDayView();
}
function goToToday() { viewDate = todayKey(); refreshDayView(); }

// Refresh check-states / streaks / progress / heatmap viewing — no structural rebuild
function refreshDayView() {
  if (!state) return;
  renderHeader();
  const day = getDay(viewDate);
  document.querySelectorAll('#tier1-list .daily-card').forEach(item => {
    const id = item.dataset.gameId;
    const gd = day.tier1[id] || { checkedIn: false, subtasks: {}, extra: false };
    item.querySelector('.checkbox')?.classList.toggle('checked', !!gd.checkedIn);
    const name = item.querySelector('.pc-name');
    if (name) name.classList.toggle('checked', !!gd.checkedIn);
    const ex = item.querySelector('.extra-toggle');
    if (ex) {
      ex.classList.toggle('active', !!gd.extra);
      ex.innerHTML = gd.extra ? '✦' : '✧';
    }
    item.querySelectorAll('.subtask').forEach(sub => {
      const sid = sub.dataset.subtaskId;
      if (sid) sub.classList.toggle('checked', !!gd.subtasks[sid]);
    });
    updateStreak(item, id);
  });
  document.querySelectorAll('#tier2-list .playing-card').forEach(item => {
    const id = item.dataset.gameId;
    const checked = day.tier2[id] === true;
    item.querySelector('.checkbox')?.classList.toggle('checked', checked);
    const name = item.querySelector('.pc-name');
    if (name) name.classList.toggle('checked', checked);
    updateStreak(item, id);
  });
  document.querySelectorAll('#tier3-list .roster-card').forEach(item => {
    const id = item.dataset.gameId;
    const checked = day.tier3[id] === true;
    const played = item.querySelector('.rc-played');
    if (played) {
      played.classList.toggle('on', checked);
      const label = played.querySelector('.rc-played-label');
      if (label) label.textContent = checked ? 'played' : 'today';
    }
    updateStreak(item, id);
  });
  // Heatmap viewing class
  document.querySelectorAll('.heatmap-cell').forEach(c => {
    c.classList.toggle('viewing', c.dataset.dateKey === viewDate);
    if (!c.classList.contains('future')) c.dataset.intensity = getDayIntensity(c.dataset.dateKey);
  });
}

function makeDragHandle(type, sourceTier, sourceId, displayName) {
  const handle = document.createElement('div');
  handle.className = type === 'subtask' ? 'subtask-drag-handle' : 'drag-handle';
  handle.innerHTML = '⋮⋮';
  handle.title = 'Drag to reorder';
  const handler = (e) => {
    if (e.button !== undefined && e.button !== 0) return;
    startDragPotential(type, sourceTier, sourceId, displayName, e);
  };
  handle.addEventListener('mousedown', handler);
  handle.addEventListener('touchstart', handler, { passive: false });
  return handle;
}

// === Build editable name + note column ===
// === Shared editable name + note column — used by Daily & Playing cards.
// (Roster keeps its own builder: its name takes the group colour and the note
// sits at card level, so it doesn't share this structure.) ===
function buildPcBody(tier, game, isChecked) {
  const body = document.createElement('div');
  body.className = 'pc-body';
  const parsed = parsePlatform(game.name);

  // --- Name (or edit input) ---
  const editingName = editingGameId && editingGameId.tier === tier && editingGameId.id === game.id;
  if (editingName) {
    const input = document.createElement('input');
    input.className = 'pc-name-edit';
    input.type = 'text';
    input.value = game.name;
    let committed = false;
    const commit = () => {
      if (committed) return; committed = true;
      renameGame(tier, game.id, input.value);
      editingGameId = null; render();
    };
    input.onkeydown = (e) => {
      if (e.key === 'Enter') commit();
      else if (e.key === 'Escape') { committed = true; editingGameId = null; render(); }
    };
    input.onblur = commit;
    body.appendChild(input);
    setTimeout(() => { input.focus(); input.select(); }, 0);
  } else {
    const nameEl = document.createElement('div');
    // Name single-click no longer toggles check-in (the checkbox owns that) — it's
    // for reading; double-click renames. Consistent across Daily / Playing / Roster.
    nameEl.className = 'pc-name' + (isChecked ? ' checked' : '');
    nameEl.textContent = parsed.base;  // platform suffix lives in a tag; edit keeps full name
    nameEl.title = game.name + ' · double-click to rename';
    nameEl.ondblclick = (e) => { e.preventDefault(); editingGameId = { tier, id: game.id }; render(); };
    body.appendChild(nameEl);
  }

  // --- Note (or edit input) ---
  const editingNote = editingNoteFor && editingNoteFor.tier === tier && editingNoteFor.id === game.id;
  const isAdding = addingNoteFor && addingNoteFor.tier === tier && addingNoteFor.id === game.id;
  const hasNote = game.note && game.note.length > 0;
  if (editingNote || isAdding) {
    const input = document.createElement('input');
    input.className = 'pc-note-edit';
    input.type = 'text';
    input.value = game.note || '';
    input.placeholder = '备注...';
    let committed = false;
    const commit = () => {
      if (committed) return; committed = true;
      setGameNote(tier, game.id, input.value);
      editingNoteFor = null; addingNoteFor = null; render();
    };
    input.onkeydown = (e) => {
      if (e.key === 'Enter') commit();
      else if (e.key === 'Escape') { committed = true; editingNoteFor = null; addingNoteFor = null; render(); }
    };
    input.onblur = commit;
    body.appendChild(input);
    setTimeout(() => { input.focus(); input.select(); }, 0);
  } else if (hasNote) {
    const noteEl = document.createElement('div');
    noteEl.className = 'pc-note';
    noteEl.textContent = game.note;
    noteEl.title = game.note + ' · click to edit';
    noteEl.onclick = (e) => { e.stopPropagation(); editingNoteFor = { tier, id: game.id }; render(); };
    body.appendChild(noteEl);
  }

  return body;
}

const ROSTER_GROUP_ORDER = ['up_next', 'considering', 'backlog'];

// Parse a trailing platform suffix like 名字（NS） / 名字（PC·Steam）.
// Only strips the LAST parenthetical, and only when it's a known platform
// (so （国际服）/（南半球）variants stay in the name).
const KNOWN_PLATFORMS = ['NS2', 'NS', 'Switch2', 'Switch', 'Steam', 'PC·Steam', 'PS5', 'PS4', 'PC', 'Mobile', 'iOS', 'Android', 'Epic', 'GOG'];
function parsePlatform(name) {
  const m = String(name).match(/^(.*?)\s*（([^（）]+)）\s*$/);
  if (m) {
    const tag = m[2].trim();
    const hit = KNOWN_PLATFORMS.find(p => p.toLowerCase() === tag.toLowerCase());
    if (hit) {
      const label = (hit === 'PC·Steam') ? 'Steam' : hit;
      return { base: m[1].trim(), platform: label };
    }
  }
  return { base: String(name), platform: null };
}

function rosterPrefs() {
  const c = state.config;
  return {
    grouped: c.rosterGrouped !== false,
    sort: (c.rosterSort === 'added' || c.rosterSort === 'name') ? c.rosterSort : 'manual',
    fold: Object.assign({ up_next: false, considering: false, backlog: true }, c.rosterGroupFold || {})
  };
}

function sortRosterGames(games, sort) {
  const arr = games.slice();
  if (sort === 'name') {
    arr.sort((a, b) => (a.name || '').localeCompare(b.name || '', 'zh'));
  } else if (sort === 'added') {
    arr.sort((a, b) => {
      const ca = a.createdAt || '1970-01-01', cb = b.createdAt || '1970-01-01';
      if (ca !== cb) return ca < cb ? 1 : -1; // newer (greater date) first
      return 0;
    });
  }
  return arr; // 'manual' keeps config order
}

function renderTier3() {
  const container = document.getElementById('tier3-list');
  container.innerHTML = '';

  const visible = state.config.tier3.filter(g => !g.hidden);
  const prefs = rosterPrefs();

  if (visible.length > 0) {
    container.appendChild(buildRosterControls(prefs));
  }

  if (prefs.grouped) {
    ROSTER_GROUP_ORDER.forEach(status => {
      const games = sortRosterGames(visible.filter(g => (g.status || 'considering') === status), prefs.sort);
      if (games.length === 0) return; // empty groups show no header
      container.appendChild(buildRosterGroup(status, games, prefs));
    });
  } else {
    const games = sortRosterGames(visible, prefs.sort);
    const grid = document.createElement('div');
    grid.className = 'roster-grid ungrouped';
    games.forEach(g => grid.appendChild(buildRosterCard(g, prefs, g.status || 'considering')));
    container.appendChild(grid);
  }

  renderAddRow('tier3');
  renderHiddenSection('tier3');
}

function buildRosterControls(prefs) {
  const bar = document.createElement('div');
  bar.className = 'roster-controls';

  const groupBtn = document.createElement('button');
  groupBtn.className = 'roster-ctrl' + (prefs.grouped ? ' active' : '');
  groupBtn.textContent = prefs.grouped ? 'Grouped' : 'Ungrouped';
  groupBtn.title = 'Toggle status grouping';
  groupBtn.onclick = () => {
    state.config.rosterGrouped = !prefs.grouped;
    scheduleSave(); smoothRender();
  };
  bar.appendChild(groupBtn);

  const sortLabels = { manual: 'Manual', added: 'Recently added', name: 'A–Z' };
  const sortBtn = document.createElement('button');
  sortBtn.className = 'roster-ctrl';
  sortBtn.innerHTML = `Sort · ${sortLabels[prefs.sort]}<span class="ctrl-caret">▾</span>`;
  sortBtn.title = 'Sort within group';
  sortBtn.onclick = () => {
    showPicker(sortBtn, [
      { value: 'manual', label: 'Manual' },
      { value: 'added', label: 'Recently added' },
      { value: 'name', label: 'A–Z' }
    ], prefs.sort, v => {
      state.config.rosterSort = v;
      scheduleSave(); smoothRender();
    });
  };
  bar.appendChild(sortBtn);

  return bar;
}

function buildRosterGroup(status, games, prefs) {
  const wrap = document.createElement('div');
  wrap.className = 'roster-group';
  wrap.dataset.group = status;

  const folded = !!prefs.fold[status];

  const head = document.createElement('div');
  head.className = 'roster-group-head' + (folded ? ' folded' : '');
  head.innerHTML =
    `<span class="rg-caret">›</span>` +
    `<span class="rg-dot"></span>` +
    `<span class="rg-label">${escapeHtml(TIER3_STATUS_LABELS[status])}</span>` +
    `<span class="rg-count">${games.length}</span>` +
    `<span class="rg-line"></span>`;
  head.title = folded ? 'Expand group' : 'Collapse group';
  head.onclick = () => {
    const fold = Object.assign({ up_next: false, considering: false, backlog: true }, state.config.rosterGroupFold || {});
    fold[status] = !folded;
    state.config.rosterGroupFold = fold;
    scheduleSave(); smoothRender();
  };
  wrap.appendChild(head);

  const grid = document.createElement('div');
  grid.className = 'roster-grid';
  if (folded) grid.style.display = 'none';
  games.forEach(g => grid.appendChild(buildRosterCard(g, prefs, status)));
  wrap.appendChild(grid);

  return wrap;
}

function buildRosterCard(game, prefs, status) {
  const day = getDay(viewDate);
  const playedToday = day.tier3[game.id] === true;
  const parsed = parsePlatform(game.name);

  const card = document.createElement('div');
  card.className = 'roster-card';
  card.dataset.gameId = game.id;
  card.dataset.rosterStatus = status;

  // --- Head: drag handle (manual only) + status pill + menu ---
  const head = document.createElement('div');
  head.className = 'rc-head';

  if (prefs.sort === 'manual') {
    const handle = makeDragHandle('game', 'tier3', game.id, game.name);
    handle.className = 'rc-drag';
    handle.innerHTML = '⋮⋮';
    handle.title = 'Drag to reorder';
    head.appendChild(handle);
  }

  const pill = document.createElement('div');
  pill.className = 'status-pill';
  pill.dataset.status = status;
  pill.textContent = TIER3_STATUS_LABELS[status] || '';
  pill.title = 'Click to change status';
  pill.onclick = (e) => { e.stopPropagation(); openTier3StatusPicker(pill, game.id); };
  head.appendChild(pill);

  const spacer = document.createElement('div');
  spacer.className = 'rc-spacer';
  head.appendChild(spacer);

  const menu = document.createElement('div');
  menu.className = 'rc-menu-btn';
  menu.innerHTML = '⋯';
  menu.title = 'More actions';
  menu.onclick = (e) => { e.stopPropagation(); openRosterCardMenu(menu, game); };
  head.appendChild(menu);

  card.appendChild(head);

  // --- Name (editable) ---
  const editingName = editingGameId && editingGameId.tier === 'tier3' && editingGameId.id === game.id;
  if (editingName) {
    const input = document.createElement('input');
    input.className = 'rc-name-edit';
    input.type = 'text';
    input.value = game.name;
    let committed = false;
    const commit = () => {
      if (committed) return; committed = true;
      renameGame('tier3', game.id, input.value);
      editingGameId = null; render();
    };
    input.onkeydown = (e) => {
      if (e.key === 'Enter') commit();
      else if (e.key === 'Escape') { committed = true; editingGameId = null; render(); }
    };
    input.onblur = commit;
    card.appendChild(input);
    setTimeout(() => { input.focus(); input.select(); }, 0);
  } else {
    const nameEl = document.createElement('div');
    nameEl.className = 'rc-name';
    nameEl.textContent = parsed.base;
    nameEl.title = game.name + ' · double-click to rename';
    nameEl.ondblclick = (e) => { e.preventDefault(); editingGameId = { tier: 'tier3', id: game.id }; render(); };
    card.appendChild(nameEl);
  }

  // --- Note (single line, optional, editable) ---
  const editingNote = editingNoteFor && editingNoteFor.tier === 'tier3' && editingNoteFor.id === game.id;
  const isAddingNote = addingNoteFor && addingNoteFor.tier === 'tier3' && addingNoteFor.id === game.id;
  const hasNote = game.note && game.note.length > 0;
  if (editingNote || isAddingNote) {
    const input = document.createElement('input');
    input.className = 'rc-note-edit';
    input.type = 'text';
    input.value = game.note || '';
    input.placeholder = '备注...';
    let committed = false;
    const commit = () => {
      if (committed) return; committed = true;
      setGameNote('tier3', game.id, input.value);
      editingNoteFor = null; addingNoteFor = null; render();
    };
    input.onkeydown = (e) => {
      if (e.key === 'Enter') commit();
      else if (e.key === 'Escape') { committed = true; editingNoteFor = null; addingNoteFor = null; render(); }
    };
    input.onblur = commit;
    card.appendChild(input);
    setTimeout(() => { input.focus(); input.select(); }, 0);
  } else if (hasNote) {
    const noteEl = document.createElement('div');
    noteEl.className = 'rc-note';
    noteEl.textContent = game.note;
    noteEl.title = game.note + ' · click to edit';
    noteEl.onclick = (e) => { e.stopPropagation(); editingNoteFor = { tier: 'tier3', id: game.id }; render(); };
    card.appendChild(noteEl);
  }

  // --- Foot: played-today (weakened secondary affordance) ---
  const foot = document.createElement('div');
  foot.className = 'rc-foot';

  const played = document.createElement('div');
  played.className = 'rc-played' + (playedToday ? ' on' : '');
  played.title = 'Played today';
  played.innerHTML = `<span class="rc-played-box"></span><span class="rc-played-label">${playedToday ? 'played' : 'today'}</span>`;
  played.onclick = (e) => { e.stopPropagation(); toggleTier3(game.id); };
  foot.appendChild(played);

  if (parsed.platform) {
    const plat = document.createElement('div');
    plat.className = 'rc-platform';
    plat.textContent = parsed.platform;
    foot.appendChild(plat);
  }

  card.appendChild(foot);

  return card;
}

function openRosterCardMenu(anchor, game) {
  const items = [
    { value: 'rename', label: 'Rename' },
    { value: 'note', label: (game.note && game.note.length) ? 'Edit note' : 'Add note' },
    { value: 'playing', label: 'Move to Playing' },
    { value: 'daily', label: 'Move to Daily' },
    { value: 'hide', label: 'Hide', clear: true }
  ];
  showPicker(anchor, items, null, v => {
    if (v === 'rename') { editingGameId = { tier: 'tier3', id: game.id }; render(); }
    else if (v === 'note') {
      if (game.note && game.note.length) editingNoteFor = { tier: 'tier3', id: game.id };
      else addingNoteFor = { tier: 'tier3', id: game.id };
      render();
    }
    else if (v === 'playing') moveRosterTo(game.id, 'tier2');
    else if (v === 'daily') moveRosterTo(game.id, 'tier1');
    else if (v === 'hide') hideGame('tier3', game.id);
  });
}

function moveRosterTo(gameId, toTier) {
  // Explicit cross-tier move — reuses commitGameMove (tierResidence close/open + undo toast).
  const toIndex = state.config[toTier].length;
  commitGameMove('tier3', gameId, toTier, toIndex);
  smoothRender();
}

// ============================================================
// Finished shelf — derived from tier2 `completion` (Beaten / Completed / Abandoned)
// ============================================================
const FINISHED_GROUP_ORDER = ['beaten', 'completed', 'sated', 'abandoned'];
let editingMilestoneFor = null; // { id }

function finishedFold() {
  return Object.assign({ beaten: true, completed: true, sated: true, abandoned: true }, state.config.finishedFold || {});
}

function renderFinished() {
  const container = document.getElementById('finished-list');
  const section = document.getElementById('section-finished');
  if (!container || !section) return;
  container.innerHTML = '';

  const all = state.config.tier2.filter(g => !!g.completion);
  if (all.length === 0) { section.style.display = 'none'; return; }
  section.style.display = '';

  const fold = finishedFold();
  FINISHED_GROUP_ORDER.forEach(status => {
    const games = state.config.tier2.filter(g => g.completion === status);
    if (games.length === 0) return; // empty group → no header
    container.appendChild(buildFinishedGroup(status, games, fold));
  });
}

function buildFinishedGroup(status, games, fold) {
  const wrap = document.createElement('div');
  wrap.className = 'roster-group finished-group' + (status === 'abandoned' ? ' abandoned-group' : '');
  wrap.dataset.fgroup = status;

  const folded = !!fold[status];
  const head = document.createElement('div');
  head.className = 'roster-group-head' + (folded ? ' folded' : '');
  head.innerHTML =
    `<span class="rg-caret">›</span>` +
    `<span class="rg-dot"></span>` +
    `<span class="rg-label">${escapeHtml(TIER2_COMPLETION_LABELS[status])}</span>` +
    `<span class="rg-count">${games.length}</span>` +
    `<span class="rg-line"></span>`;
  head.onclick = () => {
    const ff = Object.assign({ beaten: true, completed: true, sated: true, abandoned: true }, state.config.finishedFold || {});
    ff[status] = !folded;
    state.config.finishedFold = ff;
    scheduleSave(); smoothRender();
  };
  wrap.appendChild(head);

  const grid = document.createElement('div');
  grid.className = 'roster-grid';
  if (folded) grid.style.display = 'none';
  const sorted = games.slice().sort((a, b) => {
    const am = a.lastMilestone || '', bm = b.lastMilestone || '';
    if (am !== bm) return am < bm ? 1 : -1; // most recent milestone first
    return 0;
  });
  sorted.forEach(g => grid.appendChild(buildFinishedCard(g, status)));
  wrap.appendChild(grid);

  return wrap;
}

function buildFinishedCard(game, status) {
  const parsed = parsePlatform(game.name);
  const card = document.createElement('div');
  card.className = 'roster-card finished-card';
  card.dataset.gameId = game.id;

  // Head: completion pill + menu

  head.className = 'rc-head';
  const pill = document.createElement('div');

  pill.dataset.status = status;
  pill.textContent = TIER2_COMPLETION_LABELS[status] || '';
  pill.title = 'Change status';
  pill.onclick = (e) => { e.stopPropagation(); openTier2CompletionPicker(pill, game.id); };
  head.appendChild(pill);
  const spacer = document.createElement('div'); spacer.className = 'rc-spacer'; head.appendChild(spacer);
  const menu = document.createElement('div'); menu.className = 'rc-menu-btn'; menu.innerHTML = '⋯'; menu.title = 'More actions';
  menu.onclick = (e) => { e.stopPropagation(); openFinishedCardMenu(menu, game, status); };
  head.appendChild(menu);
  card.appendChild(head);

  // Name (editable)
  const editingName = editingGameId && editingGameId.tier === 'tier2' && editingGameId.id === game.id;
  if (editingName) {
    const input = document.createElement('input');
    input.className = 'rc-name-edit'; input.type = 'text'; input.value = game.name;
    let committed = false;
    const commit = () => { if (committed) return; committed = true; renameGame('tier2', game.id, input.value); editingGameId = null; render(); };
    input.onkeydown = (e) => { if (e.key === 'Enter') commit(); else if (e.key === 'Escape') { committed = true; editingGameId = null; render(); } };
    input.onblur = commit;
    card.appendChild(input);
    setTimeout(() => { input.focus(); input.select(); }, 0);
  } else {
    const nameEl = document.createElement('div');
    nameEl.className = 'rc-name';
    nameEl.textContent = parsed.base;
    nameEl.title = game.name + ' · double-click to rename';
    nameEl.ondblclick = (e) => { e.preventDefault(); editingGameId = { tier: 'tier2', id: game.id }; render(); };
    card.appendChild(nameEl);
  }

  // Last milestone date (light, editable)
  const editingMs = editingMilestoneFor && editingMilestoneFor.id === game.id;
  if (editingMs) {
    const input = document.createElement('input');
    input.className = 'rc-note-edit'; input.type = 'text';
    input.value = game.lastMilestone || ''; input.placeholder = 'YYYY-MM-DD';
    let committed = false;
    const commit = () => { if (committed) return; committed = true; setMilestone(game.id, input.value); editingMilestoneFor = null; render(); };
    input.onkeydown = (e) => { if (e.key === 'Enter') commit(); else if (e.key === 'Escape') { committed = true; editingMilestoneFor = null; render(); } };
    input.onblur = commit;
    card.appendChild(input);
    setTimeout(() => { input.focus(); input.select(); }, 0);
  } else if (game.lastMilestone) {
    const ms = document.createElement('div');
    ms.className = 'rc-milestone';
    ms.textContent = '◷ ' + game.lastMilestone;
    ms.title = 'Last milestone · click to edit';
    ms.onclick = (e) => { e.stopPropagation(); editingMilestoneFor = { id: game.id }; render(); };
    card.appendChild(ms);
  }

  // Foot: platform chip (right)
  const foot = document.createElement('div');
  foot.className = 'rc-foot';
  if (parsed.platform) {
    const plat = document.createElement('div');
    plat.className = 'rc-platform';
    plat.textContent = parsed.platform;
    foot.appendChild(plat);
  }
  card.appendChild(foot);

  return card;
}

function openFinishedCardMenu(anchor, game, status) {
  let items;
  if (status === 'beaten') {
    items = [
      { value: 'completed', label: 'Mark Completed' },
      { value: 'milestone', label: game.lastMilestone ? 'Edit milestone date' : 'Add milestone date' },
      { value: 'rename', label: 'Rename' },
      { value: 'playing', label: 'Move to Playing' },
      { value: 'abandon', label: 'Abandon', clear: true }
    ];
  } else if (status === 'completed') {
    items = [
      { value: 'beaten', label: 'Back to Beaten' },
      { value: 'milestone', label: game.lastMilestone ? 'Edit milestone date' : 'Add milestone date' },
      { value: 'rename', label: 'Rename' },
      { value: 'playing', label: 'Move to Playing', clear: true }
    ];
  } else if (status === 'sated') {
    items = [
      { value: 'playing', label: 'Move to Playing' },
      { value: 'beaten', label: 'Mark Beaten' },
      { value: 'completed', label: 'Mark Completed' },
      { value: 'milestone', label: game.lastMilestone ? 'Edit milestone date' : 'Add milestone date' },
      { value: 'rename', label: 'Rename' },
      { value: 'abandon', label: 'Abandon', clear: true }
    ];
  } else { // abandoned
    items = [
      { value: 'playing', label: 'Move back to Playing' },
      { value: 'milestone', label: game.lastMilestone ? 'Edit milestone date' : 'Add milestone date' },
      { value: 'rename', label: 'Rename' }
    ];
  }
  showPicker(anchor, items, null, v => {
    if (v === 'completed') setTier2Completion(game.id, 'completed');
    else if (v === 'beaten') setTier2Completion(game.id, 'beaten');
    else if (v === 'abandon') setTier2Completion(game.id, 'abandoned');
    else if (v === 'playing') finishedToPlaying(game.id);
    else if (v === 'milestone') { editingMilestoneFor = { id: game.id }; render(); }
    else if (v === 'rename') { editingGameId = { tier: 'tier2', id: game.id }; render(); }
  });
}

function setMilestone(gameId, val) {
  const g = state.config.tier2.find(x => x.id === gameId);
  if (g) { g.lastMilestone = (val || '').trim(); scheduleSave(); }
}

function finishedToPlaying(gameId) {
  const g = state.config.tier2.find(x => x.id === gameId);
  if (!g) return;
  g.completion = '';
  if (g.hidden) { g.hidden = false; g.hiddenAt = null; } // bring it back into the active flow
  scheduleSave(); smoothRender();
}

function renderAddRow(tier) {
  const container = document.getElementById('add-' + tier + '-container');
  container.innerHTML = '';
  if (addMode === tier) {
    const input = document.createElement('input');
    input.className = 'add-game-input';
    input.type = 'text';
    input.placeholder = 'Game name';
    let committed = false;
    const commit = () => {
      if (committed) return; committed = true;
      const v = input.value.trim();
      if (v) addGame(tier, v);
      addMode = null; render();
    };
    input.onkeydown = (e) => {
      if (e.key === 'Enter') commit();
      else if (e.key === 'Escape') { committed = true; addMode = null; render(); }
    };
    input.onblur = commit;
    container.appendChild(input);
    setTimeout(() => input.focus(), 0);
  } else {
    const btn = document.createElement('button');
    btn.className = 'add-game';
    btn.textContent = '+ Add game';
    btn.onclick = () => { addMode = tier; render(); };
    container.appendChild(btn);
  }
}

function renderHiddenSection(tier) {
  const container = document.getElementById('hidden-' + tier);
  container.innerHTML = '';
  let hidden = state.config[tier].filter(g => g.hidden);
  // Finished (beaten/completed/abandoned/sated) tier2 games live on the Parked shelf, not here.

  const isOpen = hiddenSectionOpen[tier];

    hiddenSectionOpen[tier] = !isOpen;
    smoothRender();
  };
  container.appendChild(toggle);

  if (!isOpen) return;

  const list = document.createElement('div');
  list.className = 'hidden-list';

  hidden.forEach(game => {
    const item = document.createElement('div');
    item.className = 'hidden-list-item';

    const name = document.createElement('div');
    name.className = 'hidden-list-name';
    name.textContent = game.name;
    item.appendChild(name);

    restore.className = 'hidden-action';
    restore.textContent = '↑ Restore';

    del.textContent = '× Delete forever';
    del.onclick = () => deleteGameForever(tier, game.id);

    list.appendChild(item);
  });

  container.appendChild(list);
}

    hPills.appendChild(pill);
  });
  hSec.appendChild(hPills);
  popup.appendChild(hSec);

  const close = document.createElement('button');
  close.className = 'manage-close';
  close.textContent = '× Close';
  close.onclick = () => { manageSubtasksFor = null; render(); };
  popup.appendChild(close);

  document.body.appendChild(popup);
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderHeatmap() {
  const container = document.getElementById('heatmap');
  container.innerHTML = '';
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const numWeeks = 12;
  const dayOfWeek = (today.getDay() + 6) % 7;
  const startDate = new Date(today); startDate.setDate(today.getDate() - dayOfWeek - (numWeeks - 1) * 7);
  const showLabel = [true, false, true, false, true, false, false];
  const dayLetters = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];

  for (let row = 0; row < 7; row++) {
    const label = document.createElement('div');
    label.className = 'heatmap-row-label';
    label.textContent = showLabel[row] ? dayLetters[row] : '';
    container.appendChild(label);
    for (let col = 0; col < numWeeks; col++) {
      const cellDate = new Date(startDate);
      cellDate.setDate(startDate.getDate() + col * 7 + row);
      const key = dateKey(cellDate);
      const isToday = key === todayKey();
      const isViewing = key === viewDate;
      const isFuture = cellDate > today;
      const cell = document.createElement('div');
      let cls = 'heatmap-cell';
      if (isFuture) cls += ' future';
      if (isToday && !isViewing) cls += ' today';
      if (isViewing) cls += ' viewing';
      cell.className = cls;
      cell.dataset.dateKey = key;
      if (!isFuture) {
        cell.dataset.intensity = getDayIntensity(key);
        cell.onclick = () => { viewDate = key; refreshDayView(); };
        cell.addEventListener('mouseenter', () => {
          const tt = document.getElementById('tooltip');
          const dd = state.history[key];
          let label = key;
          const relevant = gamesInTierOnDate('tier1', key);
          if (dd) {
            let c = 0;
            relevant.forEach(g => { if (dd.tier1 && dd.tier1[g.id] && dd.tier1[g.id].checkedIn) c++; });
            label += ' · ' + c + '/' + relevant.length;
          } else label += ' · —';
          tt.textContent = label;
          tt.classList.add('visible');
        });
        cell.addEventListener('mousemove', (e) => {
          const tt = document.getElementById('tooltip');
          tt.style.left = (e.clientX + 14) + 'px';
          tt.style.top = (e.clientY - 32) + 'px';
        });
        cell.addEventListener('mouseleave', () => {
          document.getElementById('tooltip').classList.remove('visible');
        });
      }
      container.appendChild(cell);
    }
  }
}

// ============================================================
// Auth
// ============================================================
async function signIn() {
  const { error } = await supabaseClient.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href.split('#')[0].split('?')[0] }
  });
  if (error) { console.error(error); alert('Sign-in failed: ' + error.message); }
}

async function signOut() {
  await supabaseClient.auth.signOut();
  session = null; state = null; viewDate = todayKey(); render();
}

// ============================================================
// Data load
// ============================================================
async function loadStateFromCloud() {
  try {
    const { data, error } = await supabaseClient
      .from('tracker_data')
      .select('data').eq('user_id', session.user.id).maybeSingle();
    if (error) throw error;
    if (data && data.data) {
      state = migrate(data.data);
      // Save back if migration changed shape
      scheduleSave();
    } else {
      state = makeDefault();
      scheduleSave();
    }
    render();
  } catch (e) {
    console.error('Load failed:', e);
    alert('加载数据失败: ' + e.message);
  }
}

// ============================================================
// Export / Import
// ============================================================
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'daily-ritual-' + todayKey() + '.json'; a.click();
  URL.revokeObjectURL(url);
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json,application/json';
  input.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (!imported.config || !imported.history) { alert('Import失败: JSON结构不对'); return; }
        showDialog({
          title: 'Replace all data?',
          message: 'Import 将<strong>覆盖</strong>当前所有云端数据。如果想恢复，可以重新 import 现在的 export 文件。',
          confirmLabel: 'Replace',
          danger: true
        }).then(ok => {
          if (!ok) return;
          state = migrate(imported);
          scheduleSave(); smoothRender();
        });
      } catch (err) { alert('Import失败: ' + err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ============================================================
// Init
// ============================================================
async function init() {
  const { data: { session: currentSession } } = await supabaseClient.auth.getSession();
  session = currentSession;
  supabaseClient.auth.onAuthStateChange((event, newSession) => {
    session = newSession;
    if (session && !state) loadStateFromCloud();
    else if (!session) { state = null; render(); }
  });
  if (session) await loadStateFromCloud();
  else render();
}

init();
</script>
