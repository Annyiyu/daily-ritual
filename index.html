* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background-color: var(--bg);
  color: var(--text);
  font-family: var(--body-font);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  padding: 48px 24px 80px;
  display: flex;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
  touch-action: pan-y;
}

/* Warm paper grain underlay — sits behind all content, never darkens text */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: var(--paper-bg); background-size: 220px 220px;
  opacity: var(--paper-opacity); mix-blend-mode: multiply;
}
/* Full-bleed watercolor background — fixed, covers the viewport behind content.
   opacity softens the watercolor so the cream page colour shows through (less saturated). */
body::after {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: var(--bg-image) center center / cover no-repeat;
  opacity: 0.58;
}

body.dragging { cursor: grabbing !important; user-select: none; -webkit-user-select: none; }
body.dragging * { cursor: grabbing !important; }

.display-font { font-family: var(--display-font); font-feature-settings: 'tnum'; letter-spacing: -0.02em; }

.container { width: 100%; max-width: 760px; position: relative; z-index: 1; }

/* Unified single-column width — Daily / Playing / Roster / Parked all align,
   so the whole page reads as one system (no more narrow-top / wide-bottom split). */
.narrow, .wide { max-width: 100%; margin-left: auto; margin-right: auto; }

/* Sign-in */
.signin-screen {
  min-height: 80vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  gap: 32px; animation: fadeIn 0.6s ease-out;
}
.signin-title { font-family: var(--display-font); font-size: 32px; font-weight: 300; color: var(--text); letter-spacing: -0.02em; }
.signin-subtitle { font-family: var(--label-font); font-size: 11px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--text-muted); }
.signin-btn {
  font-family: var(--label-font); font-size: 12px; letter-spacing: 0.25em; text-transform: uppercase;
  background-color: var(--text); color: var(--bg); border: none; padding: 14px 32px;
  border-radius: 999px; cursor: pointer; transition: opacity 0.2s;
  display: inline-flex; align-items: center; gap: 12px;
}
.signin-btn:hover { opacity: 0.85; }
.signin-btn svg { width: 16px; height: 16px; }

/* Loading */
.loading-screen { min-height: 80vh; display: flex; align-items: center; justify-content: center; }
.loading-dots {
  font-family: var(--display-font); font-size: 28px; color: var(--text-muted);
  letter-spacing: 0.5em; animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

/* Header */
.header { margin-bottom: 64px; }
body.first-load .header { animation: fadeIn 0.6s ease-out; }
.date-nav { display: flex; align-items: center; gap: 6px; margin-bottom: 28px; }
.date-arrow {
  font-family: var(--display-font); font-size: 18px; color: var(--text-muted);
  cursor: pointer; padding: 4px 8px; user-select: none; transition: color 0.2s; line-height: 1;
}
.date-arrow:hover { color: var(--accent); }
.date-arrow.disabled { color: var(--text-faint); cursor: default; opacity: 0.3; }
.date-arrow.disabled:hover { color: var(--text-faint); }
.date {
  font-family: var(--label-font); font-size: 11px; letter-spacing: 0.35em;
  text-transform: uppercase; color: var(--text-muted); flex: 1; text-align: center;
}
.date.past { color: var(--accent); }
.today-link {
  font-family: var(--label-font); font-size: 9px; letter-spacing: 0.25em;
  text-transform: uppercase; color: var(--accent); cursor: pointer;
  padding: 4px 8px; user-select: none; transition: opacity 0.2s; white-space: nowrap;
}
.today-link:hover { opacity: 0.6; }
.companion-band {
  height: 10px; width: 100%; border-radius: 999px;
  margin-top: 6px;
  background: linear-gradient(90deg, rgba(196,180,160,0.10), rgba(196,180,160,0.05));
  box-shadow: 0 1px 6px rgba(210,133,107,0.10), inset 0 0 0 1px rgba(255,255,255,0.22);
  transition: background 0.7s ease;
}

/* Sections */
.section { margin-bottom: 56px; }
body.first-load .section { animation: fadeIn 0.8s ease-out backwards; }
body.first-load .section:nth-of-type(1) { animation-delay: 0.1s; }
body.first-load .section:nth-of-type(2) { animation-delay: 0.2s; }
body.first-load .section:nth-of-type(3) { animation-delay: 0.3s; }
body.first-load .section:nth-of-type(4) { animation-delay: 0.4s; }

.section-header { display: flex; align-items: center; margin-bottom: 24px; gap: 16px; }
.section-title {
  font-family: var(--label-font); font-size: 10px; letter-spacing: 0.35em;
  text-transform: uppercase; color: var(--text-muted); flex-shrink: 0;
  transition: color 0.2s, background-color 0.2s;
  padding: 2px 8px; border-radius: 999px; margin-left: -8px;
}
.section-line { flex: 1; height: 1px; background-color: var(--line); transition: background-color 0.2s; }

.section.drop-target .section-title { color: var(--accent); background-color: var(--accent-faint); }
.section.drop-target .section-line { background-color: var(--accent-soft); }

/* Drag handles */
.drag-handle {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 22px; cursor: grab; color: var(--text-faint);
  opacity: 0.45; transition: opacity 0.2s, color 0.2s; flex-shrink: 0;
  user-select: none; touch-action: none; font-size: 14px; line-height: 1; letter-spacing: -1px;
  border-radius: 3px;
}
.drag-handle:hover { opacity: 1; color: var(--accent); background: var(--accent-faint); }
.drag-handle:active { cursor: grabbing; }

/* Game item */
.game-item { padding: 14px 0; border-bottom: 1px solid var(--line); transition: opacity 0.15s, transform 0.15s; }
.game-item:last-child { border-bottom: none; }
.game-item.dragging { opacity: 0.35; }

.game-row { display: flex; align-items: center; gap: 10px; user-select: none; flex-wrap: nowrap; }

.checkbox {
  width: 18px; height: 18px; border-radius: 50%;
  border: 1.5px solid var(--text-muted); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s ease; cursor: pointer; background-color: transparent;
}
.checkbox.checked { background-color: var(--accent); border-color: var(--accent); }
.checkbox.checked::after {
  content: ''; width: 5px; height: 8px;
  border: solid var(--bg); border-width: 0 1.5px 1.5px 0;
  transform: rotate(45deg) translate(0, -1px);
  animation: checkPop 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes checkPop {
  0% { opacity: 0; transform: rotate(45deg) translate(0, -1px) scale(0.5); }
  100% { opacity: 1; transform: rotate(45deg) translate(0, -1px) scale(1); }
}

.extra-toggle {
  width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 17px; color: var(--text-faint); opacity: 0.72;
  transition: color 0.2s ease, opacity 0.2s ease,
              transform 0.2s cubic-bezier(0.16,1,0.3,1), text-shadow 0.25s ease;
  user-select: none; flex-shrink: 0; line-height: 1;
}
.extra-toggle:hover { color: var(--accent); opacity: 1; transform: scale(1.1); }
.extra-toggle.active {
  color: var(--accent); opacity: 1;
  text-shadow: 0 0 9px rgba(210,133,107,0.5), 0 0 3px rgba(210,133,107,0.55);
  animation: starPop 0.42s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes starPop {
  0%   { transform: scale(0.7); }
  55%  { transform: scale(1.22); }
  100% { transform: scale(1); }
}

.streak {
  font-family: var(--display-font); font-size: 12px; letter-spacing: 0.05em;
  color: var(--text-faint); font-variant-numeric: tabular-nums;
  min-width: 32px; text-align: right; flex-shrink: 0;
}
.streak.active { color: var(--accent); }

/* Roster streak chip — reuses .streak but sits inline next to the "played" mark,
   tinted with the card's status color, and stays hidden until there's a run going
   (keeps the 片库 calm; only games you're actually touching light up). */
.rc-streak { min-width: 0; text-align: left; font-size: 11px; opacity: 0.9; }
.rc-streak:not(.active) { display: none; }
.rc-streak.active { color: var(--g-name, var(--accent)); }
.rc-foot-left { display: flex; align-items: center; gap: 8px; }

/* Status pills (Playing completion + Roster status) */
.status-pill {
  font-family: var(--label-font); font-size: 9px;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--text-muted); cursor: pointer;
  padding: 3px 9px; border-radius: 999px;
  transition: all 0.2s; user-select: none; flex-shrink: 0;
  border: 1px solid transparent;
}
.status-pill.empty {
  opacity: 0; padding: 3px 4px; pointer-events: none; min-width: 0;
}
.game-item:hover .status-pill.empty,
.roster-item:hover .status-pill.empty {
  opacity: 0.4; pointer-events: auto;
}
.game-item:hover .status-pill.empty:hover,
.roster-item:hover .status-pill.empty:hover { opacity: 1; }

.status-pill.empty::before { content: '+ status'; letter-spacing: 0.15em; }

/* Tier 2 completion */
.status-pill[data-status="beaten"] { color: #9a7d2e; background-color: rgba(232,200,120,0.26); border-color: transparent; }
.status-pill[data-status="completed"] { color: #7a6aa0; background-color: rgba(206,190,228,0.30); border-color: transparent; font-weight: 500; }
.status-pill[data-status="sated"] { color: #6a7a98; background-color: rgba(176,196,222,0.26); border-color: transparent; }
.status-pill[data-status="abandoned"] {
  color: #8c8378; background-color: rgba(150,142,130,0.16);
  border-color: transparent;
}

/* Tier 3 roster status — soft macaron palette */
.status-pill[data-status="up_next"] { color: var(--up-name); background-color: rgba(196,222,172,0.44); border-color: transparent; font-weight: 500; }
.status-pill[data-status="considering"] { color: var(--con-name); background-color: rgba(244,220,166,0.48); border-color: transparent; }
.status-pill[data-status="backlog"] { color: var(--back-name); background-color: rgba(202,166,156,0.42); border-color: transparent; }

/* Hide / Note buttons */
.row-action {
  font-size: 14px; color: var(--text-faint); cursor: pointer;
  padding: 0 4px; transition: color 0.2s, opacity 0.2s;
  user-select: none; line-height: 1; opacity: 0.35;
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px;
  flex-shrink: 0;
}
.row-action:hover { color: var(--accent); opacity: 1; }
.row-action.active { opacity: 0.8; color: var(--accent); }

/* Drop indicator */
.drop-line { height: 0; border-top: 2px solid var(--accent); margin: -1px 0; pointer-events: none; animation: lineGlow 0.4s ease-out; }
@keyframes lineGlow { from { opacity: 0; } to { opacity: 1; } }

/* Subtasks */
.subtasks-row { margin-top: 12px; margin-left: 30px; display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
.subtasks-row.empty { margin-top: 4px; opacity: 0; transition: opacity 0.2s; }
.game-item:hover .subtasks-row.empty { opacity: 0.6; }

.subtask {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; padding: 4px 6px 4px 8px;
  border-radius: 999px; border: 1px solid var(--line-strong);
  color: var(--text-muted); user-select: none;
  transition: all 0.2s ease, opacity 0.15s; background-color: transparent;
}
.subtask.dragging { opacity: 0.35; }

.subtask-drag-handle {
  display: inline-flex; align-items: center; justify-content: center;
  cursor: grab; color: currentColor; opacity: 0.5;
  touch-action: none; user-select: none;
  padding: 0 2px; font-size: 11px; line-height: 1; letter-spacing: -1px;
}
.subtask-drag-handle:hover { opacity: 1; }
.subtask-drag-handle:active { cursor: grabbing; }

.subtask-label { cursor: pointer; padding: 0 2px; }
.subtask:hover .subtask-label { color: var(--text); }
.subtask.checked { background-color: var(--accent-faint); border-color: transparent; color: var(--accent); }

.subtask-edit {
  font-family: var(--body-font); font-size: 12px; color: var(--text);
  background: transparent; border: none; border-bottom: 1px solid var(--accent);
  outline: none; padding: 0; width: 80px;
}

.subtask-hide {
  font-size: 12px; line-height: 1; opacity: 0; cursor: pointer; color: inherit;
  transition: opacity 0.15s; margin-right: -3px; margin-left: 1px;
}
.subtask:hover .subtask-hide { opacity: 0.7; }
.subtask-hide:hover { opacity: 1 !important; color: var(--accent) !important; }

.subtask-drop-marker {
  width: 2px; height: 22px; background-color: var(--accent);
  border-radius: 2px; animation: lineGlow 0.4s ease-out;
}

.add-subtask {
  font-family: var(--label-font); font-size: 10px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--text-faint); cursor: pointer;
  padding: 4px 8px; background: none; border: none; transition: color 0.2s;
}
.add-subtask:hover { color: var(--accent); }

.add-subtask-input {
  background: transparent; border: none; border-bottom: 1px solid var(--accent);
  color: var(--text); font-size: 12px; font-family: var(--body-font);
  outline: none; padding: 3px 4px; width: 130px;
}

.subtask-manage-link {
  font-family: var(--label-font); font-size: 9px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--text-faint); cursor: pointer;
  padding: 4px 8px; margin-left: 4px;
  border-radius: 999px; transition: color 0.2s, background-color 0.2s;
  opacity: 0;
}
.game-item:hover .subtask-manage-link { opacity: 0.6; }
.subtask-manage-link:hover { color: var(--accent); opacity: 1 !important; }

/* Subtask manage modal */
.manage-popup {
  position: fixed; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  background: var(--bg); border: 1px solid var(--line-strong);
  border-radius: 8px; padding: 24px 24px 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  z-index: 200; min-width: 280px; max-width: 90vw;
  animation: fadeIn 0.2s ease-out;
}
.manage-overlay {
  position: fixed; inset: 0; background: rgba(42,36,28,0.2); z-index: 199;
  animation: fadeIn 0.2s ease-out;
}
.manage-title {
  font-family: var(--label-font); font-size: 9px; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px;
}
.manage-section { margin-bottom: 14px; }
.manage-section:last-of-type { margin-bottom: 0; }
.manage-section-label {
  font-family: var(--label-font); font-size: 9px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--text-faint); margin-bottom: 8px;
}
.manage-pills { display: flex; flex-wrap: wrap; gap: 6px; min-height: 26px; }
.manage-empty {
  font-family: var(--body-font); font-size: 12px;
  color: var(--text-faint); font-style: italic;
}
.manage-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; padding: 4px 10px; border-radius: 999px;
  border: 1px solid var(--line-strong); color: var(--text-muted);
}
.manage-pill.hidden-pill { opacity: 0.6; }
.manage-pill-restore, .manage-pill-delete {
  cursor: pointer; opacity: 0.6; transition: opacity 0.2s, color 0.2s;
}
.manage-pill-restore:hover { opacity: 1; color: var(--accent); }
.manage-pill-delete:hover { opacity: 1; color: var(--accent); }
.manage-close {
  font-family: var(--label-font); font-size: 9px; letter-spacing: 0.25em;
  text-transform: uppercase; color: var(--text-muted); cursor: pointer;
  padding: 6px 0; background: none; border: none; margin-top: 12px;
  display: block; margin-left: auto;
}
.manage-close:hover { color: var(--accent); }

/* Roster item */
.roster-item { padding: 12px 0; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 10px; transition: opacity 0.15s; flex-wrap: nowrap; }
.roster-item:last-of-type { border-bottom: none; }
.roster-item.dragging { opacity: 0.35; }

.roster-check {
  width: 14px; height: 14px; border-radius: 3px;
  border: 1.5px solid var(--text-muted); flex-shrink: 0; cursor: pointer;
  transition: all 0.25s ease; display: flex; align-items: center;
  justify-content: center; background-color: transparent;
}
.roster-check.checked { background-color: var(--accent); border-color: var(--accent); }
.roster-check.checked::after {
  content: ''; width: 4px; height: 7px; border: solid var(--bg);
  border-width: 0 1.5px 1.5px 0; transform: rotate(45deg) translate(0, -1px);
}

.roster-name-edit {
  flex: 1; font-family: var(--body-font); font-size: 14px;
  color: var(--text); background: transparent; border: none;
  border-bottom: 1px solid var(--accent); outline: none; padding: 0; min-width: 0;
}

/* ============================================================
   Roster (tier3) — grouped card grid
   ============================================================ */
.roster-controls {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-bottom: 22px;
}
.roster-ctrl {
  font-family: var(--label-font); font-size: 9px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--text-muted); cursor: pointer;
  padding: 5px 11px; border-radius: 999px; background: transparent;
  border: 1px solid var(--line-strong); transition: all 0.18s; user-select: none;
}
.roster-ctrl:hover { color: var(--accent); border-color: var(--accent-soft); }
.roster-ctrl.active { color: var(--accent); border-color: var(--accent-soft); background: var(--accent-faint); }
.roster-ctrl .ctrl-caret { font-family: var(--display-font); font-size: 9px; opacity: 0.6; margin-left: 4px; }

.roster-group { margin-bottom: 18px; }
.roster-group-head {
  display: flex; align-items: baseline; gap: 9px; cursor: pointer;
  padding: 4px 2px 10px; user-select: none;
}
.rg-caret {
  font-family: var(--display-font); font-size: 13px; line-height: 1;
  color: var(--g-name, var(--text-muted)); transition: transform 0.2s; transform: rotate(90deg);
  align-self: center;
}
.roster-group-head.folded .rg-caret { transform: rotate(0deg); }
.rg-label {
  font-family: var(--label-font); font-size: 10px; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--g-name, var(--text-muted)); font-weight: 500;
}
.rg-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: var(--g-line, var(--text-faint)); align-self: center;
}
.rg-count {
  font-family: var(--display-font); font-size: 11px; color: var(--g-line, var(--text-faint));
  font-variant-numeric: tabular-nums;
}
.roster-group-head .rg-line { flex: 1; height: 1px; background: var(--g-line, var(--line)); opacity: 0.3; align-self: center; }

.roster-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  background: var(--g-tint, transparent);
  border-radius: 16px;
  padding: 14px;
}
.roster-grid.ungrouped { background: transparent; padding: 0; }

.roster-group[data-group="up_next"]    .roster-grid { --g-tint: var(--up-tint);   --g-line: var(--up-line);   --g-name: var(--up-name); }
.roster-group[data-group="up_next"]    { --g-line: var(--up-line); --g-name: var(--up-name); }
.roster-group[data-group="considering"] .roster-grid { --g-tint: var(--con-tint); --g-line: var(--con-line); --g-name: var(--con-name); }
.roster-group[data-group="considering"] { --g-line: var(--con-line); --g-name: var(--con-name); }
.roster-group[data-group="backlog"]    .roster-grid { --g-tint: var(--back-tint); --g-line: var(--back-line); --g-name: var(--back-name); }
.roster-group[data-group="backlog"]    { --g-line: var(--back-line); --g-name: var(--back-name); }

.roster-card {
  position: relative;
  background: rgba(255, 253, 247, 0.62);
  border: 1px solid color-mix(in srgb, var(--g-line, var(--line-strong)) 32%, transparent);
  border-radius: 12px;
  padding: 11px 12px 9px;
  display: flex; flex-direction: column; gap: 6px;
  min-height: 96px;
  transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s, opacity 0.15s;
}
.roster-card:hover {
  border-color: color-mix(in srgb, var(--g-line, var(--line-strong)) 58%, transparent);
  box-shadow: 0 3px 14px rgba(42, 36, 28, 0.06);
}
.roster-card.dragging { opacity: 0.32; }
.roster-card.drop-before::before,
.roster-card.drop-after::after {
  content: ''; position: absolute; top: 12%; height: 76%; width: 2px;
  background: var(--accent); border-radius: 2px; animation: lineGlow 0.25s ease-out;
}
.roster-card.drop-before::before { left: -7px; }
.roster-card.drop-after::after { right: -7px; }

.rc-head { display: flex; align-items: center; gap: 6px; }
.rc-head .rc-spacer { flex: 1; }
.rc-head .status-pill { flex-shrink: 1; min-width: 0; }

.rc-drag {
  display: inline-flex; align-items: center; justify-content: center;
  width: 16px; height: 18px; cursor: grab; color: var(--text-faint);
  opacity: 0; transition: opacity 0.2s, color 0.2s; flex-shrink: 0;
  user-select: none; touch-action: none; font-size: 12px; line-height: 1;
  letter-spacing: -1px; border-radius: 3px;
}
.roster-card:hover .rc-drag { opacity: 0.5; }
.rc-drag:hover { opacity: 1 !important; color: var(--accent); }
.rc-drag:active { cursor: grabbing; }

.rc-menu-btn {
  width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-faint); font-size: 15px; line-height: 1;
  border-radius: 5px; transition: all 0.18s; opacity: 0.45; flex-shrink: 0;
  letter-spacing: -1px;
}
.roster-card:hover .rc-menu-btn { opacity: 0.8; }
.rc-menu-btn:hover { opacity: 1; color: var(--accent); background: var(--accent-faint); }

.rc-name {
  font-family: var(--body-font); font-size: 14.5px; line-height: 1.3;
  color: var(--g-name, var(--text)); letter-spacing: -0.005em;
  cursor: text; word-break: break-word; text-wrap: pretty;
}
.rc-name-edit {
  font-family: var(--body-font); font-size: 14.5px; color: var(--text);
  background: transparent; border: none; border-bottom: 1px solid var(--accent);
  outline: none; padding: 0; width: 100%;
}
.rc-note {
  font-family: var(--body-font); font-size: 11.5px; font-style: italic;
  color: var(--text-faint); line-height: 1.35; cursor: pointer;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rc-note:hover { color: var(--text-muted); }
.rc-note-edit {
  font-family: var(--body-font); font-size: 11.5px; font-style: italic;
  color: var(--text); background: transparent; border: none;
  border-bottom: 1px solid var(--accent); outline: none; padding: 1px 0; width: 100%;
}

.rc-foot { display: flex; align-items: center; gap: 7px; margin-top: auto; padding-top: 3px; justify-content: space-between; }
.rc-platform {
  font-family: var(--label-font); font-size: 8px; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--g-name, var(--text-faint)); opacity: 0.75;
  border: 1px solid color-mix(in srgb, var(--g-line, var(--line-strong)) 45%, transparent);
  padding: 2px 6px; border-radius: 999px; white-space: nowrap; flex-shrink: 0; line-height: 1.4;
}
.rc-played {
  display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
  opacity: 0.4; transition: opacity 0.2s; user-select: none;
}
.roster-card:hover .rc-played, .rc-played.on { opacity: 0.9; }
.rc-played-box {
  width: 13px; height: 13px; border-radius: 4px; border: 1.5px solid var(--text-faint);
  display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0;
}
.rc-played.on .rc-played-box { background: var(--g-name, var(--accent)); border-color: var(--g-name, var(--accent)); }
.rc-played.on .rc-played-box::after {
  content: ''; width: 3.5px; height: 6px; border: solid var(--bg);
  border-width: 0 1.5px 1.5px 0; transform: rotate(45deg) translate(0, -1px);
}
.rc-played-label {
  font-family: var(--label-font); font-size: 8px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text-faint);
}
.rc-played.on .rc-played-label { color: var(--g-name, var(--accent)); }

.roster-empty {
  font-family: var(--body-font); font-size: 13px; font-style: italic;
  color: var(--text-faint); padding: 8px 2px;
}

/* Finished shelf — Beaten (gold) · Completed (lilac/platinum) · Abandoned (muted) */
.finished-group[data-fgroup="beaten"] { --g-line: #d8b85e; --g-name: #9a7d2e; }
.finished-group[data-fgroup="beaten"] .roster-grid { --g-tint: rgba(232,200,120,0.18); --g-line: #d8b85e; --g-name: #9a7d2e; }
.finished-group[data-fgroup="completed"] { --g-line: #bda9dd; --g-name: #7a6aa0; }
.finished-group[data-fgroup="completed"] .roster-grid { --g-tint: rgba(206,190,228,0.18); --g-line: #bda9dd; --g-name: #7a6aa0; }
.finished-group[data-fgroup="sated"] { --g-line: #aebfd6; --g-name: #6a7a98; }
.finished-group[data-fgroup="sated"] .roster-grid { --g-tint: rgba(176,196,222,0.15); --g-line: #aebfd6; --g-name: #6a7a98; }
.finished-group[data-fgroup="abandoned"] { --g-line: #bdb4a6; --g-name: #8c8378; }
.finished-group[data-fgroup="abandoned"] .roster-grid { --g-tint: rgba(150,142,130,0.07); --g-line: #bdb4a6; --g-name: #8c8378; }
.abandoned-group { opacity: 0.84; }

.finished-card { min-height: 78px; }
.finished-card .rc-foot { justify-content: flex-end; }
.rc-milestone {
  font-family: var(--label-font); font-size: 9px; letter-spacing: 0.08em;
  color: var(--text-faint); cursor: pointer; transition: color 0.18s;
}
.rc-milestone:hover { color: var(--accent); }

/* Daily — same card material as Playing, but a column card so sub-task chips
   live inside it. Both "ritual" tiers (Daily + Playing) share the warm panel. */
#tier1-list {
  background: rgba(235, 178, 120, 0.14);
  border: 1px solid color-mix(in srgb, var(--accent) 15%, transparent);
  border-radius: 16px;
  padding: 12px;
  backdrop-filter: blur(2px);
  display: flex; flex-direction: column; gap: 10px;
}
#tier1-list:empty { display: none; }

.daily-card {
  position: relative;
  display: flex; flex-direction: column; gap: 8px;
  background: rgba(255, 250, 241, 0.64);
  border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);
  border-radius: 12px;
  padding: 13px 15px 11px;
  transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s, opacity 0.15s;
}
.daily-card:hover {
  border-color: color-mix(in srgb, var(--accent) 38%, transparent);
  box-shadow: 0 4px 16px rgba(42, 36, 28, 0.07);
  transform: translateY(-1px);
}
.daily-card.dragging { opacity: 0.32; }
.daily-card .rc-drag { opacity: 0; }
.daily-card:hover .rc-drag { opacity: 0.5; }
.dc-head { display: flex; align-items: center; gap: 12px; }
.daily-card .rc-menu-btn { opacity: 0.45; }
.daily-card:hover .rc-menu-btn { opacity: 0.8; }
.daily-card .rc-menu-btn:hover { opacity: 1; }
.daily-card .subtasks-row { margin-top: 0; margin-left: 46px; }
.daily-card .subtasks-row.empty { opacity: 0; }
.daily-card:hover .subtasks-row.empty { opacity: 0.6; }
.daily-card:hover .subtask-manage-link { opacity: 0.6; }

/* --- Company multi-column views (1 / 2 / 4) --- */
#tier1-list.cols-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; align-items: start; }
#tier1-list.cols-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; align-items: start; }
#tier1-list.cols-2:empty, #tier1-list.cols-4:empty { display: none; }
/* Grid cards are the vertical 3-segment tile (.company-tile), same body as the
   other sections. Chunky min-heights reference Playing (104) / Roster (96); the
   foot pins to the bottom via .rc-foot's margin-top:auto, so no centering here. */
#tier1-list.cols-2 .daily-card { min-height: 104px; }
#tier1-list.cols-4 .daily-card { min-height: 96px; }
.company-tile .pc-body { flex: 0 0 auto; gap: 2px; }
.company-tile .pc-checkin { opacity: 1; }            /* check-in is Company's primary action */
/* 4-up columns are narrow — drop the streak so the name + check-in keep room
   (platform stays; this is spacing, not shrinking — padding and font stay full) */
#tier1-list.cols-4 .streak { display: none; }
@media (max-width: 560px) {
  #tier1-list.cols-4 { grid-template-columns: repeat(2, 1fr); }
}
/* grid drop indicator — mirror Roster's card-edge accent (a full-width line reads wrong in a grid) */
.daily-card.drop-before::before,
.daily-card.drop-after::after {
  content: ''; position: absolute; top: 12%; height: 76%; width: 2px;
  background: var(--accent); border-radius: 2px; animation: lineGlow 0.25s ease-out;
}
.daily-card.drop-before::before { left: -6px; }
.daily-card.drop-after::after { right: -6px; }

/* Company column switcher (lives at the right of the section header) */
.col-switch { display: inline-flex; align-items: center; gap: 2px; margin-left: 12px; flex-shrink: 0; }
.col-switch .cs-seg {
  font-family: var(--label-font); font-size: 11px; line-height: 1;
  width: 22px; height: 20px; display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-faint); cursor: pointer; border-radius: 6px;
  border: 1px solid transparent; transition: color 0.18s ease, background 0.18s ease, border-color 0.18s ease;
  user-select: none;
}
.col-switch .cs-seg:hover { color: var(--accent); }
.col-switch .cs-seg.active { color: var(--accent); border-color: var(--accent-soft); background: var(--accent-faint); }

/* Detail tag chips (flat multi-tag editor) */
.detail-tag.tag-chip { display: inline-flex; align-items: center; gap: 6px; }
.detail-tag .tag-x { color: var(--text-faint); font-size: 10px; cursor: pointer; }
.detail-tag .tag-x:hover { color: var(--accent); }

/* Playing — Roster-style cards, but 2 per row (larger than Roster's 4-up).
   Cream cards on the warm "ritual zone" panel, vertical layout like Roster, in a
   clay-rose tint so it reads distinct from Daily's peach-amber. */
#tier2-list {
  background: rgba(204, 140, 134, 0.15);
  border: 1px solid color-mix(in srgb, var(--accent) 16%, transparent);
  border-radius: 16px;
  padding: 14px;
  backdrop-filter: blur(2px);
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
#tier2-list:empty { display: none; }

.playing-card {
  position: relative;
  background: rgba(253, 245, 245, 0.7);
  border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent);
  border-radius: 12px;
  padding: 11px 13px 10px;
  display: flex; flex-direction: column; gap: 7px;
  min-height: 104px;
  transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s, opacity 0.15s;
}
.playing-card:hover {
  border-color: color-mix(in srgb, var(--accent) 40%, transparent);
  box-shadow: 0 3px 14px rgba(42, 36, 28, 0.06);
  transform: translateY(-1px);
}
.playing-card.dragging { opacity: 0.32; }
.playing-card .rc-drag { opacity: 0; }
.playing-card:hover .rc-drag { opacity: 0.5; }

.pc-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
.playing-card .pc-body { flex: 0 0 auto; gap: 2px; }
.playing-card .pc-name { font-size: 14.5px; }
.pc-name {
  font-family: var(--body-font); font-size: 15px; line-height: 1.3;
  color: var(--text); letter-spacing: -0.005em; cursor: text;
  word-break: break-word; text-wrap: pretty;
}
.pc-name.checked { color: var(--text-muted); }
.pc-name-edit {
  font-family: var(--body-font); font-size: 15px; color: var(--text);
  background: transparent; border: none; border-bottom: 1px solid var(--accent);
  outline: none; padding: 0; width: 100%;
}
.pc-note {
  font-family: var(--body-font); font-size: 11.5px; font-style: italic;
  color: var(--text-faint); line-height: 1.35; cursor: pointer;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.pc-note:hover { color: var(--text-muted); }
.pc-note-edit {
  font-family: var(--body-font); font-size: 11.5px; font-style: italic;
  color: var(--text); background: transparent; border: none;
  border-bottom: 1px solid var(--accent); outline: none; padding: 1px 0; width: 100%;
}
.pc-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.playing-card .status-pill.empty { opacity: 0; }
.playing-card:hover .status-pill.empty { opacity: 0.5; pointer-events: auto; }
.playing-card:hover .status-pill.empty:hover { opacity: 1; }
.playing-card .rc-menu-btn { opacity: 0.45; }
.playing-card:hover .rc-menu-btn { opacity: 0.8; }
.playing-card .rc-menu-btn:hover { opacity: 1; }

/* Playing card foot: platform + streak (left) · daily check-in (right) */
.pc-foot-left { display: flex; align-items: center; gap: 9px; min-width: 0; }
.pc-checkin {
  display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
  user-select: none; opacity: 0.5; transition: opacity 0.2s; flex-shrink: 0;
}
.playing-card:hover .pc-checkin, .pc-checkin.on { opacity: 1; }
.pc-checkin .checkbox { width: 15px; height: 15px; }
.pc-checkin-label {
  font-family: var(--label-font); font-size: 8px; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--text-faint); white-space: nowrap;
}
.pc-checkin.on .pc-checkin-label { color: var(--accent); }

@media (max-width: 520px) {
  #tier2-list { grid-template-columns: 1fr; padding: 12px; }
  .playing-card .rc-drag { opacity: 0.4; }
}

/* Add game */
.add-row { margin-top: 18px; }
.add-game {
  font-family: var(--label-font); font-size: 11px; letter-spacing: 0.25em;
  text-transform: uppercase; color: var(--text-muted); cursor: pointer;
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 0; background: none; border: none; transition: color 0.2s;
}
.add-game:hover { color: var(--accent); }
.add-game-input {
  background: transparent; border: none; border-bottom: 1px solid var(--accent);
  color: var(--text); font-size: 14px; font-family: var(--body-font);
  outline: none; padding: 4px 0; width: 220px;
}

/* Hidden section */
.hidden-toggle {
  font-family: var(--label-font); font-size: 10px; letter-spacing: 0.25em;
  text-transform: uppercase; color: var(--text-faint); cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 0; margin-top: 10px;
  background: none; border: none; transition: color 0.2s;
}
.hidden-toggle:hover { color: var(--accent); }
.hidden-toggle .caret {
  display: inline-block; transition: transform 0.2s;
  font-family: var(--display-font); font-size: 12px; line-height: 1;
}
.hidden-toggle.open .caret { transform: rotate(90deg); }

.hidden-list {
  margin-top: 8px; padding-left: 12px;
  border-left: 1px dashed var(--line-strong);
}
.hidden-list-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; opacity: 0.7;
}
.hidden-list-name {
  flex: 1; font-size: 13px; color: var(--text-muted);
  font-style: italic;
}

.hidden-action {
  font-family: var(--label-font); font-size: 9px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--text-faint); cursor: pointer;
  padding: 3px 8px; border-radius: 999px; transition: color 0.2s, background-color 0.2s;
  user-select: none;
}
.hidden-action:hover { color: var(--accent); background-color: var(--accent-faint); }
.hidden-action.danger:hover { color: #a13a2a; background-color: transparent; }

/* Heatmap */
.heatmap-container { margin-top: 12px; }
.heatmap {
  display: grid; grid-template-columns: auto repeat(12, 14px);
  grid-auto-rows: 14px; gap: 3px; align-items: center;
}
.heatmap-row-label {
  font-family: var(--label-font); font-size: 9px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-faint); padding-right: 6px;
  text-align: right; line-height: 14px; min-width: 20px;
}
.heatmap-cell { width: 14px; height: 14px; border-radius: 2px; cursor: pointer; transition: outline 0.15s ease; position: relative; }
.heatmap-cell[data-intensity="0"] { background-color: rgba(184, 118, 62, 0.05); }
.heatmap-cell[data-intensity="1"] { background-color: rgba(184, 118, 62, 0.25); }
.heatmap-cell[data-intensity="2"] { background-color: rgba(184, 118, 62, 0.5); }
.heatmap-cell[data-intensity="3"] { background-color: rgba(184, 118, 62, 0.75); }
.heatmap-cell[data-intensity="4"] { background-color: var(--accent); }
.heatmap-cell:hover { outline: 1px solid var(--text-muted); outline-offset: 1px; }
.heatmap-cell.today { outline: 1.5px solid var(--text); outline-offset: 1px; }
.heatmap-cell.viewing { outline: 1.5px solid var(--accent); outline-offset: 1px; }
.heatmap-cell.future { background-color: transparent; cursor: default; }
.heatmap-cell.future:hover { outline: none; }

.heatmap-footer {
  font-family: var(--label-font); margin-top: 18px;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-faint);
}
.heatmap-legend { display: flex; align-items: center; gap: 4px; }
.heatmap-legend .heatmap-cell { width: 10px; height: 10px; cursor: default; }
.heatmap-legend .heatmap-cell:hover { outline: none; }

/* ===== Review (回顾) ===== */
.review-entry-row { display: flex; justify-content: flex-end; margin-bottom: 16px; }
.review-entry {
  display: inline-flex; align-items: center; gap: 9px;
  font-family: var(--label-font); font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--text-faint); background: transparent; border: none; cursor: pointer;
  padding: 6px 2px; transition: color 0.2s;
}
.review-entry:hover { color: var(--accent); }
.review-entry svg { display: block; flex-shrink: 0; }

.review-view { animation: fadeIn 0.45s ease-out; }
.rv-header { display: flex; align-items: center; gap: 14px; margin-bottom: 30px; }
.rv-back {
  font-family: var(--label-font); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--text-muted); background: transparent; border: none; cursor: pointer;
  padding: 6px 8px 6px 0; transition: color 0.2s; white-space: nowrap;
}
.rv-back:hover { color: var(--accent); }
.rv-title { font-family: var(--label-font); font-size: 11px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--text-muted); flex: 1; }
.rv-span-toggle { display: flex; gap: 2px; background: rgba(210,133,107,0.08); border-radius: 999px; padding: 3px; }
.rv-span-toggle button {
  font-family: var(--label-font); font-size: 12px; letter-spacing: 0.08em; color: var(--text-muted);
  background: transparent; border: none; cursor: pointer; padding: 5px 15px; border-radius: 999px; transition: all 0.2s;
}
.rv-span-toggle button:hover { color: var(--accent); }
.rv-span-toggle button.active { background: var(--bg); color: var(--accent); box-shadow: 0 1px 3px rgba(42,36,28,0.07); }

.rv-summary {
  font-family: var(--label-font); font-size: 11px; letter-spacing: 0.04em; color: var(--text-faint);
  margin-bottom: 26px; display: flex; flex-wrap: wrap; gap: 5px 12px; line-height: 1.5;
}
.rv-summary b { color: var(--accent); font-weight: 500; font-variant-numeric: tabular-nums; }
.rv-summary .sum-sep { color: var(--line-strong); }

.rv-field-wrap { background: rgba(166,150,130,0.08); border-radius: 16px; padding: 22px 24px 24px; margin-bottom: 30px; }
.rv-field-head { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; }
.rv-field-head button {
  font-family: var(--display-font); font-size: 18px; color: var(--text-muted); background: transparent;
  border: none; cursor: pointer; padding: 2px 10px; line-height: 1; transition: color 0.2s;
}
.rv-field-head button:hover { color: var(--accent); }
.rv-field-head button.disabled { opacity: 0.22; cursor: default; pointer-events: none; }
.rv-range-label {
  font-family: var(--label-font); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text-muted); min-width: 150px; text-align: center;
}

.rv-field { overflow-x: auto; display: flex; justify-content: center; }
.rv-grid { display: grid; }
.rv-cell { border-radius: 3px; background: rgba(210,133,107,0.07); cursor: pointer; transition: outline 0.12s; }
.rv-cell[data-i="1"] { background: rgba(210,133,107,0.22); }
.rv-cell[data-i="2"] { background: rgba(210,133,107,0.42); }
.rv-cell[data-i="3"] { background: rgba(210,133,107,0.66); }
.rv-cell[data-i="4"] { background: var(--accent); }
.rv-cell:hover { outline: 1.5px solid var(--text-muted); outline-offset: 1px; }
.rv-cell.sel { outline: 2px solid var(--accent); outline-offset: 1px; }
.rv-cell.today { box-shadow: inset 0 0 0 1.5px rgba(42,36,28,0.32); }
.rv-cell.future, .rv-cell.blank { background: transparent; cursor: default; pointer-events: none; }
.rv-rowlabel, .rv-collabel {
  font-family: var(--label-font); font-size: 9px; letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--text-faint); display: flex; align-items: center;
}
.rv-rowlabel { justify-content: flex-end; padding-right: 8px; }
.rv-collabel { justify-content: flex-start; padding-bottom: 5px; align-items: flex-end; }

/* Month calendar variant */
.rv-month { width: 100%; }
.rv-month-head { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; margin-bottom: 8px; }
.rv-month-head div { font-family: var(--label-font); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); text-align: center; }
.rv-mgrid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; width: 100%; }
.rv-mcell {
  min-height: 56px; border-radius: 8px; background: rgba(210,133,107,0.06); cursor: pointer;
  padding: 7px 9px; transition: outline 0.12s;
}
.rv-mcell[data-i="1"] { background: rgba(210,133,107,0.18); }
.rv-mcell[data-i="2"] { background: rgba(210,133,107,0.34); }
.rv-mcell[data-i="3"] { background: rgba(210,133,107,0.56); }
.rv-mcell[data-i="4"] { background: var(--accent); }
.rv-mcell .d { font-family: var(--label-font); font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
.rv-mcell[data-i="3"] .d, .rv-mcell[data-i="4"] .d { color: #fff; opacity: 0.92; }
.rv-mcell:hover { outline: 1.5px solid var(--text-muted); outline-offset: 1px; }
.rv-mcell.sel { outline: 2px solid var(--accent); outline-offset: 1px; }
.rv-mcell.today .d { font-weight: 700; color: var(--accent); }
.rv-mcell.today[data-i="3"] .d, .rv-mcell.today[data-i="4"] .d { color: #fff; }
.rv-mcell.future { background: transparent; cursor: default; pointer-events: none; }
.rv-mcell.future .d { color: var(--text-faint); opacity: 0.45; }
.rv-mcell.blank { background: transparent; pointer-events: none; min-height: 0; }

.rv-legend { display: flex; align-items: center; justify-content: flex-end; gap: 5px; margin-top: 18px; font-family: var(--label-font); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-faint); }
.rv-legend .lg { width: 11px; height: 11px; border-radius: 2px; }

/* Day detail */
.rv-section-title { font-family: var(--label-font); font-size: 10px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 18px; }
.rv-detail-empty { font-family: var(--body-font); font-size: 13px; color: var(--text-faint); text-align: center; padding: 26px 0; }
.rv-dt-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 22px; flex-wrap: wrap; }
.rv-dt-date { font-family: var(--label-font); font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--rv-day, var(--text)); }
.rv-dt-pct { font-family: var(--label-font); font-size: 11px; letter-spacing: 0.04em; color: var(--rv-day, var(--accent)); }
.rv-dt-jump { margin-left: auto; font-family: var(--label-font); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); background: none; border: none; cursor: pointer; transition: color 0.2s; }
.rv-dt-jump:hover { color: var(--rv-day, var(--accent)); }
.rv-dt-list { display: flex; flex-direction: column; gap: 13px; }
.rv-dt-row { display: flex; align-items: flex-start; gap: 12px; }
.rv-dt-check { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 11px; }
.rv-dt-check.on { background: var(--rv-day-solid, var(--accent)); color: #fff; }
.rv-dt-check.off { border: 1.5px solid var(--line-strong); }
.rv-dt-main { flex: 1; min-width: 0; }
.rv-dt-name { font-family: var(--body-font); font-size: 14px; color: var(--text); }
.rv-dt-name.off { color: var(--text-faint); }
.rv-dt-plat { font-family: var(--label-font); font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); border: 1px solid var(--line); border-radius: 4px; padding: 1px 5px; margin-left: 8px; white-space: nowrap; }
.rv-dt-extra { color: var(--accent); margin-left: 6px; font-size: 12px; }
.rv-dt-subs { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.rv-dt-sub { font-family: var(--label-font); font-size: 10px; letter-spacing: 0.02em; color: var(--rv-day, var(--accent)); background: var(--rv-day-soft, var(--accent-faint)); border-radius: 5px; padding: 2px 8px; }
.rv-dt-also { margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--line); }
.rv-dt-also-label { font-family: var(--label-font); font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 11px; }
.rv-dt-chips { display: flex; flex-wrap: wrap; gap: 7px; }
.rv-dt-chip { font-family: var(--body-font); font-size: 12px; color: var(--text-muted); background: rgba(210,133,107,0.09); border-radius: 6px; padding: 3px 11px; }
.rv-dt-chip .ct { font-family: var(--label-font); font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); margin-right: 6px; }

/* A+B combo — white detail card · seasonal field · categorical chips */
.rv-detail-card { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 22px 24px; }
.rv-dt-finishes { display: flex; flex-direction: column; gap: 9px; margin-bottom: 20px; padding: 14px 16px; background: rgba(210,133,107,0.05); border-radius: 10px; }
.rv-dt-finishes-label { font-family: var(--label-font); font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-faint); }
.rv-dt-finish-row { display: flex; align-items: center; gap: 11px; }
.rv-dt-finish-row .rv-dt-fname { font-family: var(--body-font); font-size: 13.5px; color: var(--text); }
.rv-dt-chip.pl, .rv-dt-chip.ro { background: var(--rv-day-soft, rgba(210,133,107,0.10)); color: var(--rv-day, var(--text-muted)); }
.rv-dt-chip.pl .ct, .rv-dt-chip.ro .ct { color: inherit; opacity: 0.62; }

@media (max-width: 600px) {
  .rv-field-wrap { padding: 18px 14px 20px; }
  .rv-header { gap: 10px; }
  .rv-span-toggle button { padding: 5px 12px; }
}

/* Footer */
.app-footer {
  font-family: var(--label-font); margin-top: 80px; padding-top: 24px;
  border-top: 1px solid var(--line); font-size: 9px; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--text-faint); text-align: center;
}
.app-footer .user-email {
  display: block; margin-bottom: 8px; color: var(--text-muted);
  text-transform: none; letter-spacing: 0.05em; font-size: 10px; font-style: italic;
}
.app-footer a { color: var(--text-faint); text-decoration: none; cursor: pointer; margin: 0 8px; }
.app-footer a:hover { color: var(--accent); }

/* Tooltip */
.tooltip {
  position: fixed; font-family: var(--label-font);
  background-color: var(--text); color: var(--bg);
  font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
  padding: 6px 10px; border-radius: 3px; pointer-events: none;
  opacity: 0; transition: opacity 0.15s; z-index: 100; white-space: nowrap;
}
.tooltip.visible { opacity: 1; }

/* Drag ghost */
.drag-ghost {
  position: fixed; pointer-events: none; z-index: 1000;
  background-color: var(--bg); border: 1px solid var(--line-strong);
  border-radius: 6px; padding: 8px 12px;
  font-family: var(--body-font); font-size: 14px; color: var(--text);
  box-shadow: 0 4px 20px rgba(0,0,0,0.12); opacity: 0.95;
  white-space: nowrap; max-width: 280px; overflow: hidden; text-overflow: ellipsis;
}

/* Save indicator — minimal: a single tiny dot at top-right.
   Idle = invisible. Saving = soft pulsing dot. Just-saved = brief ✓ flash. Error = visible pill. */
.save-dot-mini {
  position: fixed; top: 14px; right: 14px;
  width: 6px; height: 6px; border-radius: 50%;
  background-color: var(--text-faint); opacity: 0;
  transition: opacity 0.4s, background-color 0.2s, transform 0.25s;
  z-index: 90; pointer-events: none;
}
.save-dot-mini.saving { opacity: 0.55; animation: pulse 1.4s ease-in-out infinite; }
.save-dot-mini.saved { opacity: 0.8; background-color: var(--accent); transform: scale(1.4); }

.save-indicator {
  position: fixed; bottom: 18px; right: 18px;
  font-family: var(--label-font); font-size: 9px; letter-spacing: 0.25em;
  text-transform: uppercase; padding: 7px 13px; border-radius: 4px;
  z-index: 90; display: none; align-items: center; gap: 8px;
  background-color: var(--bg); border: 1px solid var(--accent-soft);
  color: var(--accent); animation: fadeIn 0.3s;
}
.save-indicator.visible { display: flex; }
.save-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background-color: currentColor; animation: pulse 1.2s ease-in-out infinite;
}

/* Inline dialog — replaces native confirm() */
.dialog-overlay {
  position: fixed; inset: 0; background: rgba(42,36,28,0.28);
  z-index: 300; display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.18s ease-out; padding: 24px;
}
.dialog {
  background: var(--bg); border: 1px solid var(--line-strong);
  border-radius: 10px; padding: 28px 28px 22px;
  max-width: 380px; width: 100%;
  box-shadow: 0 12px 40px rgba(0,0,0,0.18);
  animation: dialogIn 0.22s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes dialogIn {
  from { opacity: 0; transform: translateY(8px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.dialog-title {
  font-family: var(--display-font); font-size: 20px; font-weight: 400;
  color: var(--text); letter-spacing: -0.01em; margin-bottom: 10px;
  line-height: 1.3;
}
.dialog-message {
  font-family: var(--body-font); font-size: 13.5px; line-height: 1.55;
  color: var(--text-muted); margin-bottom: 22px;
}
.dialog-message strong { color: var(--text); font-weight: 500; }
.dialog-actions {
  display: flex; gap: 10px; justify-content: flex-end; align-items: center;
}
.dialog-btn {
  font-family: var(--label-font); font-size: 10px; letter-spacing: 0.25em;
  text-transform: uppercase; padding: 9px 18px; border-radius: 999px;
  cursor: pointer; transition: all 0.18s; border: 1px solid transparent;
  background: transparent;
}
.dialog-btn.cancel { color: var(--text-muted); border-color: var(--line-strong); }
.dialog-btn.cancel:hover { color: var(--text); border-color: var(--text-muted); }
.dialog-btn.confirm { background: var(--text); color: var(--bg); border-color: var(--text); }
.dialog-btn.confirm:hover { opacity: 0.85; }
.dialog-btn.confirm.danger { background: #a13a2a; border-color: #a13a2a; }
.dialog-btn.confirm.danger:hover { background: #8a2f22; border-color: #8a2f22; opacity: 1; }

/* Picker popover (status pills) */
.picker-menu {
  position: fixed; z-index: 700;
  background: var(--bg); border: 1px solid var(--line-strong);
  border-radius: 8px; padding: 5px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  display: flex; flex-direction: column; gap: 1px;
  min-width: 140px;
  animation: pickerIn 0.16s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes pickerIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}
.picker-item {
  font-family: var(--label-font); font-size: 9.5px;
  letter-spacing: 0.22em; text-transform: uppercase;
  padding: 8px 12px; border-radius: 5px;
  color: var(--text-muted); cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; transition: background-color 0.12s, color 0.12s;
  user-select: none;
}
.picker-item:hover { background: var(--accent-faint); color: var(--accent); }
.picker-item.active { color: var(--accent); }
.picker-item .picker-check { font-size: 11px; opacity: 0; }
.picker-item.active .picker-check { opacity: 1; }
.picker-item.clear { color: var(--text-faint); border-top: 1px solid var(--line); margin-top: 3px; padding-top: 11px; border-radius: 0 0 5px 5px; }
.picker-item.clear:hover { color: var(--text); background: transparent; }

/* Undo toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--bg);
  font-family: var(--label-font); font-size: 11px;
  letter-spacing: 0.15em; padding: 11px 6px 11px 18px;
  border-radius: 999px; box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  z-index: 700; display: flex; align-items: center; gap: 4px;
  animation: toastIn 0.28s cubic-bezier(0.16, 1, 0.3, 1);
  max-width: calc(100vw - 32px);
}
.toast.leaving { animation: toastOut 0.2s ease-in forwards; }
@keyframes toastIn { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }
@keyframes toastOut { from { opacity: 1; transform: translate(-50%, 0); } to { opacity: 0; transform: translate(-50%, 12px); } }
.toast-msg { font-family: var(--body-font); font-size: 13px; letter-spacing: 0; padding-right: 6px; opacity: 0.95; }
.toast-action {
  font-family: var(--label-font); font-size: 10px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--bg); cursor: pointer;
  padding: 7px 14px; border-radius: 999px;
  background: rgba(236, 235, 225, 0.14);
  transition: background-color 0.18s;
}
.toast-action:hover { background: rgba(236, 235, 225, 0.24); }
.toast-close {
  width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
  color: var(--bg); opacity: 0.6; cursor: pointer; font-size: 14px; line-height: 1;
  border-radius: 999px; transition: opacity 0.15s, background-color 0.15s;
}
.toast-close:hover { opacity: 1; background: rgba(236, 235, 225, 0.14); }

/* Layout / entry animations: keyed list items for FLIP */
.game-item, .roster-item {
  view-transition-name: none;
}
.game-item.entering, .roster-item.entering {
  animation: itemEnter 0.32s cubic-bezier(0.16, 1, 0.3, 1) backwards;
}
.game-item.leaving, .roster-item.leaving {
  animation: itemLeave 0.22s ease-in forwards;
  pointer-events: none;
}
@keyframes itemEnter {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes itemLeave {
  from { opacity: 1; max-height: 80px; transform: translateY(0); }
  to { opacity: 0; max-height: 0; transform: translateY(-4px); padding-top: 0; padding-bottom: 0; border-color: transparent; }
}

/* Streak number transition */
.streak { transition: color 0.25s ease; }
.streak .streak-num { display: inline-block; transition: opacity 0.18s; }
.streak .streak-num.flash { animation: streakPop 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes streakPop {
  0% { transform: scale(1); }
  40% { transform: scale(1.25); color: var(--accent); }
  100% { transform: scale(1); }
}

/* Day-switch fade */
.day-fade { animation: dayFade 0.22s ease-out; }
@keyframes dayFade { from { opacity: 0.4; } to { opacity: 1; } }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 520px) {
  body { padding: 32px 18px 60px; }
  .section { margin-bottom: 48px; }
  .header { margin-bottom: 48px; }
  .subtasks-row { margin-left: 28px; }
  .daily-card .subtasks-row { margin-left: 40px; }
  .daily-card { padding: 12px 13px 10px; }
  .daily-card .rc-drag { opacity: 0.4; }
  .streak { min-width: 28px; }
  .drag-handle { opacity: 0.6; width: 22px; height: 28px; }
  .game-row { gap: 8px; }
  .roster-item { gap: 8px; }
  .status-pill.empty { opacity: 0.4; pointer-events: auto; }
  .subtask-manage-link { opacity: 0.6; }
  .save-dot-mini { top: 10px; right: 10px; }
  .toast { font-size: 12px; padding: 10px 5px 10px 16px; }
}

/* ====== Journey: detail modal + 历程 view ====== */
/* ===== Detail modal (per-game full info + milestones) ===== */
.detail-overlay{position:fixed;inset:0;background:rgba(42,36,28,0.34);backdrop-filter:blur(2px);z-index:600;display:flex;align-items:flex-start;justify-content:center;padding:48px 16px;overflow-y:auto;}
.detail-card{background:var(--bg);width:100%;max-width:520px;border-radius:18px;box-shadow:0 18px 50px rgba(42,36,28,0.22);padding:22px 22px 26px;font-family:var(--body-font);animation:detailIn .22s ease;}
@keyframes detailIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.detail-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:2px;}
.detail-title{font-family:var(--display-font);font-size:19px;font-weight:600;color:var(--text);line-height:1.25;flex:1;}
.detail-plat{font-size:11px;color:var(--text-faint);border:1px solid var(--line);border-radius:10px;padding:2px 8px;white-space:nowrap;align-self:flex-start;}
.detail-close{cursor:pointer;color:var(--text-faint);font-size:21px;line-height:1;padding:0 2px;}
.detail-close:hover{color:var(--accent);}
.detail-meta{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 20px;}
.detail-tag{font-size:12px;color:var(--text-muted);background:var(--bg-deep);border-radius:10px;padding:4px 11px;cursor:pointer;border:1px solid transparent;}
.detail-tag:hover{border-color:var(--accent-soft);}
.detail-tag.empty{color:var(--text-faint);font-style:italic;}
.detail-section-label{font-family:var(--label-font);font-size:11px;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-faint);margin:4px 0 11px;}
.ms-list{display:flex;flex-direction:column;gap:8px;}
.ms-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg-deep);border-radius:12px;}
.ms-row .ms-main{flex:1;min-width:0;}
.ms-headline{display:flex;align-items:baseline;gap:7px;flex-wrap:wrap;}
.ms-type{font-size:13px;color:var(--text);font-weight:500;}
.ms-inst{font-size:13px;color:var(--text-muted);}
.ms-sub{font-size:11.5px;color:var(--text-faint);margin-top:4px;display:flex;gap:9px;flex-wrap:wrap;align-items:center;}
.ms-date{font-size:11.5px;color:var(--text-faint);white-space:nowrap;}
.ms-rating{font-size:11.5px;color:var(--accent);font-weight:500;}
.ms-note{font-size:11.5px;color:var(--text-muted);font-style:italic;}
.ms-row-actions{display:flex;flex-direction:column;gap:6px;align-items:center;}
.ms-act{cursor:pointer;color:var(--text-faint);font-size:13px;line-height:1;}
.ms-act:hover{color:var(--accent);}
.ms-act.del:hover{color:#b0563e;}
.ms-empty{font-size:12.5px;color:var(--text-faint);text-align:center;padding:16px 0;font-style:italic;}
.ms-add-btn{margin-top:13px;width:100%;border:1px dashed var(--line-strong);background:transparent;border-radius:12px;padding:11px;color:var(--text-muted);font-family:var(--body-font);font-size:13px;cursor:pointer;transition:.15s;}
.ms-add-btn:hover{border-color:var(--accent);color:var(--accent);}
.ms-form{margin-top:13px;background:var(--bg-deep);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:11px;}
.ms-form .mf-row{display:flex;gap:9px;flex-wrap:wrap;}
.ms-field{flex:1;min-width:108px;}
.ms-field label{display:block;font-family:var(--label-font);font-size:10px;letter-spacing:0.09em;text-transform:uppercase;color:var(--text-faint);margin-bottom:4px;}
.ms-field .mf-pick,.ms-field input{width:100%;box-sizing:border-box;border:1px solid var(--line);background:var(--bg);border-radius:9px;padding:8px 10px;font-family:var(--body-font);font-size:13px;color:var(--text);}
.ms-field .mf-pick{cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
.ms-field .mf-pick.empty{color:var(--text-faint);}
.ms-field input{cursor:text;}
.ms-form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:2px;}
.mf-btn{border:none;border-radius:9px;padding:8px 17px;font-family:var(--body-font);font-size:13px;cursor:pointer;}
.mf-btn.primary{background:var(--accent);color:#fff;}
.mf-btn.primary:disabled{opacity:.45;cursor:default;}
.mf-btn.ghost{background:transparent;color:var(--text-muted);}

/* ===== Journey view (里程碑历程) ===== */
.journey-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.journey-back{cursor:pointer;color:var(--text-muted);font-size:14px;font-family:var(--body-font);}
.journey-back:hover{color:var(--accent);}
.journey-title{font-family:var(--display-font);font-size:20px;font-weight:600;color:var(--text);}
.journey-sub{font-size:12.5px;color:var(--text-faint);margin-bottom:18px;}
.journey-filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px;}
.jf-chip{font-size:12px;padding:5px 11px;border-radius:14px;border:1px solid var(--line);background:transparent;color:var(--text-muted);cursor:pointer;font-family:var(--body-font);}
.jf-chip:hover{border-color:var(--accent-soft);}
.jf-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.jf-group-label{font-family:var(--label-font);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-faint);align-self:center;margin-right:2px;}
/* shared month capsule — list / river / star speak one month language */
.month-cap-wrap{display:flex;align-items:center;gap:8px;}
.month-cap-wrap.vert{flex-direction:column;align-items:flex-start;gap:4px;}
.month-cap{color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:11px;letter-spacing:.02em;line-height:1.1;white-space:nowrap;}
.month-cap-year{font-size:10px;color:var(--text-faint);letter-spacing:.04em;}
.month-cap-wrap.vert .month-cap-year{font-size:9px;padding-left:3px;}
.jlist-month{margin:22px 0 10px;}
.journey-row{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line);cursor:pointer;}
.journey-row:hover{background:var(--accent-faint);}
.jr-date{font-size:12px;color:var(--text-faint);width:42px;flex-shrink:0;text-align:right;}
.jr-mid{flex:1;min-width:0;}
.jr-game{font-size:14px;color:var(--text);font-weight:500;}
.jr-node{font-size:12px;color:var(--text-muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.jr-empty{text-align:center;color:var(--text-faint);padding:48px 0;font-style:italic;}

/* ===== Journey view switcher (列表/陈列/长河/星图) ===== */
.journey-switcher{display:flex;gap:2px;background:var(--bg-deep);border-radius:12px;padding:3px;margin-bottom:16px;width:fit-content;}
.jv-seg{font-size:12.5px;padding:6px 14px;border-radius:9px;color:var(--text-muted);cursor:pointer;font-family:var(--body-font);transition:.15s;}
.jv-seg:hover{color:var(--text);}
.jv-seg.active{background:var(--bg);color:var(--accent);box-shadow:0 1px 3px rgba(42,36,28,0.1);font-weight:500;}
.journey-body{padding-bottom:40px;}

/* ===== 陈列 (奖杯墙) ===== */
.shelf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:13px;}
.shelf-card{background:var(--bg-deep);border-radius:14px;padding:14px 15px 15px;border-left:3px solid var(--gc,var(--accent));cursor:pointer;transition:.16s;}
.shelf-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(42,36,28,0.1);}
.shelf-top{display:flex;align-items:flex-start;gap:8px;}
.shelf-name{font-family:var(--display-font);font-size:15.5px;font-weight:600;color:var(--text);line-height:1.25;flex:1;}
.shelf-seal{color:var(--gc,var(--accent));font-size:14px;flex-shrink:0;}
.shelf-year{font-size:10.5px;color:var(--text-faint);letter-spacing:0.03em;flex-shrink:0;align-self:center;}
.shelf-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px;}
.shelf-tag{font-size:10.5px;color:var(--text-faint);background:var(--bg);border-radius:8px;padding:2px 7px;}
.shelf-badges{display:flex;flex-direction:column;gap:5px;margin-top:11px;}
.shelf-badge{display:flex;align-items:center;gap:7px;font-size:11.5px;padding:5px 8px;border-radius:8px;background:var(--bg);}
.shelf-badge[data-status="beaten"]{background:rgba(232,200,120,0.16);}
.shelf-badge[data-status="completed"]{background:rgba(206,190,228,0.18);}
.shelf-badge[data-status="sated"]{background:rgba(176,196,222,0.16);}
.shelf-badge[data-status="abandoned"]{background:rgba(150,142,130,0.1);}
.sb-label{flex:1;min-width:0;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-date{color:var(--text-faint);font-size:10.5px;flex-shrink:0;}

/* ===== 长河 (时间线) ===== */
.river-wrap{position:relative;margin-top:4px;}
.river-svg{position:absolute;top:0;overflow:visible;}
.river-row{position:absolute;right:0;display:flex;align-items:center;gap:11px;padding:0 4px;box-sizing:border-box;cursor:pointer;border-radius:8px;}
.river-row:hover{background:var(--accent-faint);}
.river-month{position:absolute;left:0;display:flex;align-items:center;padding-left:2px;box-sizing:border-box;}
.river-date{font-size:12px;color:var(--text-faint);width:42px;flex-shrink:0;}
.river-game{font-size:14px;color:var(--text);font-weight:500;flex-shrink:0;}
.river-node{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:8px;min-width:0;overflow:hidden;}
.river-node span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ===== 星图 (到达热力) ===== */
.star-months{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:26px 36px;align-items:start;}
.star-month{margin-bottom:0;}
.star-month-cap{margin-bottom:12px;}
.star-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;max-width:300px;}
.star-wd{font-size:10px;color:var(--text-faint);text-align:center;padding-bottom:2px;}
.star-cell{position:relative;aspect-ratio:1;border-radius:7px;background:var(--bg-deep);display:flex;align-items:flex-start;justify-content:flex-end;}
.star-cell.empty{background:transparent;}
.star-cell.lit{cursor:pointer;transition:transform .12s;}
.star-cell.lit:hover{transform:scale(1.08);}
.star-num{font-size:9px;color:var(--text-faint);padding:3px 4px;line-height:1;}
.star-cell.lit .star-num{color:rgba(60,50,40,0.55);}
.star-n{position:absolute;left:4px;bottom:3px;font-size:9px;font-weight:600;color:rgba(60,50,40,0.7);}
.star-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:6px;padding-top:14px;border-top:1px solid var(--line);}
.star-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);}
.star-legend-dot{width:11px;height:11px;border-radius:3px;display:inline-block;}

/* ====== Sort bar (per-group sort chains) ====== */
/* --g-name = the region's accent. Roster groups inherit it from .roster-group;
   Daily/Playing get it set on their sortbar containers below. Fallback: --accent. */
#sortbar-tier1{--g-name:var(--day-name);}
#sortbar-tier2{--g-name:var(--play-name);}

.sortbar{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin:2px 0 14px;font-family:var(--body-font);}

/* collapsed entry — lives in the title row, muted until hovered */
.sort-headentry{display:inline-flex;align-items:center;gap:6px;align-self:center;flex-shrink:0;border:1px solid transparent;background:none;cursor:pointer;font-family:var(--body-font);font-size:11px;color:var(--text-faint);padding:3px 9px;border-radius:11px;letter-spacing:.02em;transition:color .15s,background-color .15s;}
.sort-headentry:hover{color:var(--g-name,var(--accent));background:color-mix(in srgb, var(--g-name,var(--accent)) 9%, transparent);}
.she-icon{font-size:12px;opacity:.7;}
.she-sum{letter-spacing:.03em;}
.she-dirty{font-style:italic;opacity:.85;}

/* expanded fold toggle (leads the dropped-down bar) */
.sort-toggle{display:inline-flex;align-items:center;gap:6px;border:1px solid color-mix(in srgb, var(--g-name,var(--accent)) 30%, transparent);background:none;cursor:pointer;font-family:var(--body-font);font-size:12px;color:var(--g-name,var(--accent));padding:4px 9px;border-radius:13px;letter-spacing:.01em;}
.sort-resort{display:inline-flex;align-items:center;justify-content:center;border:1px solid color-mix(in srgb, var(--g-name,var(--accent)) 30%, transparent);background:none;cursor:pointer;color:var(--g-name,var(--accent));font-size:14px;line-height:1;padding:3px 9px;border-radius:13px;}
.sort-resort:hover{background:color-mix(in srgb, var(--g-name,var(--accent)) 12%, transparent);}
.sort-toggle:hover{background:color-mix(in srgb, var(--g-name,var(--accent)) 12%, transparent);}
.sort-tg-icon{font-size:13px;opacity:.85;}

.sort-sep{color:var(--g-name,var(--text-faint));opacity:0.5;font-size:12px;}
.sort-chip{display:inline-flex;align-items:center;gap:2px;background:color-mix(in srgb, var(--g-name,var(--accent)) 13%, transparent);border-radius:13px;padding:0 4px 0 2px;}

<script>
// ============================================================

// ============================================================
// Default config
// ============================================================
const DEFAULT_CONFIG = {

function makeDefault() {
